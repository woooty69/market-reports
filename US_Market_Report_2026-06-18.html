## 📈 시장 요약

6월 17일(수)은 **케빈 워시 신임 의장의 첫 FOMC**가 시장을 지배한 날이었다. 연준은 정책금리를 **3.50~3.75%로 동결**(시장 예상 97% 부합)했지만, 핵심은 **매파적으로 돌변한 점도표**였다. 18명 위원 중 **9명이 연내 최소 1회 인상**을, 그중 6명은 복수 인상을 전망했고, **연말 금리 중간값이 3월의 3.4%에서 3.8%로 상향**되며 "2026년 중 인상 가능성"을 공식 시사했다. 워시 의장 본인은 이례적으로 점도표에 자신의 전망치를 제출하지 않았고 "오늘 인상 필요성을 느낀 위원은 없었다"고 했지만, 시장은 발표 후 점차 **인상 리스크를 소화하며 하락 전환**했다.

결과는 **전형적 매파 충격**이었다. 국채금리가 급등(2년물 +16bp 4.216%, 10년물 +6.9bp 4.497%)하고, 고밸류 성장주가 직격탄을 맞았다. 다우 -507p(-0.98%), S&P -1.21%, 나스닥 -1.34%로 3대 지수 동반 하락했고 VIX는 +4.6% 상승. 매도는 **광범위**했다 — 메가캡 기술(메타 -5.4%, MS의 SW도 동반), 소프트웨어·IT서비스, 미디어, 거래소·금융데이터까지 금리 민감 업종이 무너졌다. 5월 CPI +4.2% 고착에 이어 이번 점도표가 **"인하는 없고 인상이 남았다"** 는 메시지를 확인시키며, 시장 방향은 한 박자 risk-off로 기울었다.

다만 **개별 호재주는 차별화**됐다. 로빈후드(+8.8%)는 목표가 상향·기록적 거래대금에 더해 **SpaceX의 사상 최대(750억 달러) IPO** 수혜로 급등했고, 모더나(+11.6%)는 FDA 자문위(6/18 VRBPAC) 호재로 솟았다. 반도체도 브로드컴·AMAT·마이크론 등 일부 대형주는 상승해 'AI 인프라' 테마의 맷집을 보였다.

## 📰 헤드라인 3선

**1) 워시 첫 FOMC, 금리 동결했지만 점도표는 '매파'… 3대 지수 급락**
연준 금리 3.50~3.75% 동결. 그러나 점도표상 18명 중 9명이 연내 인상(6명은 복수 인상) 전망, 연말 중간값 3.4%→3.8% 상향. 워시 의장은 본인 점을 제출하지 않으며 "오늘 인상 필요성 느낀 위원 없다"고 했으나 시장은 인상 리스크에 베팅, 다우 -507.12p(-0.98%), S&P -1.21%, 나스닥 -1.34% 마감.

**2) 국채금리 급등 — 2년물 +16bp 4.22%, 10년물 4.50%**
매파 점도표에 단기물 중심 금리 급등. 고밸류 성장·기술주(메타 -5.4%, 서비스나우 -5.8%, 어도비 -5.3%)와 금리 민감 거래소주(나스닥 -6.7%, ICE -4.7%)가 직격. 금리 상승이 밸류에이션을 압박.

**3) 로빈후드 +8.8%·모더나 +11.6%… 하락장 속 개별 차별화**
로빈후드는 도이체방크·아거스 목표가 상향($105·$110), 기록적 거래대금, **SpaceX 750억 달러 IPO(월가 사상 최대)** 수혜로 급등. 모더나는 FDA가 독감백신 mFlusiva 자문위(6/18) 앞두고 "중대 결함 없음" 브리핑 자료를 내며 급등.

## 섹션3. 마켓 구루·기관 코멘트

### (A) 증권사·기관 코멘트 5선

**1) 연준 점도표(FOMC) — 연내 인상 바이어스**
18명 중 9명 연내 ≥1회 인상(6명 복수), 연말 중간값 3.4%→3.8%. 워시 의장은 본인 점 미제출. *한국 함의*: 미 금리 고착·인상 리스크 → 원/달러·외국인 수급·한은 인하 경로 제약.

**2) 도이체방크(브라이언 베델) — 로빈후드(HOOD) 목표가 $105 (기존 $98), 매수**
거래대금 사상 최대·자산 급증·IPO 언더라이터 승인 반영. 아거스도 $90→$110. *한국 함의*: 거래대금·IPO 붐 수혜 브로커리지(키움 등) 참고.

**3) FDA 브리핑 — 모더나(MRNA) mFlusiva 자문위 호재**
FDA 스태프 "중대 결함 없음", 데이터 인정. 6/18 VRBPAC 표결 주목. *한국 함의*: mRNA·백신 플랫폼 기대 회복 → 국내 바이오 심리 소폭 긍정.

**4) AI 인프라 vs 금리 — 차별화 논리**
매파 FOMC에도 브로드컴·AMAT·버티브·GE버노바 등 데이터센터·전력 인프라는 강세. 시장은 'AI capex'를 금리와 별개 모멘텀으로 평가. *한국 함의*: 메모리·전력기기 테마 차별화 지속 가능.
