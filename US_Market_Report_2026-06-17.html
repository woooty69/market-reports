## 📈 시장 요약

6월 16일(화) 뉴욕 증시는 전형적인 **"고점 차익실현 + 가치주 회전(rotation)"** 장세였다. 전일(6/15) 미·이란 평화협정 랠리로 폭등했던 **반도체·AI주가 일제히 되밀리며** 나스닥은 **-1.15%(26,376.34)**, 러셀2000도 하락했다. 반면 **다우는 사상 최고치를 경신**(+0.64%, +328.64p, 51,999.67)했는데, 이는 기술주에서 빠져나온 자금이 **은행·산업재·유틸리티 등 가치·경기방어 섹터로 강하게 이동**했기 때문이다. S&P500은 두 흐름이 상쇄되며 **-0.08%(7,548.60)** 로 보합권 선방. 일본은행(BoJ) 금리 인상도 변수로 거론됐다.

핵심 **방향성**은 두 가지다. ① **AI·반도체 과열 되돌림** — 전일 +10%대 급등했던 마이크론(-6.2%), AMD(-7.3%), 인텔(-8.5%) 등이 차익실현 매물에 급락. AI 인프라 투자 지속성에 대한 의문과 고밸류 부담이 재부각됐다. ② **FOMC 대기 포지셔닝** — **케빈 워시 신임 의장의 첫 FOMC(6/16~17)** 를 앞두고 투자자들이 고베타 성장주를 줄이고 은행·배당주로 방어적 회전. 유가는 이틀째 급락(WTI -5.82%, ≈$75.5)하며 인플레 압력 완화 기대를 이어갔고, 이는 은행·내수 가치주에 우호적으로 작용했다.

오늘 밤(한국시간 6/18 새벽 3시) 공개될 **FOMC 결정·점도표**가 최대 변수다. 동결(확률 ≈96%)은 기정사실이나, 5월 CPI +4.2%(3년래 최고)·연내 인하 기대 소멸 국면에서 **점도표가 추가 긴축 시그널을 줄지**가 관건. 신임 워시 의장의 첫 회견 톤이 반도체 되돌림을 키울지 진정시킬지 주목된다.

전일 폭등한 반도체가 차익실현에 급락하며 나스닥(-1.15%, 26,376.34)·러셀이 후퇴한 반면, 자금이 은행·산업재로 이동해 다우(+0.64%, 51,999.67)는 사상 최고치를 경신했다. S&P500은 -0.08%(7,548.60) 보합. JP모간 +3.68%, 웰스파고 +2.30% 등 대형은행이 지수를 견인. FOMC를 하루 앞둔 방어적 포지셔닝이 뚜렷했다.

**2) 반도체 차익실현 급락… 인텔 -8.5%·AMD -7.3%·마이크론 -6.2%**

**3) 유가 이틀째 -5.8%로 $75선… 광통신주는 밸류 부담에 폭락**

사상 최대 분기 매출·2026 가이던스 상향에도 -7.1% 급락. 애널리스트들은 "실적은 좋으나 기대·밸류가 과도"라고 평가. *한국 함의*: 광모듈 국내 부품주도 '실적보다 눈높이' 리스크 점검 필요.

**3) FOMC 컨센서스(JPM·TD·CME FedWatch) — 동결 유지**
정책금리 3.50~3.75% 동결이 컨센서스(확률 ≈96%). 5월 CPI +4.2% 고착으로 연내 인하 기대 소멸, **점도표가 금리결정보다 시장을 더 움직일 변수**. *한국 함의*: 점도표 매파 시 원/달러·금리 부담, 한은 인하 경로에도 제약.

**4) 모더나(MRNA) — FDA 자문위 우호 기대**
mFlusiva(50세 이상 계절독감 mRNA 백신) VRBPAC 표결 앞두고 FDA 브리핑 자료가 균형적 → 연초 '심사 거부' 악재 일부 해소. *한국 함의*: mRNA·백신 플랫폼 기대 회복은 국내 바이오 투자심리에 소폭 긍정.

**5) 마이클 버리 — AI 약세 베팅 유지**
오라클·반도체 ETF(SOXX)·QQQ에 2027년 만기 풋 확대. 이번 반도체 차익실현 국면과 맞물려 'AI 고밸류' 경계론 재부각. *한국 함의*: AI 밸류체인 단기 과열 리스크 참고.

### (B) 구루·전략가 코멘트

- **익명 전략가**: "다우 신고가·나스닥 하락의 디버전스는 전형적 로테이션. 강세장 훼손이 아니라 리더십 교체 신호일 수 있다."
- **포지셔닝 코멘트**: FOMC·점도표를 앞둔 '관망성 차익실현'. 워시 신임 의장의 첫 회견 톤이 단기 방향을 좌우.
