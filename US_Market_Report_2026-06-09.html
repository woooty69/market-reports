# 미국 증시 데일리 리포트 — 반도체 'V자 반등', 방어주는 차익
기준일: 2026년 6월 8일(월) 미국 정규장 마감

## 주요 지수·자산

| 지수·자산 | 지수·가격 | 등락 |
|---|---|---|
| 나스닥 종합 | 25,929.66 | ▲ 0.86% (금요일 급락분 일부 회복) |
| S&P 500 | 7,405.73 | ▲ 0.30% |
| 다우 산업 | 50,786.01 | ▼ 0.16% (▼80.77p, 방어주 부진에 약세) |
| WTI 유 (근월) | 약 $91.3 | ▲ 0.86% (정산가 기준; 장중 중동발 급등 후 진정) |
| 美 10년물 금리 | 4.536% | 보합 (+0.02%p, 종가 기준) |

> 변동성: VIX 선물 ▼2.25%(위험회피 완화) / 비트코인 ▲약 5%(리스크온) / 달러(DXY) 보합. 금요일 폭락(나스닥 ▼4.2%)에 대한 **저가매수성 반등**이 핵심.

## 시장 요약

6월 8일 미국 증시는 **금요일 폭락의 진앙이었던 반도체가 V자 반등**하며 나스닥·S&P500을 끌어올렸다. 마이크론이 금요일 ▼13%에서 ▲약 10%로 되돌렸고, 인텔은 **구글의 AI 칩(TPU) 파운드리 발주 + 엔비디아 백업 파운드리 검토 + 히타치 협업** 소식이 겹치며 ▲11% 급등했다. 마벨은 S&P500 편입 보도로 장중 강세. 동시에 이란-이스라엘 무력충돌·호르무즈 해협 차질 우려로 **유가가 장중 급등**(브렌트는 장중 $98 돌파)했다가 종가엔 진정돼 WTI는 정산 기준 ~$91.3(+0.86%)로 마감했지만, 지정학 프리미엄에 에너지주는 동반 상승했고, 비트코인·고베타(테슬라·카바나·코인베이스)도 리스크온 흐름을 탔다.

반면 금요일 피난처였던 **방어주(유틸리티·리츠·보험·일부 필수소비재)는 차익 실현**으로 일제히 약세 전환했고, 헬스케어·산업재 비중이 큰 다우는 소폭 하락했다. 시장의 서사는 "AI·반도체 성장 스토리에 대한 신뢰 회복 + 위험선호 재개"지만, 다수 전략가는 "추세 반전 확인 전 신규 진입은 신중하라"며 FOMO 경계를 함께 주문했다. 6월 10일(수) 발표될 5월 CPI가 다음 분기점이다.

## 📰 시장 헤드라인 3선

**1. 반도체가 하루 만에 되돌렸다.** 금요일 ▼4.2%였던 나스닥이 ▲0.86%로 반등. 마이크론 ▲약 10%, 인텔 ▲11%, KLA·AMAT 등 장비주 ▲7~9%. 엔비디아·브로드컴·마이크론이 반등을 주도. (CNBC·Motley Fool)

**2. 인텔, 구글 AI 칩 위탁생산 수주설에 급등.** 알파벳이 2028년 300만 개 이상의 TPU를 인텔 파운드리에 발주했다는 보도 + 엔비디아의 백업 파운드리 검토. 바클레이스($65→$100)·웰스파고($85→$110) 목표가 상향. (Benzinga·Yahoo Finance)

**3. 중동 충돌에 유가 장중 급등 후 진정.** 주말 미사일 공방·호르무즈 해협 차질 우려로 브렌트가 장중 $98을 돌파했다가 ~$94로, WTI는 정산 기준 ~$91.3(+0.86%)로 마감. 이란의 작전 종료·협상 기대로 위험자산은 오히려 반등. (Fortune·tradingeconomics)

## 섹션 3 — 마켓 구루·기관 코멘트

### (A) 언론 최다 인용 증권사·리서치 5선

1. **씨티그룹(Citigroup)** — *S&P500 전망*: 연말 목표를 7,700→**8,100**으로 상향. "AI 주도 이익 성장세 지속"을 근거로 제시. 한국 함의: AI 밸류체인(메모리·HBM) 이익 모멘텀에 우호적 톤.

2. **바클레이스(Barclays)** — *인텔(INTC)*: 목표가 **$65→$100** 상향(중립 계열 의견). 파운드리 수주 가시화 반영. 한국 함의: 파운드리 경쟁 심화 → 삼성 파운드리 수주 환경 점검 필요.

3. **웰스파고(Wells Fargo)** — *인텔(INTC)*: 목표가 **$85→$110** 상향(중립 계열). AI·파운드리 전략 신뢰 회복.

4. **슈왑/시장 데스크(Schwab)** — *시장 전반*: "칩 주도 반등, 그러나 6/10 CPI가 변수." 반등의 지속성은 인플레 지표 확인 후 판단하라는 신중론.

5. **트레이딩키/프리마켓 데스크** — *마벨(MRVL)*: S&P500 편입 보도로 프리마켓 ▲약 9%. 지수 편입 수급 효과 부각.

### (B) 구루·전략가 코멘트

- **시장 전략가(종합):** 이번 반등이 인상적이고 FOMO 매수를 부를 수 있으나, "추세 반전 확인 전 신규 포지션 구축은 신중하라"는 경계론이 우세. 하루 반등으로 금요일의 구조적 의문(밸류에이션·메모리 수요 피크아웃 논쟁)이 해소된 것은 아니라는 시각.
- **에너지 데스크(종합):** 이란-이스라엘 충돌과 호르무즈 해협 차질 우려가 유가의 핵심 변수. 단 이란의 작전 종료·협상 진전 기대가 동시에 부각되며 '공급 우려 ↔ 긴장 완화'가 줄다리기.
