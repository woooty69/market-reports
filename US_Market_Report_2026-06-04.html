**주요 지수·자산**

| 지수·자산 | 지수/가격 | 등락 |

| 나스닥 | ≈26,850 | -0.89% |

| 다우 | ≈50,690 | -1.21% |
| WTI유 | $96.73 | +3.2% |

> **시장 요약 — 9거래일 랠리 종료, "위험회피"로 급반전** — 이란이 쿠웨이트·바레인에 미사일을 발사(최소 1명 사망)하면서 **유가가 급등(WTI +3.2% $96.73)** 하고 **10년물 금리가 4.46%로 상승**, 위험자산이 일제히 하락하며 9거래일 연속 상승이 끝났다. 시장의 옥석 가리기는 더 선명해졌다: **유가 수혜(에너지)·방어(헬스케어·필수소비)·실물 AI(반도체 ex-엔비디아)** 는 사들이고, **AI에 잠식될 고밸류 소프트웨어·핀테크·고베타** 는 던졌다. 메타(META)만 기업용 AI 에이전트 출시로 +4.2% 나홀로 강세.

**📰 시장 헤드라인 3선**

1. **이란-쿠웨이트 미사일 → 유가 급등 → 9거래일 랠리 종료**: 이란의 쿠웨이트·바레인 공격으로 WTI가 +3.2% $96.73, 브렌트 +2.9% $98.80로 급등. 안전자산 선호로 채권 매도(10년물 4.46%↑)·주식 매도가 겹치며 S&P -0.74%·다우 -1.21%·러셀 -1.38%. 지정학 리스크가 시장 주도 변수로 복귀.
2. **소프트웨어·핀테크 동반 급락 (SaaSpocalypse 지속)**: 서비스나우(NOW) -7.6%, 오라클(ORCL) -5.8%, 팔란티어(PLTR) -6.6%, 팔로알토(PANW) -5.6%, IBM -7.2% 등 소프트웨어와 코인베이스(COIN) -6.2%·로빈후드(HOOD) -6.0%·블록(XYZ) -5.9% 등 핀테크가 금리 상승·위험회피에 직격탄.
3. **알파벳 $80B 증자 + 메타 차별화 + 장 마감 후 실적**: 알파벳(GOOGL)이 AI 인프라 자금 마련용 **800억 달러 주식 발행**을 발표(하이퍼스케일러 capex 부담 부각). 반면 메타(META)는 기업용 AI 에이전트 출시로 +4.2%. 마감 후 브로드컴(AVGO·매출 소폭 미스)·크라우드스트라이크(CRWD) 실적 발표.

## 3. 마켓 구루·기관 코멘트 (+ 언론 최다 인용 증권사 리포트 5선)

**⑤ Jim Cramer — 브로드컴·크라우드스트라이크 실적 코멘트**: 마감 후 실적을 앞두고 두 종목에 대한 견해 제시(보도 다수 인용). 고밸류 SW·반도체의 실적 민감도가 높아진 국면임을 시사.

**① Great Rotation 전략(Goldman·Morgan Stanley·JPM)**: 금융·산업재 '비중확대' 기조. "AI 슈퍼사이클 2단계 = 채택자·실물의 해." 단, 이날은 지정학·금리 변수로 금융도 약세 — 순환매의 단기 변동성 노출.
