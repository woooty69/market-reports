## 🗓 시장 요약

매그니피센트7 실적 실망과 삼중고(유가·금리·AI 자본지출 우려)에 3대 지수가 큰 폭으로 하락했다. 특히 **알파벳이 −7.13%**, **테슬라가 −14.53%** 급락하며 나스닥이 −2.15%로 밀렸다. 알파벳은 2026년 자본지출 전망을 1,950억~2,050억 달러로 대폭 상향해 'AI 과잉투자' 우려를 키웠고, 테슬라는 인도량 사상최대에도 이익이 급감하는 실적 미스를 냈다.

여기에 **유가가 급등**했다(WTI $86.80, 브렌트 $100 돌파). 미국-이란 충돌 격화가 유가를 밀어올렸고, **2년물 금리가 4.351%로 52주 최고**를 기록했으며 주간 신규 실업수당 청구가 57년 최저로 나오며 금리 부담을 더했다. VIX는 18.70으로 12% 급등했다.

다만 시장은 **뚜렷한 로테이션** 양상을 보였다. 알파벳의 자본지출 상향이 오히려 AI 메모리 수요 기대로 이어지며 **SK하이닉스 ADR(+2.56%)·마이크론(+2.97%)** 등 메모리가 상승했고, 록히드마틴(+10.54%)·RTX(+7.28%) 등 방산과 써모피셔(+8.71%)·다나허(+7.46%) 등 헬스케어 장비가 실적 호조로 급등했다. 코스피200 야간선물은 −1.02%(1,121.00)로 지수 급락을 일부 반영했다.

## 📰 시장 헤드라인 3선

**1. 매그니피센트7 실적 실망 — 알파벳 −7.13%, 테슬라 −14.53% → 나스닥 −2.15%**
알파벳은 2026년 자본지출을 1,950억~2,050억 달러로 상향(직전 1,800억~1,900억)하며 AI 과잉투자 우려를 자극했고, 테슬라는 인도 사상최대에도 이익 급감으로 −14.5% 폭락했다. 빅테크 급락이 지수 하락을 주도했다.

**2. 삼중고 — 유가 급등(브렌트 $100)·2년물 52주 최고·실업수당 57년 최저**
미국-이란 충돌에 WTI가 +4.1%($86.80), 브렌트가 $100을 넘었다. 주간 신규 실업수당 청구가 57년 최저로 나오며 노동시장 강세가 확인됐고, 이는 금리 상승 부담(2년물 4.351%)으로 이어졌다.

**3. 로테이션 — 메모리·방산·헬스케어 강세 vs 빅테크 급락**
알파벳 자본지출 상향이 AI 메모리 수요 기대로 이어지며 SK하이닉스(+2.56%)·마이크론(+2.97%)이 올랐고, 록히드마틴(+10.54%)·RTX(+7.28%)가 실적 호조로 급등했다. 자금이 빅테크에서 실적주로 이동했다.

## 📊 섹션 1 · 업종별 흐름

### 🔺 상승 업종

**1. 방위산업**
록히드마틴(LMT) +10.54%, RTX +7.28%. 두 방산 대장주가 실적 상회·전망 상향과 사상최대 백로그를 발표하며 급등했다. 지정학 리스크 고조가 방산 수요 기대를 키웠다.
> 🇰🇷 [전달] 미 방산 강세는 국내 방산주(한화에어로·현대로템 등) 투자심리에 우호적. 지정학 테마 동조 여지.

**2. 반도체 · 메모리**
마이크론(MU) +2.97%, SK하이닉스 ADR(SKHY) +2.56%, 샌디스크 +0.69%. 알파벳의 자본지출 상향이 역설적으로 'AI 메모리 수요 확대'로 해석되며 메모리가 지수 급락을 방어했다.
> 🇰🇷 [전달] 7/23 미국장에서 SKHY가 지수 급락(나스닥 −2.15%) 속에도 +2.56%($169.50) 상승했다. 알파벳 자본지출 상향(AI 메모리 수요)과 ADR 전환 한도로 인한 프리미엄 유지 보도가 힘을 실었다. 코스피200 야간선물은 −1.02%(1,121.00)로 지수 하락을 일부 반영했으나 낙폭은 제한적. [판정] SKHY·마이크론 강세는 7/24 코스피 반도체에 우호적이나, 야간선물 하락·빅테크 급락·유가/금리 급등이 지수 하방 압력 → 반도체와 지수의 디커플링(반도체 선방, 지수 부진) 가능성. (무효화: 빅테크發 위험회피 심화 또는 유가 추가 급등 시)

**3. 헬스케어 장비 · 방어**
써모피셔(TMO) +8.71%, 퀘스트다이아그노스틱스(DGX) +8.61%, 다나허(DHR) +7.46%. 실적 호조와 방어주 순환매가 겹치며 급등했다(다나허는 전일 −11% 급락 후 반등).
> 🇰🇷 [전달] 방어·헬스케어 순환매는 위험회피 국면의 특징 — 국내에서도 참고 지표.

### 🔻 하락 업종

**1. 빅테크 (핵심 약세)**
알파벳(GOOGL) −7.13%, 테슬라(TSLA) −14.53%, 아마존(AMZN) −4.57%, 메타(META) −3.36%, 엔비디아(NVDA) −1.59%. 실적 실망과 AI 자본지출 우려가 대형 기술주를 무너뜨렸다.
> 🇰🇷 [전달] 미 빅테크 급락은 국내 성장주·플랫폼 심리에 부담. 다만 반도체는 차별화.

**2. 통신**
T모바일(TMUS) −10.75%. 이익은 예상을 넘겼으나 후불 가입자 순증이 −13% 둔화하며 성장 실망에 급락했다.
> 🇰🇷 [전달] 개별 실적 이슈로 국내 통신주와 직접 연동은 낮음.

**3. 헬스케어 보험 · 기타**
몰리나헬스케어(MOH) −9.67%, 글로브라이프(GL) −7.02%, 롤린스(ROL) −9.27%. 실적·가이던스 실망 매물이 집중됐다.
> 🇰🇷 [전달] 개별 종목 이슈로 국내 연동 낮음.

**시장의 시선:** '실적이 좋아도 눈높이를 못 넘으면 급락'하는 민감한 장세다. 빅테크의 막대한 AI 자본지출이 이제 '수익화 증거'를 요구받고 있으며, 자금은 빅테크에서 방산·메모리·헬스케어 등 실적·모멘텀이 확인된 곳으로 이동하고 있다.

## 🏢 섹션 2 · 이슈 종목 10선

*그날 언론에 가장 많이 언급된 이슈 종목의 구체적 기사 내용 중심.*

**1. 알파벳 (GOOGL) −7.13% ($317.69)**
2026년 자본지출 전망을 기존 1,800억~1,900억 달러에서 **1,950억~2,050억 달러**로 대폭 상향하고 2027년 추가 증액을 예고했다. 강한 AI 수요를 근거로 들었으나, 시장은 오히려 'AI 과잉투자와 수익화 지연' 우려로 반응하며 −7% 급락했다. 나스닥 −2.15% 하락의 최대 요인이었다.

**2. 테슬라 (TSLA) −14.53% ($319.67)**
2분기 인도량은 48만 대로 사상 최대였으나, 영업비용이 매출보다 빠르게 증가하며 이익이 급감하는 실적 미스를 냈다. 평균판매가 하락과 마진 압박이 부각되며 실적 발표 후 −14.5% 폭락, 이날 거래대금 상위(1억 주)를 기록했다. 시장의 높은 기대가 부메랑이 됐다.

**3. 록히드마틴 (LMT) +10.54% ($568.59)**
조정 EPS $7.94, 매출 $20.1B(+11%)로 예상($7.23·$19.37B)을 크게 상회했다. 2분기 신규수주가 $65B에 달했는데, 여기엔 미사일방어청과의 $35B 규모 THAAD 요격체 다년 계약이 포함돼 백로그가 사상 최대인 $230B로 불어났다. 연간 전망도 상향하며 방산주 랠리를 이끌었다.

**4. RTX (RTX) +7.28% ($209.07)**
2분기 EPS가 컨센서스를 13.7% 상회하고 매출도 7.8% 웃돌았다. 방산 부문 신규수주 급증으로 백로그가 사상 최대인 $289B를 기록했다. 록히드마틴과 함께 '실적 상회+전망 상향+기록적 수주잔고'로 방산 업종 전반의 강세를 견인했다.

**5. SK하이닉스 ADR (SKHY) +2.56% ($169.50)**
지수가 급락하는 와중에도 상승했다. 알파벳의 자본지출 상향이 'AI 메모리 수요 확대' 기대로 이어졌고, SK하이닉스가 국내 주식의 ADR 전환 한도를 설정해 미국 상장분의 프리미엄이 유지될 것이란 보도가 힘을 실었다. 시간외에서도 +0.53% 추가 상승했다.

**6. 마이크론 (MU) +2.97% ($988.00)**
메모리 대장주로 알파벳 capex 상향의 수혜를 받으며 상승했다. AI 데이터센터용 HBM·DRAM 수요 기대에 Roundhill 메모리 ETF(DRAM)로의 자금 유입도 이어졌다. SK하이닉스와 함께 반도체가 지수 급락을 방어하는 축이 됐다.

**7. 써모피셔 (TMO) +8.71% ($572.32)**
생명과학·진단 장비 대표주로 실적 호조에 급등했다. 다나허(+7.46%)·퀘스트다이아그노스틱스(+8.61%)와 함께 헬스케어 장비·서비스가 강세를 보이며 방어주 순환매의 한 축을 형성했다.

**8. T모바일 (TMUS) −10.75% ($170.42)**
조정 EPS $2.99로 예상($2.60)을 넘겼고 잉여현금흐름 전망도 상향했다. 그러나 핵심 지표인 후불(postpaid) 순증 계정이 전년비 −13%인 27.7만 건으로 둔화하며 가입자 성장 실망에 −10% 급락했다. '실적 비트에도 성장 둔화' 사례였다.

**9. 엔비디아 (NVDA) −1.59% ($208.68)**
빅테크 약세에 동조했으나 낙폭은 −1.6%로 제한적이었다. AI 자본지출 논쟁의 중심에 있었지만, 알파벳의 capex 상향이 결국 GPU·인프라 수요로 이어진다는 논리가 낙폭을 방어했다. 메모리 강세와 함께 반도체의 상대적 선방을 보여줬다.

**10. 몰리나헬스케어 (MOH) −9.67% ($200.29)**
관리의료(managed care) 업체로 실적·가이던스 실망에 급락했다. 의료비 부담과 마진 압박 우려가 부각되며 헬스케어 보험 업종 전반의 투자심리에 부담을 줬다. 방어주 내에서도 실적에 따라 차별화가 뚜렷했다.

## 🧭 섹션 3 · 구루 · 기관 코멘트

**마이클 크레이머 — "2년물 금리, 핵심 돌파 임박·CDS 스프레드 확대"**
2년물 금리가 52주 최고 부근에서 기술적 돌파를 앞두고 있으며, 신용부도스와프(CDS) 스프레드가 벌어지고 있다고 지적.

**제임스 피서노 — "이란 긴장이 인플레·금리 상승 우려 재점화"**
중동 갈등에 따른 유가 급등이 인플레이션과 국채 금리 상승 우려를 되살리고 있다고 진단.

**투자 심리(실적 시즌)** — 빅테크의 막대한 AI 자본지출이 '수익화 증거'를 요구받는 국면에 진입, 알파벳의 capex 상향이 우려와 기대(메모리 수요)를 동시에 촉발.

**24/7 Wall St.(방산)** — 록히드마틴·RTX의 '실적 상회+전망 상향+기록적 백로그'가 지정학 리스크 국면에서 방산주의 매력을 재확인시켰다고 평가.

**찰스 문(Prosper) — "알파벳 급락은 매수 기회"**
알파벳이 실적 후 매도되는 국면을 기회로 보며, SK하이닉스의 기술적 셋업도 주목할 만하다고 언급.
