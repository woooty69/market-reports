### 기준일: 2026년 6월 15일(월) 정규장 마감 · 작성 2026-06-16 06:20 KST

## 📈 시장 요약

6월 15일(월) 뉴욕 증시는 **"미·이란 평화협정 타결"** 단일 재료로 위험자산이 일제히 폭발한 전형적 리스크온 장세였다. 트럼프 대통령이 이란과의 전쟁 종식 합의 도달을 발표하고 "걸프 원유 수송 재개·이란 항만 봉쇄 해제"를 시사하자, 2월 말부터 시장을 짓눌러온 **호르무즈 해협 봉쇄(전 세계 원유의 약 1/5 통과)** 리스크가 급격히 해소됐다. WTI는 하루 만에 약 5% 급락해 $80선으로 내려앉았고, 공포지수 VIX는 **-10.35%** 폭락했다.

핵심은 **방향성**이다. ① 유가 급락 → 에너지發 인플레 압력 완화 기대 → 위험선호 회복, ② 자금이 에너지·방어주(필수소비·제약)에서 빠져나와 **반도체·AI·여행레저** 등 성장·경기민감 업종으로 강하게 회전했다. 반도체, 특히 **메모리(마이크론·웨스턴디지털·시게이트)** 가 장을 견인했다.

다만 거시 배경은 여전히 경계가 필요하다. 직전 5월 CPI(6/10 발표)는 **전년比 +4.2%로 3년래 최고**, 에너지가 주범(+3.9% MoM, 12개월 +23.5%)이었고 이로 인해 **2026년 금리인하 기대는 소멸, 연내 인상 가능성(약 70%)** 까지 거론되는 상황. 시장은 이번 유가 급락이 이 인플레 그림을 되돌릴 수 있을지에 베팅했다. **6월 16~17일 FOMC(결과 한국시간 18일 새벽 3시, 점도표 동반)** 가 코앞이라 이번 랠리의 지속성은 신임 **케빈 워시(Kevin Warsh)** 연준 의장의 입에 달려 있다(5/22 취임, 이번이 워시 의장의 첫 FOMC).

## 📰 헤드라인 3선

**1) 트럼프 "미·이란 평화협정 타결"… 다우 +469p·나스닥 +3% 폭등**
트럼프 대통령이 미·이란 전쟁 종식 합의 도달을 발표하며 페르시아만 원유 수송 재개와 이란 항만 봉쇄 해제를 예고했다. 합의에는 이란 핵프로그램 폐기와 경제 인센티브가 포함된 것으로 보도됐고, 이란 외무차관 가리바바디도 "합의 도달, 스위스 서명식 후 전문 공개"를 확인했다. 다우 +468.77p(+0.92%, 51,671.03), S&P +1.65%(7,554.29), 나스닥 +3.07%(26,683.94)로 마감.

**2) 유가 5% 급락 → $80선… 호르무즈 봉쇄 리스크 해소**
WTI는 전일比 약 -5%로 $80.2 수준까지 하락(Finviz 선물 -4.87%). 2월 말 분쟁 발발 이후 호르무즈 해협 사실상 봉쇄로 치솟던 유가가 수송로 재개 기대에 되돌림. 에너지 업종(엑슨모빌 -4.14%, 셰브론 -3.64%, 슐럼버거 -4.40%)이 지수 내 최대 약세 섹터.

**3) 메모리 슈퍼사이클 재점화… 마이크론 +10.8%, 웨스턴디지털 +16.1%**
AI 데이터센터발 HBM·DRAM 수요 지속 확인 기대로 메모리주가 폭발. 마이크론은 "2026년 HBM 물량 전량 매진", 직전 분기 DRAM 가격 +60%대·NAND +70%대 상승을 제시한 바 있다. BofA는 2026년을 "1990년대 붐에 견줄 슈퍼사이클"로 규정(글로벌 DRAM 매출 +51%, NAND +45%, HBM 시장 $546억·+58%). **마이크론 6/24 실적 발표** 예정.
