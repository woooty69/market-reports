## 🧭 시장 요약

**독립기념일 연휴가 끝난 뒤 시장은 '고용 둔화 → 비둘기 기대' 랠리를 이어갔다.** 6월 비농업 고용이 +5.7만 명(예상 약 +11.7만)에 그치고 4·5월치도 하향된 결과가 "연준(케빈 워시 의장)이 당분간 금리를 올리지 못할 것"이라는 기대로 이어지며, **다우가 53,055.91로 사상 최고를 재경신**(+0.29%)했다. 7월 FOMC(7/29) 인상 확률은 25%대로 낮아졌다.

주도주는 지난주 폭락했던 **AI·반도체가 이틀째 반등**했다는 점이다. 스토리지·네트워킹이 특히 강해 아리스타(ANET) +8.3%, 웨스턴디지털(WDC) +7.2%, 넷앱(NTAP) +6.1%, 시게이트(STX) +5.9%가 뛰었고, AMD(+6.6%)·아스테라랩스(+6.5%)와 함께 **SOX가 +2.17%** 회복했다(직전 이틀 −12.6% 급락 후 반등). **테슬라(+6.7%)·메타(+3.0%)·알파벳(+1.8%)** 등 성장·플랫폼도 강세로 나스닥이 +1.12% 올랐다. VIX는 15.6으로 진정.

반면 **방어·경기소비 일부는 차익·실적 부담에 약세**였다. 콘스텔레이션브랜즈(STZ)는 실적 부진에 −4.9%, 오라일리(−6.7%)·오토존(−6.3%)·트랙터서플라이(−4.8%) 등 자동차부품·소매와 닥터페퍼(−4.7%)가 밀렸다. 국채금리는 소폭 하락(2년물 4.11%·10년물 4.47%)했고, 유가는 $68.60로 보합, 금(+1.2%)·은(+2.3%)은 강세였다.

## 📰 시장 헤드라인 3선

**1. 다우 사상 최고 재경신 — 고용 둔화가 '비둘기 연준' 기대로**
6월 비농업 고용이 +5.7만 명(Zacks 컨센 +11.7만)에 그치고 5월치도 −4.3만 하향(12.9만)되자, 7월 인상 우려가 후퇴하며 다우가 53,055.91로 최고가를 경신했다. 7/29 FOMC 인상 확률은 25.5%(동결 74.5%)로 하락. 이번 주 **FOMC 의사록(7/8, 현지)**이 다음 촉매다.

**2. AI·반도체 이틀째 반등 — 스토리지·네트워킹이 주도(SOX +2.17%)**
'메타 컴퓨트'發 급락(직전 이틀 −12.6%)에서 반도체가 반등. 아리스타(+8.3%)·웨스턴디지털(+7.2%)·넷앱(+6.1%)·시게이트(+5.9%) 등 데이터 인프라와 AMD(+6.6%)·아스테라랩스(+6.5%)가 강세. 기술주 ETF(XLK) 약 +2%. 다만 'AI 트레이드의 독점이 끝나간다(H2 opens with the AI trade losing its monopoly)'는 시장 폭 확대론도 병존.

**3. 방어·소비 차별화 — 콘스텔레이션 실적 부진에 −4.9%**
콘스텔레이션브랜즈(STZ)가 실적 부진으로 급락했고, 오라일리·오토존 등 자동차부품 소매와 닥터페퍼 등 필수소비가 약세. 위험선호 회복 국면에서 방어·경기소비가 소외됐다.
