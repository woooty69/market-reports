# 미국 증시 24시간 데일리 리포트
### 2026년 6월 12일(금) 작성 — 직전 미국 정규장(6/11) 세션

**주요 지수·자산**

| 지수·자산 | 지수/가격 | 등락 |
|---|---|---|
| 나스닥 | 25,809.66 | +2.54% |
| S&P 500 | 7,394.30 | +1.75% |
| 다우 | 50,848.75 | +1.86% |
| WTI유 | ≈$86 | -4.0% |
| 美 10년물(금리) | ≈4.4% | 하락 |

> **시장 요약 — '이란 데탕트'발 위험선호 급반등** — 트럼프 대통령이 그날 저녁 예정됐던 **이란 공격을 보류**하고 **"이란이 핵무기를 갖지 못하게 하는 합의가 곧 서명될 것"** 이라고 밝히면서 지정학 위험이 급격히 완화됐다. 전일 CPI 쇼크로 무너졌던 시장이 **반도체 주도로 광범위 반등**(나스닥 +2.54%·S&P +1.75%·다우 +1.86%), **VIX -7%**. **유가는 -4% 급락(WTI ≈$86, 4월 이후 최저)** 하며 항공·여행이 폭등하고 에너지가 하락했다. 다만 **소프트웨어는 오라클 -8.5%·PTC -12% 등 나홀로 소외** — 칩·경기민감으로의 순환매 색채.

**📰 시장 헤드라인 3선**

1. **트럼프 '이란 공격 보류 + 핵 합의 임박' → 위험선호 급반등**: 트럼프가 예정된 이란 공습을 취소하고 *"이란이 핵무기를 절대 갖지 못한다는 합의… 문서가 거의 최종 단계, 곧 서명"* 이라고 발언. 지정학 디리스킹에 3대 지수 1.7~2.5% 반등, 변동성(VIX) -7% 급락.
2. **반도체 대반등 + 엔비디아 $10B AI 인프라 딜**: 마이크론(MU) +11.7%로 주간 손실 만회, 인텔(INTC) +9.3%(애널리스트 투자의견 상향), 장비 3사(AMAT·LRCX·KLAC) +11~13% 동반 급등. 엔비디아(NVDA)는 **KKR·쿠웨이트투자청·비스트라(VST)가 주도한 100억 달러 AI 인프라 투자** 소식에 +2.2%($204.66).
3. **유가 -4% 급락($86) → 항공·여행↑ vs 에너지↓**: 이란 완화로 WTI -4%(4월 이후 최저 $86), 브렌트 -3.9%($89.44). 유가 수혜로 항공(유나이티드 UAL +9.6%·델타 +7%)·크루즈(카니발 CCL +8.2%)가 폭등하고, 반대로 정유·E&P(엑손 -2.7%·데번 -4.3%)는 하락.

## 1. 업종별 흐름 — 시장이 좋게/나쁘게 보는 곳 (+ 한국 연관 유추)

### 🟢 상승 업종 TOP 3

**① 반도체·반도체장비 — 대반등 주도**
주요: 샌디스크(SNDK) +14.5%, KLA(KLAC) +12.9%, 램리서치(LRCX) +12.7%, 마이크론(MU) +11.7%, 어플라이드(AMAT) +11.2%, 테라다인(TER) +9.7%, 인텔(INTC) +9.3%, AMD(AMD) +8.0%.
보도: 전일 CPI 쇼크로 과매도된 반도체가 지정학 완화에 일제 반등. 마이크론은 주간 낙폭을 하루에 만회, 인텔은 애널리스트 상향에 +10%, 엔비디아는 KKR·비스트라 주도 100억 달러 AI 인프라 투자로 AI 자본지출 사이클 유효성을 재확인.
→ **한국 연관(유추)**: **삼성전자·SK하이닉스**(메모리 반등 직접 수혜), 장비·후공정 **한미반도체·HPSP·이오테크닉스**.

**② 항공·여행 — 유가 급락 직접 수혜**
주요: 유나이티드항공(UAL) +9.6%, 델타(DAL) +7.0%, 사우스웨스트(LUV) +7.0%, 카니발(CCL) +8.2%, 로열캐리비안(RCL) +7.2%, 노르위전(NCLH) +6.4%.
보도: WTI -4%($86) 급락으로 연료비 부담 완화 + 지정학 안도. 항공·크루즈 등 여행 경기소비재가 가장 크게 반응.
→ **한국 연관(유추)**: **대한항공·진에어**, 여행 **하나투어·모두투어**.

**③ 산업재·방산·소재 — 경기민감 리스크온**
주요: 하니웰(HON) +6.4%, 보잉(BA) +6.0%, GE에어로스페이스(GE) +4.4%, 캐터필러(CAT) +4.8%, 이튼(ETN) +4.8%, 록히드마틴(LMT) +4.5%, RTX(RTX) +3.8%, 알버말(ALB) +8.0%, 프리포트(FCX) +6.9%.
보도: 위험선호 회복에 자본재·방산·소재가 폭넓게 반등. 금리 하락(국채 강세)도 우호.
→ **한국 연관(유추)**: **HD현대중공업·두산에너빌리티·한화에어로스페이스**, 소재 **고려아연·POSCO홀딩스**.

### 🔴 하락 업종 TOP 3

**① 소프트웨어 — 랠리 속 나홀로 소외**
주요: PTC(PTC) -12.4%, 오라클(ORCL) -8.5%, 오토데스크(ADSK) -7.1%, 어도비(ADBE) -6.2%, 워크데이(WDAY) -5.0%, 고대디(GDDY) -6.4%.
보도: 칩·경기민감이 폭등하는 와중에 고밸류 소프트웨어는 차익실현·순환매로 역행. 'AI 인프라(하드웨어)는 사고 소프트웨어는 던지는' 분리가 이날도 뚜렷.
→ **한국 연관(경계)**: SaaS **더존비즈온·한글과컴퓨터**, SI **삼성SDS** 등 고밸류·구독모델 점검.

**② 에너지 — 유가 -4% 직격**
주요: 데번(DVN) -4.3%, 코노코필립스(COP) -3.8%, 엑손모빌(XOM) -2.7%, 옥시덴탈(OXY) -2.9%, 셰브론(CVX) -2.1%.
보도: 이란 데탕트로 지정학 프리미엄이 빠지며 유가·정유·E&P 동반 하락.
→ **한국 연관(주의)**: 정유 **S-Oil·SK이노베이션** 단기 약세 가능.

**③ 금융데이터·거래소 일부**
주요: 팩트셋(FDS) -5.0%, 코스타(CSGP) -4.6%, S&P글로벌(SPGI) -3.1%, MSCI(MSCI) -2.3%, 무디스(MCO) -2.0%.
보도: 위험선호 회복 속 방어·고밸류 데이터/거래소가 상대적으로 소외.

> **요약 — 시장의 시선**: 지정학 완화·유가 급락에 **반도체·항공·산업재(리스크온·경기민감)는 매수**, **에너지·고밸류 소프트웨어는 매도**. 한국 적용 시 **반도체·항공·방산·소재 우호 / 정유·SaaS 경계**. 'AI 인프라(칩)는 사고 소프트웨어는 던진다'는 구도가 지속.
