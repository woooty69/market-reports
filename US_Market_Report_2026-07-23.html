## 🗓 시장 요약

알파벳과 테슬라의 장 마감 후 실적 발표를 앞두고 지수는 관망 속에 혼조 마감했다(나스닥 −0.57%, S&P −0.14%, 다우 −0.01%). 반도체는 엔비디아(+2.29%)·슈퍼마이크로(+19.84%)·델(+9.32%) 등 **AI 하드웨어 강세**로 SOX가 +0.44% 선방했으나, **엔터프라이즈 소프트웨어가 급락**하며 나스닥을 눌렀다(서비스나우 −6.47%, 워크데이 −6.19%, 팔란티어 −6.11%, PTC −6.34%). 'AI 구매 지연' 경고와 고밸류 부담이 SW 전반을 흔들었다.

국채 금리는 이란 리스크·유가 강세로 추가 상승했다(2년물 **4.304%로 52주 최고**, 10년물 4.659%). WTI 유가는 $83.37로 소폭 올랐다. VIX는 16.64로 안정됐다.

장 마감 후 **매그니피센트7 실적 시즌이 개막**했다. 알파벳은 2026년 자본지출을 1,800억~1,900억 달러로 상향하고 2027년 대폭 증액을 예고했으며, 테슬라는 분기 인도량이 48만 대로 사상 최대였으나 영업마진이 1.4%까지 눌렸다. SK하이닉스 ADR(SKHY)은 인텔 오하이오 팹 인수설을 부인하며 −3.88% 하락했으나 시간외에서 +4.25% 반등했고, 코스피200 야간선물은 +1.70%(1,104.00)로 강세를 이어갔다.

## 📰 시장 헤드라인 3선

**1. 매그니피센트7 실적 개막 — 알파벳 자본지출 상향, 테슬라 인도 사상최대·마진 압박**
알파벳은 장 마감 후 2분기 실적에서 2026년 자본지출을 1,800억~1,900억 달러로 올리고 2027년 '대폭 증액'을 예고했다. 테슬라는 매출 $28.24B(+26%)·인도 48만 대(사상최대)에도 영업마진이 1.4%(전년 4.1%)로 급락하고 GAAP 순익이 −5% 감소했다.

**2. 엔터프라이즈 소프트웨어 급락 — 'AI 구매 지연' 경고**
서비스나우(−6.47%)·워크데이(−6.19%)·팔란티어(−6.11%)·PTC(−6.34%)가 동반 급락했다. 서비스나우의 부진한 수주 잔고와 팔란티어의 고밸류(매출 42배) 부담, AI 도입에 따른 소프트웨어 구매 지연 우려가 겹쳤다.

**3. AI 하드웨어는 강세 — 슈퍼마이크로 +19.84%, 델 +9.32%, 엔비디아 +2.29%**
슈퍼마이크로가 매출총이익률 전망을 8%대에서 15~17%로 대폭 올리고 $60B 신규수주·스페이스X AI 데이터센터 협력을 공개하며 폭등했다. AI 서버·반도체 하드웨어로 자금이 몰리며 SOX가 +0.44% 상승했다.

## 📊 섹션 1 · 업종별 흐름

### 🔺 상승 업종

**1. AI 하드웨어 · 서버**
슈퍼마이크로(SMCI) +19.84%, 델(DELL) +9.32%, 엔비디아(NVDA) +2.29%, AMD +1.42%. AI 데이터센터·서버 수요와 슈퍼마이크로의 마진 서프라이즈가 하드웨어 전반의 투자심리를 끌어올렸다.
> 🇰🇷 [전달] AI 서버·반도체 하드웨어 강세는 국내 HBM·기판·서버 밸류체인 심리에 우호적.

**2. 에너지 · 유틸리티**
EQT +8.51%, NRG +6.33%. 유가 강세와 데이터센터 전력 수요 기대가 에너지·전력주를 밀어올렸다.
> 🇰🇷 [전달] 전력 수요 테마는 국내 전력기기·원전 밸류체인에 참고 요인.

**3. 반도체 (선방)**
엔비디아·AMD 등 대형 반도체가 강세로 SOX +0.44%. 다만 SK하이닉스 ADR은 개별 이슈로 하락했다.
> 🇰🇷 [전달] 7/22 미국장 SOX +0.44%·엔비디아 +2.29% 선방했으나 SKHY는 인텔 오하이오 팹 인수설 부인에 −3.88%($165.27, 시간외 +4.25% 반등). 코스피200 야간선물 +1.70%(1,104.00). 서울은 7/22에도 삼성·SK하이닉스가 강세를 이어가며 코스피 반등이 지속된 것으로 보도됐다. [판정] 야간선물 +1.7%·SOX 선방으로 7/23 코스피 반도체 강보합~강세 지속 가능, 단 SKHY 개별 악재(팹 인수설 부인)·엔터SW 급락·유가·금리 상승이 변수. 장 마감 후 알파벳·테슬라 실적 결과가 7/23 아시아 반도체 방향을 좌우. (무효화: 알파벳 자본지출 실망 또는 이란 확전 시)

### 🔻 하락 업종

**1. 엔터프라이즈 소프트웨어 (핵심 약세)**
서비스나우(NOW) −6.47%, 워크데이(WDAY) −6.19%, 팔란티어(PLTR) −6.11%, PTC −6.34%, 도어대시(DASH) −5.50%. 'AI 구매 지연' 경고와 고밸류 부담이 SW 전반을 급락시켰다.
> 🇰🇷 [전달] 미 SW 밸류 조정은 국내 SW·플랫폼 심리에 부담이나 직접 연동은 제한적.

**2. 산업 · 전력기기**
GE버노바(GEV) −8.69%. 매출은 예상을 넘겼으나 이익이 부진했고 풍력 부문 신규수주가 −40% 급감했다. 'AI 기대치가 너무 높다'는 경고가 나왔다.
> 🇰🇷 [전달] 데이터센터 장비주 기대 조정은 국내 전력·중전기 밸류체인에 참고 요인.

**3. 우주 · 성장주**
스페이스X(SPCX) −6.69%. 성장주 변동성과 차익 매물이 겹쳤다.
> 🇰🇷 [전달] 개별 종목 이슈로 국내 연동 낮음.

**시장의 시선:** 자금이 'AI 소프트웨어'에서 'AI 하드웨어'로 이동하는 조짐이 뚜렷했다. 슈퍼마이크로의 마진 서프라이즈가 하드웨어를 띄운 반면, 서비스나우·팔란티어 급락은 SW 밸류에 대한 눈높이 조정을 보여줬다. 장 마감 후 알파벳·테슬라 실적이 이 흐름의 지속성을 가를 관문이다.

## 🏢 섹션 2 · 이슈 종목 10선

*그날 언론에 가장 많이 언급된 이슈 종목의 구체적 기사 내용 중심.*

**1. 알파벳 (GOOGL) −1.48% ($342.00, 장 마감 후 실적)**
장중에는 실적 경계로 하락했다. 장 마감 후 발표한 2분기 실적에서 2026년 자본지출 전망을 1,800억~1,900억 달러로 상향하고, 2027년에는 이를 '대폭 증액'하겠다고 밝혔다. 시장의 관심은 막대한 AI 투자에 걸맞은 클라우드 성장률과 수익화 여부에 집중됐으며, 이 결과가 매그니피센트7 실적 시즌 전반의 방향타로 평가된다.

**2. 테슬라 (TSLA) −1.29% ($374.05, 장 마감 후 실적)**
2분기 매출이 $28.24B로 전년비 +26% 늘었고 인도량이 48만126대로 사상 최대(컨센서스 대비 약 7.4만 대 상회)를 기록했다. 그러나 GAAP 영업이익이 −57% 급감해 영업마진이 1.4%(전년 4.1%)로 눌렸고, 평균판매가 하락과 규제 크레딧 감소로 매출총이익률도 16.8%로 예상을 밑돌았다. 자본지출이 +142% 급증하며 잉여현금흐름은 −$1.09B로 적자 전환했다.

**3. 슈퍼마이크로 (SMCI) +19.84% ($30.56)**
예비 실적에서 매출총이익률 전망을 기존 8.2~8.4%에서 15~17%로 거의 두 배로 올리며 폭등했다. 회계연도 4분기 신규수주가 $60B에 달해 백로그가 사상 최대로 불어났고, CEO가 일론 머스크의 SpaceXAI를 위한 기가와트급 AI 데이터센터 공동 구축을 확인한 점이 랠리를 이끌었다. AI 하드웨어 섹터 전반의 마진 우려를 뒤집은 촉매가 됐다.

**4. 델 (DELL) +9.32% ($441.80)**
슈퍼마이크로의 마진 서프라이즈와 AI 서버 수요 기대에 동반 급등했다. 데이터센터용 AI 서버 출하 확대가 실적 성장으로 이어질 것이란 기대가 실렸다. AI 하드웨어로의 자금 이동을 대표하는 종목이었다.

**5. SK하이닉스 ADR (SKHY) −3.88% ($165.27)**
전일 +13.75% 급등에 대한 되돌림에 더해, 인텔의 오하이오 뉴올버니 반도체 캠퍼스를 인수한다는 국내 보도를 SK하이닉스가 공식 부인한 것이 악재로 작용했다. 다만 장 마감 후 시간외에서 +4.25% 반등하며 낙폭을 만회했다. 알파벳 등 빅테크 실적과 메모리 수요 논리가 방향의 핵심 변수로 남았다.

**6. 엔비디아 (NVDA) +2.29% ($212.03)**
AI 하드웨어 강세를 주도하며 반도체 반등을 이끌었다. HBM4 채택과 데이터센터 수요의 구조적 강세 논리가 지지했고, 거래량 1.28억 주로 시장 관심이 집중됐다. SW 급락 속에서도 AI 인프라의 구심점 역할을 했다.

**7. GE버노바 (GEV) −8.69% ($985.03)**
2분기 EPS $2.47로 예상을 밑돌았고, 매출은 $11.1B로 예상을 넘겼다. 그러나 풍력 부문 신규수주가 −40% 급감하고 해상 프로젝트 비용이 늘며 발목을 잡았다. 블룸버그는 "AI 기대치가 너무 높아 아웃룩과 충돌했다"며 데이터센터 장비주의 눈높이 조정을 지적했다.

**8. 서비스나우 (NOW) −6.47% ($95.46)**
2분기 매출은 늘었으나 수주 잔고(백로그)가 기대에 못 미치면서 급락했다. AI 에이전트 도입에 따른 기업들의 소프트웨어 구매 지연 우려가 부각됐다. 엔터프라이즈 SW 셀오프의 중심에 섰다.

**9. 팔란티어 (PLTR) −6.11% ($124.56)**
소프트웨어 섹터 급락을 주도했다. 매출 대비 42배에 달하는 고평가 부담과 AI 구매 지연 경고가 겹치며 2026년 들어 40% 넘게 하락한 흐름을 이어갔다. 고밸류 성장주에 대한 경계 심리를 대표했다.

**10. 워크데이 (WDAY) −6.19% ($132.43)**
서비스나우·팔란티어와 함께 엔터프라이즈 SW 동반 급락에 휩쓸렸다. AI가 기존 SaaS 수요를 잠식할 수 있다는 우려가 HR·재무 SW 밸류에이션 전반으로 확산됐다.

**블룸버그(GE버노바) — "아웃룩이 '너무 높은' AI 기대와 충돌"**
데이터센터 장비를 파는 기업들이 시장의 과도한 AI 기대치를 충족시키기가 갈수록 어려워지고 있다고 분석.

**시장 관전(실적 시즌)** — 알파벳·테슬라를 시작으로 매그니피센트7 실적이 'AI 자본지출의 수익화'를 검증하는 최대 시험대에 올랐다.

**슈퍼마이크로 관련** — 매출총이익률 급반등과 $60B 수주가 'AI 하드웨어 마진 우려'를 뒤집으며 섹터 전반의 투자심리를 재점화시켰다.
