## 🧭 시장 요약

**전일과 정확히 뒤바뀐 '반전' 장세였다.** 목요일 마이크론發로 폭등했던 반도체가 금요일엔 격렬하게 되돌려지며 **SOX가 −5.29% 급락**했다. ON세미컨덕터(ON) −23.7%, 웨스턴디지털(WDC) −13.2%, 시게이트(STX) −12.2%, 샌디스크(SNDK) −10.5% 등 메모리·장비·아날로그가 무더기로 무너졌다. 방아쇠는 **"오픈AI가 IPO를 내년으로 연기하는 방안을 검토 중"이라는 NYT 보도**와, AI 데이터센터 투자비용(capex) 청구서에 대한 경계감이었다.

반면 지수는 의외로 선방했다. **메가캡 소프트웨어·인터넷이 거꾸로 반등**하며 AI 하드웨어에서 빠진 자금을 흡수했다 — 마이크로소프트(MSFT) +5.7%, 서비스나우(NOW) +9.9%, 워크데이(WDAY) +9.2%, 애플(AAPL) +3.1%(전일 −6% 되돌림), 아마존(AMZN) +2.5%. 헬스케어(모더나 +12.6%, 일라이릴리 +7.1%)와 금·은 등 안전자산도 강했다. 그 결과 **나스닥은 −0.24%로 5거래일 연속 하락**(주간 −4.6%)했지만 낙폭은 제한됐고, S&P500(−0.05%)·다우(−0.09%)는 보합권이었다.

유가는 **WTI −3.74%($69.23)**로 다시 밀렸고, 국채금리는 하락(10년물 4.37%·2년물 4.09%)했다. S&P글로벌은 미국 국가신용등급 AA+(안정적)를 재확인했다.

## 📰 시장 헤드라인 3선

**1. SOX −5.29% 급락 — 오픈AI IPO 연기설에 반도체 투매**
NYT가 "오픈AI가 스페이스X의 부진한 상장 이후 행보와 AI 관련주 변동성을 이유로 IPO를 내년으로 미루는 방안을 검토 중"이라고 보도하자, AI 인프라 수요 정점론이 부각되며 반도체가 무너졌다. **ON세미(ON) −23.7%**가 투매를 주도했고 웨스턴디지털(−13.2%)·시게이트(−12.2%)·샌디스크(−10.5%)·텍사스인스트루먼트(−8.5%)·마이크론(−6.7%)이 동반 급락. 전일 폭등의 격렬한 되돌림이었다.

**2. 메가캡 소프트웨어·인터넷 반등 — 'AI 하드웨어 → 소프트웨어' 로테이션**
칩에서 빠진 자금이 소프트웨어·플랫폼으로 이동했다. 마이크로소프트(+5.7%)·서비스나우(+9.9%)·워크데이(+9.2%)·데이터독(+8.5%)·앱러빈(+7.0%)이 급등했고, 전일 −6% 급락했던 애플도 +3.1% 반등. "AI 청구서가 본격적으로 돌기 시작했다(The AI invoice starts changing hands)"는 평가 속, 자본지출 부담이 큰 하드웨어 대신 현금흐름 좋은 소프트웨어로의 순환매가 뚜렷했다.

**3. 나스닥 5연속 하락·주간 −4.6% — 안전자산 선호 + 신용등급 재확인**
나스닥이 5거래일 연속 내리며 주간 −4.6%(S&P −약2%, 다우 +0.6%)로 기술주 약세가 두드러졌다. 금(+1.2%)·은(+1.5%)이 강세를 보였고, **BofA의 마이클 하트넷은 "사상 최대 규모의 기술주 자금 유출"**을 지적하며 달러보다 금 선호를 권고했다. 한편 S&P글로벌은 미국 신용등급 AA+(안정적)를 재확인(재정 부담은 경고)했다.

## 1️⃣ 업종별 흐름

### 🔺 상승 업종

**① 소프트웨어·인터넷 — AI 하드웨어에서의 로테이션 수혜**
대표주: 서비스나우(NOW) +9.85%, 워크데이(WDAY) +9.18%, 데이터독(DDOG) +8.52%, 앱러빈(APP) +6.99%, 마이크로소프트(MSFT) +5.71%, 넷플릭스(NFLX) +4.10%, 애플(AAPL) +3.14%, 아마존(AMZN) +2.50%, 메타(META) +1.36%.
자본지출 부담이 큰 칩 대신 현금흐름·구독모델이 탄탄한 SaaS·플랫폼으로 자금 이동. 전일 급락한 애플·MS가 되돌림 반등.
*시장의 시선: "AI 인프라 비용이 무거워질수록 소프트웨어가 상대적으로 매력적" — 하드웨어→소프트웨어 순환매.*
*🇰🇷 한국 연관: 네이버·카카오 등 플랫폼, SaaS(더존비즈온) 심리 우호 가능.*

**② 헬스케어·제약 — 방어주 선호**
대표주: 모더나(MRNA) +12.59%, 일라이릴리(LLY) +7.13%, 팩트셋(FDS) +10.97%(금융데이터).
기술주 변동성 확대 속 실적 가시성 높은 헬스케어·제약으로 방어적 자금 유입.
*🇰🇷 한국 연관: 바이오·제약 방어주(삼성바이오로직스 등) 참고.*

**③ 금·은(안전자산)**
금 선물 +1.2%, 은 +1.5%. 기술주 유출 자금의 안전자산 선호. BofA 하트넷도 '달러보다 금'을 권고.
*🇰🇷 한국 연관: 금 관련주·안전자산 선호 심리.*

### 🔻 하락 업종

**① 반도체 메모리·스토리지 — 전일 급등의 격렬한 되돌림**
대표주: 웨스턴디지털(WDC) −13.17%, 시게이트(STX) −12.24%, 샌디스크(SNDK) −10.46%, 마이크론(MU) −6.69%.
오픈AI IPO 연기설로 AI 수요 정점 우려가 부각되며 전일 폭등분을 통째로 반납.
*시장의 시선: "메모리 슈퍼사이클 기대가 하루 만에 차익실현으로" — 변동성 극대화 국면.*
*🇰🇷 한국 연관: **삼성전자·SK하이닉스** 단기 변동성 주의(단 HBM 펀더멘털은 유효).*

**② 반도체 장비·아날로그 — SOX −5.29% 주도**
대표주: ON세미컨덕터(ON) −23.66%, 키사이트(KEYS) −8.72%, 모놀리식파워(MPWR) −8.69%, 텍사스인스트루먼트(TXN) −8.46%, 엔비디아(NVDA) −1.64%.
ON세미의 −24% 폭락이 반도체 투매를 증폭. AI capex 둔화 우려가 장비·아날로그 전반으로 확산.
*🇰🇷 한국 연관: 반도체 장비·소재주(한미반도체 등) 동조 약세 주의.*

**③ 에너지 — 유가 재차 하락**
WTI −3.74%($69.23), 브렌트 −3.84%. 수요 둔화 우려에 유가가 다시 밀리며 에너지주 약세.
*🇰🇷 한국 연관: 정유주 정제마진 부담 vs 항공·해운 원가 수혜.*

> **요약 — 시장의 시선**: 'AI 청구서'가 본격화되며 **AI 하드웨어(칩·장비, 매도) → 소프트웨어·헬스케어·안전자산(매수)** 로의 자금 이동이 핵심. 목요일과 정반대. 한국 적용 시 **반도체 단기 변동성 경계 / 소프트웨어·바이오 방어주 상대 우위**.

## 3️⃣ 마켓 구루·기관 코멘트

**증권사·기관 리포트 5선**
1. **BofA — 마이클 하트넷(수석 전략가)**: "사상 최대 규모의 기술주 자금 유출(record tech outflows)"을 경고하며, 달러 익스포저보다 **금(gold) 선호**를 권고. AI 밸류에이션 부담의 자금이동 신호로 해석.
2. **SPI 자산운용 — Stephen Innes**: "주식이 흔들린다 — **AI 청구서가 본격적으로 돌기 시작했다**(The AI invoice starts changing hands)." AI capex 비용이 실적·주가로 청구되는 국면 진단.
3. **Louis Navellier**: "**AI 밸류에이션 우려로 기술주 조정이 심화**되며 글로벌 증시를 흔든다" — AI 고밸류주의 추가 변동성 경계.
4. **S&P글로벌(신용평가)**: 미국 국가신용등급 **AA+·안정적 재확인**. 단, 재정 부담(fiscal pressures)을 리스크로 명시 → 장기금리·달러 변수.
5. **IMF 수석이코노미스트**: 연준의 **금리 가이던스 축소는 "전적으로 적절"**하다고 평가 — 워시 체제의 신중한 커뮤니케이션에 우호적.

**구루·매크로 코멘트**
- **중앙은행 서베이**: 다수 중앙은행이 **스태그플레이션을 향후 5년 유력 시나리오**로 인식(물가 고착 + 성장 둔화 우려). 단기금리 하락에도 장기 불확실성 잔존.
- 연준 의장 **케빈 워시(Kevin Warsh, 2026.5.22 취임)** 체제는 PCE 4%대 물가 속 신중 기조. 7/29 FOMC가 분기점.
- 시장 톤: 'AI 슈퍼사이클'의 비용·수익 검증이 본격화되며 **AI 하드웨어 고밸류의 변동성**이 2026년 여름 핵심 리스크로 부각.

- **오픈AI IPO·AI capex 뉴스플로우**: AI 인프라 투자 사이클에 대한 시장 신뢰가 칩주 방향의 핵심.
