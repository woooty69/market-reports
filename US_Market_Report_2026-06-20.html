## 🧭 시장 요약

전일(6/17) **케빈 워시(Kevin Warsh) 신임 의장**의 첫 FOMC가 던진 매파 충격(점도표상 18명 중 9명이 2026년 인상 전망, 완화 편향 문구 삭제)으로 급락했던 증시가 6/18 **반도체 주도로 강하게 반등**했다. 나스닥은 +1.91%로 지수 상승을 견인했고, S&P500도 +1.08%로 회복. 다우는 방산·은행·에너지 약세에 +0.14%로 상대적 부진.

반등의 핵심은 **"AI 반도체 빅딜"**이다. 인텔이 애플과 미국 내 반도체 설계·생산 계약을 맺었다는 소식(트럼프 대통령 언급)에 더해, 알파벳이 자체 칩 300만 개 위탁생산을 인텔에 맡기고 엔비디아도 인텔 파운드리 활용을 검토 중이라는 보도가 겹치며 필라델피아 반도체지수(SOX)가 **+6% 넘게 사상 최고**를 찍었다. 반면 **이란-미국 휴전 합의(호르무즈 해협 재개통)** 기대가 방산·에너지의 지정학 프리미엄을 걷어내며 두 섹터를 끌어내렸고, **액센추어 어닝 쇼크(-18%)**가 IT 컨설팅·서비스 전반을 짓눌렀다.

시장의 시선은 명확하다: **"AI·메모리 슈퍼사이클에 베팅, 지정학 리스크 프리미엄과 AI에 잠식당하는 전통 IT서비스는 회피"**.

## 📰 헤드라인 3선

1. **인텔, 애플·알파벳 칩 위탁생산 빅딜 → 반도체 일제히 급등.** 인텔 +10.6%, SOX +6%대 사상 최고. 트럼프가 "인텔-애플 미국 내 생산 계약"을 언급했고, 알파벳이 자체 칩 300만 개를 인텔에 맡기며 엔비디아도 파운드리 검토 중이라는 보도가 더해졌다. (출처: Bloomberg)

2. **액센추어, 가이던스 하향에 사상 최대 하루 낙폭 −18%.** FY26 매출성장률 가이던스를 현지통화 기준 3~5%→**3~4%**로 낮추고 4분기 매출을 $17.75B(컨센서스 $18.47B 하회)로 제시. 신규 수주 −2%. "AI가 컨설팅 산업을 뒤흔들고, 중동 분쟁으로 고객 발주가 멈췄다"는 설명. 코그니전트(−10.5%)·IBM(−5.1%)·가트너(IT, −4.6%)로 전염. (출처: Bloomberg, TechTimes)

3. **이란-미국 휴전·호르무즈 재개통 임박 → 방산·에너지 동반 약세.** 호르무즈 해협 재개통과 휴전 연장 합의 기대가 지정학 리스크 프리미엄을 축소. L3해리스 −5.9%, 노스럽 −5.2%, 록히드 −4.0%, RTX −3.6%. 유가 공급 정상화 전망에 정유·서비스주(SLB −4.5%, 할리버튼 −3.6%)도 동반 하락. (출처: PBS, Kalkine)
