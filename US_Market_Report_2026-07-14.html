## 🧭 시장 요약

**빅위크(CPI·은행 실적) 첫날, 시장은 지정학發 리스크오프로 출발했다.** 트럼프 대통령이 **호르무즈 해협 이란 선박 봉쇄를 재개**한다고 밝히면서 **WTI가 +9.2% 폭등($78)**, 인플레이션·금리 상승 우려가 되살아나며 **반도체·AI 성장주가 투매**됐다. 나스닥이 −1.55%, S&P500 −0.79%. 다우는 에너지주가 방어하며 −0.26%로 선방했다.

반도체가 직격탄이었다. **SOX가 −4.78%** 급락했고, 특히 **금요일 나스닥에 데뷔한 SK하이닉스의 한국 상장주가 −15% 폭락하고 삼성전자도 −10.7%** 빠지며 'AI 메모리 트레이드'의 과열 논쟁이 부각됐다. 샌디스크(−12.6%)·아스테라랩스(−12.4%)·마벨(−7.8%)·ARM(−7.6%)·엔비디아(−3.5%)가 무너졌고, 앱러빈(−12.7%)·오라클(−6.4%)·코어위브(−6.3%) 등 AI 소프트웨어·클라우드도 급락했다.

반면 **에너지·방어적 소프트웨어가 나홀로 강세**였다. 유가 급등에 발레로(+5.4%)·필립스66(+5.3%)이 뛰었고, 팩트셋(+6.5%)·가트너(+6.1%)·인튜이트(+5.4%)·톰슨로이터(+5.2%) 등 실적 방어주로 자금이 이동했다. 유가·지정학發 인플레 우려에 **국채금리가 급등(2년물 4.28%로 52주 최고 근처·10년물 4.62%)**, VIX는 +14%(17.2)로 튀었다. 시장은 이제 **7/14 CPI**를 주시한다.

## 📰 시장 헤드라인 3선

**1. 트럼프 '호르무즈 이란 선박 봉쇄 재개' → 유가 +9.2% 폭등**
트럼프 대통령이 호르무즈 해협에서 이란 선박에 대한 봉쇄를 다시 발표하며 중동 리스크가 격화, WTI가 +9.2%($78)·브렌트 $83대로 폭등했다. 발레로(+5.4%)·필립스66(+5.3%) 등 정유가 급등했으나, 유가發 인플레·금리 상승이 성장주 전반을 압박했다.

**2. SK하이닉스 데뷔 후유증 — 한국주 −15%·삼성 −10.7%, 반도체 투매**
금요일 나스닥에 상장한 SK하이닉스의 한국 상장주가 −15% 폭락하고 삼성전자도 −10.7% 급락하며 'AI 메모리 트레이드에 여력이 남았는가'라는 회의가 확산됐다. 미국 반도체도 동반 투매(SOX −4.78%): 샌디스크 −12.6%, 아스테라랩스 −12.4%, 마벨 −7.8%, ARM −7.6%.

**3. 금리 급등·CPI 대기 — 2년물 52주 최고 근처**
유가 급등·지정학 인플레 우려에 국채금리가 급등, **2년물이 4.28%로 52주 최고 부근**, 10년물 4.62%. 7/29 FOMC 인상 확률도 44%대로 상승. 7/14 6월 CPI(예상 헤드라인 3.8%)와 대형은행 실적이 이번 주 방향을 좌우한다.
