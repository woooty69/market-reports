## 🧭 시장 요약

**미국의 이란 공습 재개(확전)에도 증시는 위험선호 회복으로 반등했다.** 미국이 7/9 새벽 이란에 새 공습을 단행하고 이란이 걸프 국가를 겨냥해 맞불을 놓으며 지정학 리스크가 격화됐지만, 시장은 **반도체 3거래일 연속 반등**을 앞세워 상승 마감했다. 나스닥이 +1.30%(26,206.89), S&P500 +0.81%, 다우 +0.27%.

주도주는 반도체·AI 하드웨어였다. **SOX가 +3.06%** 오르며 루멘텀(+11.1%)·ARM(+9.3%)·HPE(+9.9%)·샌디스크(+7.6%)·아스테라랩스(+6.3%)·램리서치(+6.0%)·AMD(+5.7%)·마이크론(+4.4%)이 급등했고, **메타(+4.7%)·테슬라(+3.2%)** 등 성장주도 강했다. 반에크 반도체 ETF(SMH) +2.5%. **SK하이닉스가 금요일 나스닥 IPO 가격을 결정**한다는 소식도 메모리 투자심리에 우호적이었다.

반면 **필수소비·헬스케어 등 방어주는 소외**됐다. 코스트코(−4.2%)·펩시코(−3.3%)·맥케슨(−3.2%)·알닐람(−3.3%)이 밀렸고, 아파치(−5.1%) 등 에너지도 유가 반락에 약세였다. **유가는 장 초반 이란 공습에 $74.7까지 급등했다가, 미국 원유재고가 4월 이후 처음 증가(약 300만 배럴)했다는 EIA 발표에 반전해 WTI $71.81·−2.3%로 마감**했다. 유가 하락은 인플레 우려를 눌러 국채금리도 소폭 하락(2년물 4.17%·10년물 4.55%), 금(+1.2%)·은(+3.1%)도 강세였다. VIX −6.3%(15.8)로 공포가 진정됐다.

## 📰 시장 헤드라인 3선

**1. 반도체 3연속 반등(SOX +3.06%) — 이란 확전 뚫고 위험선호 회복**
미국의 이란 공습 재개에도 반도체·AI 하드웨어가 랠리를 이어갔다. 루멘텀(+11.1%)·ARM(+9.3%)·HPE(+9.9%)·샌디스크(+7.6%)가 급등하며 SMH +2.5%. "AI 시장이 전쟁 리스크에도 반등했다 — 유지될 수 있을까"라는 평가처럼, AI 모멘텀이 지정학 우려를 압도했다.

**2. SK하이닉스, 금요일 나스닥 IPO 가격 결정**
SK하이닉스가 7/10(금) 나스닥 상장 공모가를 확정한다는 보도가 전해졌다. 한국 메모리 대장주의 美 자본시장 진입은 글로벌 메모리 슈퍼사이클 기대를 반영하며, 마이크론(+4.4%) 등 메모리 체인 강세와 맞물렸다.

**3. 유가, 장중 급등 후 하락 반전 — EIA 원유재고 서프라이즈 증가**
이란 공습에 장 초반 $74.7까지 급등했던 WTI가 **미국 원유재고가 4월 이후 처음 증가(약 300만 배럴, 예상은 감소)**했다는 EIA 발표에 반전, **−2.3%($71.81)** 로 마감했다. 유가 하락이 인플레 우려를 눌러 국채금리도 소폭 하락(10년물 4.55%·2년물 4.17%). 다만 BofA는 "유가 하락이 더 이상 금리 하락을 의미하지 않는다"며 유가-금리 관계의 변질을 지적했다. 금·은 등 안전자산도 강세.
