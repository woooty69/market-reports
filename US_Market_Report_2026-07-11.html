## 🧭 시장 요약

**SK하이닉스의 사상 최대 외국기업 미국 상장이 성공하며 변동성 큰 한 주를 상승으로 마감했다.** S&P500 +0.42%(7,575.39)로 사상 최고치 부근에 복귀했고, 나스닥 +0.29%, 다우 +0.29%. S&P500과 나스닥 모두 주간 상승 전환에 성공했다.

**SK하이닉스(SKHY)는 공모가 $149 대비 13% 급등한 $168.01에 데뷔**했다. $265억(약 $26.5B)을 조달한 외국기업 사상 최대 미국 상장으로, 곽노정 CEO는 "수요가 엄청나다(demand is enormous)"며 **메모리 공급부족이 2030년 이후까지 지속**될 것이라고 밝혔다. AI 트레이드의 리트머스 시험지로 여겨졌던 이번 상장의 성공에 엔비디아(+4.0%)가 동반 강세를 보인 반면, 경쟁사 마이크론(−1.2%)·인텔(−2.4%)은 하락해 **SOX는 +0.06%(12,967.16) 보합 마감** — 반도체 내부는 승자(GPU·장비)와 패자(메모리 경쟁주)가 갈렸다.

**메타(+6.0%)는 'Meta Compute' AI 클라우드 사업 발표**로 매그니피센트7 중 최고 상승률을 기록, 주간 +15%까지 확대됐다. AWS·애저·구글클라우드와 경쟁하는 AI 컴퓨팅 판매 사업 진출과 자체 Iris 칩 양산(9월) 계획이 재료였다. 반면 **AI 인프라로의 로테이션 속에 사이버보안·소프트웨어(크라우드스트라이크 −5.7%)와 바이오(모더나 −10.8%)는 급락**하는 종목 장세가 뚜렷했다. 유가는 장중 $72선 안팎 공방 끝에 이란 공급 정상화(호르무즈 재개) 압력이 우세해지며 WTI −0.56%($71.41)로 소폭 하락 마감했고, 국채금리는 2년물 4.19%·10년물 4.56%로 보합권. 다음 주는 6월 CPI(7/14)·대형은행 실적·워시 연준 의장의 첫 의회 증언이 몰린 슈퍼위크다.

## 📰 시장 헤드라인 3선

**1. SK하이닉스, 나스닥 데뷔 첫날 +13% — 외국기업 사상 최대 $26.5B 조달**
공모가 $149 → 시초가 $170 → 종가 $168.01. 미국 투자자들이 AI 메모리 붐의 핵심 수혜주 지분을 잡으려 몰려들며 청약이 크게 초과됐다. 곽노정 CEO는 "메모리 부족은 2030년 이후까지 간다"고 발언. 티커는 화요일부터 SKHYV→SKHY로 전환된다.

**2. 메타 'Meta Compute' 발표 — AI 클라우드 시장 진출 선언에 +6.0%**
AI 컴퓨팅 파워와 모델을 직접 판매하는 클라우드 인프라 사업 'Meta Compute'를 공개하고, 자체 AI 칩 'Iris' 9월 양산·내년 약 14GW 용량 목표를 제시했다. 광고 성과를 높이는 Muse 계열 AI 모델도 전 서비스에 배포. 주간 +15%로 매그니피센트7 선두.

**3. 다음 주 슈퍼위크 — CPI·대형은행 실적·워시 의장 첫 증언**
7/14(화) 6월 CPI(헤드라인 전월 −0.1%·전년 3.7%로 둔화 전망, 코어 +0.3% 유지), 같은 날 JP모건·골드만삭스·씨티·웰스파고·뱅크오브아메리카 실적으로 Q2 어닝시즌 개막(S&P500 EPS +23.4% 예상). 케빈 워시 연준 의장의 취임 후 첫 통화정책 의회 증언도 화요일 시작된다.

## 1️⃣ 업종별 흐름

### 🔺 상승 업종

**① 플랫폼·AI 인프라 — 메타·엔비디아 쌍끌이**
대표주: 메타(META) +5.98%, 엔비디아(NVDA) +4.03%, 티모바일(TMUS) +3.38%, 어플라이드머티리얼즈(AMAT) +2.35%, AMD(AMD) +2.04%.
Meta Compute 발표와 SK하이닉스 데뷔 성공이 AI 밸류체인 심리를 재점화. 다만 메모리 경쟁주 약세로 SOX는 +0.06% 보합.
*시장의 시선: "AI 트레이드의 시험대였던 SKHY 상장이 통과됐다 — 메모리·GPU·장비 다시 매수."*
🇰🇷 [전달] SKHY +13% 성공에도 SOX는 +0.06% 보합에 그친 반면, 전일(7/10) 한국장은 KOSPI +2.52%·KOSDAQ +5.47%로 이미 급등 — 미국 금요일분을 상당 부분 선반영. [수급] SK하이닉스 외국인 −1.70조 원(ADR 이동·차익 매물 추정) vs 기관 +0.46조·개인 +1.21조, 삼성전자는 외국인 +0.19조·기관 +0.67조 양매수. [판정] SOX 보합 대비 한국이 초과 반영된 상태 — 삼성전자(양매수)는 상대 우위, SK하이닉스는 수급 소화·되돌림 경계 국면. (무효화: 월요일 외국인 SK하이닉스 순매도 1조 원 이상 지속 또는 SKHY ADR 급락 시)

**② 필수소비·유통 — 낙폭 방어주 리바운드**
대표주: 브라운포맨(BF-B) +3.77%, 클로록스(CLX) +3.75%, 나이키(NKE) +3.72%, 베스트바이(BBY) +3.51%, 달러트리(DLTR) +3.30%, 달러제너럴(DG) +2.76%.
위험선호 장세에서 소외됐던 방어 소비재가 저가 매수로 반등. 코카콜라(+1.04%)·킴벌리클라크(+2.26%)도 동반 상승.
🇰🇷 [전달] 미국 방어소비 반등은 국내 음식료·유통에 약한 양(+)의 신호. [수급] 급등장서 국내 방어주 수급 공백 지속. [판정] 단기 갭 반등 이상의 추세 신호는 아직 아님. (무효화: 미국 CPI 서프라이즈로 금리 급등 시 방어주 재소외)

**③ 통신타워·리츠 — 금리 안정 수혜**
대표주: 웨어하우저(WY) +4.22%, SBA커뮤니케이션즈(SBAC) +4.14%, 크라운캐슬(CCI) +3.89%, 아메리칸타워(AMT) +2.18%.
국채금리가 보합권에 머물자 금리 민감 리츠·타워주에 매수세.
🇰🇷 [전달] 국내 리츠·통신 인프라에 온건한 우호 신호. [수급] 국내 해당 섹터 수급 미미. [판정] 중립~약긍정. (무효화: 10년물 4.6%대 재돌파 시)

### 🔻 하락 업종

**① 사이버보안·소프트웨어 — AI 인프라로 자금 이탈**
대표주: 크라우드스트라이크(CRWD) −5.66%, 데이터독(DDOG) −4.26%, 포티넷(FTNT) −3.80%, 팔로알토(PANW) −3.67%, 오라클(ORCL) −2.48%, IBM(IBM) −2.62%.
악재 없이 차익실현성 매도. UBS가 크라우드스트라이크 목표가를 $235로 올렸음에도 하락 — "AI 인프라 고베타 종목이 소프트웨어 리더의 자금을 빨아들이는" 로테이션 국면.
*시장의 시선: "펀더멘털 훼손이 아니라 로테이션 — 그러나 상대 모멘텀은 당분간 AI 하드웨어."*
🇰🇷 [전달] 국내 보안·SW(더존비즈온·안랩 등)에 심리 부담. [수급] 국내 SW 외국인 수급 정체. [판정] 상대 약세 지속 가능성. (무효화: 미국 SW 실적 서프라이즈 시)

**② 바이오·제약 — 모더나 급락발 바이오 되돌림**
대표주: 모더나(MRNA) −10.83%, 길리어드(GILD) −3.72%, 일라이릴리(LLY) −2.33%, 버텍스(VRTX) −2.24%.
JP모건이 모더나 매도의견을 재확인하며 "재무 상황이 위태롭다(precarious)"고 평가. EU RSV 백신 2,400만 도즈 계약도 최소 구매량이 없다는 함정이 부각. 6월 +48% 급등 후 차익 되돌림 성격의 바이오 전반 약세(이뮤니티바이오·사렙타 −8%).
🇰🇷 [전달] 국내 바이오(알테오젠·에이비엘 등 KOSDAQ 바이오) 급등 직후라 되돌림 압력 겹칠 소지. 전일 KOSDAQ +5.47% 급등분의 일부가 바이오였다면 오버슈팅 주의. [수급] 셀트리온 기관 매수 지속(캐시 기준). [판정] 미국발 바이오 조정이 국내 단기 과열과 중첩 — 되돌림 후보. (무효화: 국내 개별 임상·기술수출 이벤트 발생 시)

**③ 항공·메모리 경쟁주**
대표주: 유나이티드항공(UAL) −2.36%, 델타항공(DAL) −1.81%, 사우스웨스트(LUV) −1.61%, 마이크론(MU) −1.24%, 인텔(INTC) −2.40%, 마벨(MRVL) −3.07%.
델타는 Q2 실적이 예상을 상회하고 연간 가이던스를 복원했지만 "상당한 연료비 부담"이 부각되며 하락, 항공 전반으로 확산. 마이크론은 SK하이닉스 미국 상장에 따른 수급 분산·점유율 우려로 약세.
🇰🇷 [전달] 유가발 항공 부담은 대한항공 등에 중립~약부정. 마이크론 약세는 '경쟁사 프리미엄' 논리로 SK하이닉스에 반사적 우위 해석도 가능. [수급] 위 반도체 항목 참조. [판정] 메모리 3강 구도 재편 관찰 구간. (무효화: SKHY ADR 하락 반전 시 반사 우위 논리 소멸)

> **요약 — 시장의 시선**: SK하이닉스 데뷔 성공으로 **AI 하드웨어·메모리(매수) ↔ 사이버보안·SW·바이오(차익실현)**의 종목 로테이션. 한국 적용 시 **전일 급등(KOSPI +2.52%·KOSDAQ +5.47%)으로 상당분 선반영** — 월요일은 추격보다 수급(외국인 SK하이닉스 매도 지속 여부) 확인이 먼저다.
