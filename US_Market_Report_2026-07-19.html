# 📈 미국증시 주말 리포트
### 구간: 2026년 7월 13일(월) ~ 7월 17일(금) · 주말(7/18~19)에는 새 정규장 없음

## 🗓 한 주 요약

**AI·반도체 트레이드가 'SK하이닉스 상장 축포' 일주일 만에 급반전된 한 주였다.** 월요일 호르무즈 봉쇄 재개發 유가 폭등(WTI 하루 +9.2%)으로 출발한 시장은, 화요일 CPI 서프라이즈 둔화(연 3.5%)로 반등했다가, 수~금 사흘간 반도체 셀오프가 이어지며 결국 나스닥 −2.90%·S&P500 −1.55%·다우 −0.93%로 주간 하락 마감했다. **SOX는 주간 −9.97% 폭락하며 금요일 장중 6월 고점 대비 −20%를 넘겨 베어마켓에 진입**했고, SK하이닉스 ADR(SKHY)은 화요일 +27% 폭등에서 목요일 −13.7% 폭락까지 오간 끝에 주간 −8.32%($154.03)로 마쳤다. 유가는 주간 +15.5%($82.47)로 치솟아 인플레·금리 경로의 새 변수가 됐다.

한국은 더 격렬했다. **7/16(목) KOSPI가 −6.37% 폭락**(삼성전자 −8.77%, SK하이닉스 −11.53%)하며 매도 사이드카가 발동됐고, 한국은행의 깜짝 금리 인상까지 겹쳤다. 7/17(금)은 제헌절 휴장으로, 한국 증시는 미국 금요일장의 저점 반등을 반영하지 못한 채 이틀 휴장 후 월요일을 맞는다.

## 📰 섹션 2 · 한 주간 주요 뉴스 5선

**1. SOX 주간 −9.97% — 반도체, 베어마켓 진입**
월요일 −4.78%(유가·금리 쇼크), 목요일 −4.29%(TSMC 자본지출 상향 → "메모리 과잉투자" 역해석), 금요일 −1.63%(장중 −20% 하회 후 저가매수 반등). 반도체 ETF(SMH)는 4주 중 3주째 주간 하락, 이번 주에만 약 9% 급락했다. **투자자 함의:** 조정의 성격이 '개별 악재'가 아니라 'AI 밸류에이션 재평가'로 확산되는 중 — 반등 시에도 변동성 상시화를 전제해야 한다.

**2. 호르무즈 봉쇄 재개 — WTI 주간 +15.5%**
트럼프 대통령이 이란 선박 봉쇄 재개를 발표하며 월요일 WTI가 +9.2% 폭등, 주 후반 $82선까지 올랐다. 해협 통항은 주간 52% 급감(Kpler), 브렌트는 장중 $87을 터치했다. **투자자 함의:** 유가발 인플레 재점화는 연준의 9월 인하 기대를 흔들 수 있는 최대 매크로 리스크. 정유(밸류체인)와 항공(원가)의 명암이 뚜렷하다.

**3. 6월 CPI 3.5%·PPI −0.3% — 디스인플레 확인, 7월 인상 확률 급감**
CPI가 전월 −0.4%(6년여 만의 최대 월간 하락)로 예상(3.8%)을 크게 밑돌았고 PPI도 −0.3%로 하회했다. 7/29 FOMC 인상 확률은 주초 44%에서 10%대로 급락. 케빈 워시 연준 의장은 취임 후 첫 의회 증언에서 "지난 5년의 인플레 급등은 과거가 될 것"이라면서도 '미션 완수'는 아니라고 선을 그었다. **투자자 함의:** 물가 둔화 vs 유가 급등의 힘겨루기 — 다음 지표까지 금리 변동성 구간.

**4. 중국 문샷 'Kimi K3' — 제2의 딥시크 모먼트**
2.8조 파라미터의 역대 최대 오픈소스 모델 Kimi K3가 공개되고, 상용 EDA 없이 오픈소스 툴만으로 48시간 만에 칩 설계 전 공정을 자동 완주하는 시연까지 겹치며 케이던스(CDNS) −9.47%·시놉시스(SNPS) −7.83% 급락, 금요일 글로벌 증시 전반의 'DeepSeek 쇼크 재림' 공포를 촉발했다. 엔비디아(NVDA)는 장중 시총 1위를 애플(AAPL)에 잠시 내줬다. **투자자 함의:** 저비용 중국 AI의 추격은 미국 AI 인프라 수요 논리(칩·EDA·전력)의 근간을 시험한다 — 반론(시연은 45nm급, 최선단 3nm·2nm과 거리)도 확인 필요.

**5. SKHY 롤러코스터와 한국 증시 폭락**
SKHY는 화요일 CPI 랠리에 +27.4%($194.16)까지 치솟았다가 수요일 −9.0%, 목요일 −13.69%로 급반락, 금요일 +1.13%($154.03)로 진정됐다(장중 IPO 공모가 $149 하회 후 회복). 서울에서는 7/16 KOSPI −6.37% 폭락과 사이드카 발동, 한국은행 깜짝 인상, 레버리지 반도체 ETF 거래 중단 조치까지 이어졌다. **투자자 함의:** ADR-원주-지수선물이 실시간으로 얽히는 새 구조에서, 미국장 급변이 한국 증시로 즉시 전이되는 변동성 체계가 형성됐다.

## 🌙 섹션 3 · 휴장·주말 신규 뉴스 5선 (다음 개장일 관전 포인트)

**1. '제2의 딥시크 쇼크' 논쟁 확산**
주말 내내 외신들이 Kimi K3를 "딥시크 모먼트의 재림"(Fortune), "중국이 미국의 AI 우위를 지웠다"(Axios)로 조명. 반면 시연의 45nm 공정 한계와 오픈소스 모델의 수익화 물음표를 지적하는 반론도 병존한다. **관전:** 월요일 아시아장에서 AI 밸류체인 재평가가 이어질지, 저가매수가 우위일지.

**2. 호르무즈 통항 마비 지속 — 유가 추가 상승 리스크**
주말에도 봉쇄·보복 공방이 이어지며 탱커 통항이 사실상 멈춘 상태. 브렌트 $87 터치 이후 시장은 공급 차질의 장기화 여부를 주시한다. **관전:** 월요일 아시아 시간대 유가 갭업 여부 — 갭업 시 금리·성장주에 재차 역풍.

**3. 레버리지 ETF발 개인투자자 손실 경고**
블룸버그는 AI 급락이 레버리지 펀드에 몰린 개인투자자들에 집중 타격을 주고 있다고 보도. 한국의 반도체 레버리지 ETF 쏠림(빚투)도 재차 리스크로 지목됐다. **관전:** 월요일 한국 개장 시 반대매매·강제청산성 매물 출회 여부.

**4. SK하이닉스, 7/22(수) 실적 발표 — $149 공모가 공방**
증권가는 SKHY의 $149 IPO 가격을 핵심 지지선으로 보고 있다(7배 기관 초과청약 물량의 심리적 방어선). $149 안착 시 $160~167 회복, 이탈 시 $140 지지 시나리오. HBM 점유율 58%의 펀더멘털 대 수급·밸류 논쟁이 실적으로 판가름난다. **관전:** 한국 원주(000660)와 ADR의 갭 재조정, 실적 가이던스.

**5. 다음 주 어닝 슈퍼위크 — 알파벳·테슬라(7/22)**
경제지표가 한산한 대신 실적이 몰린다. 알파벳(GOOGL)의 AI 자본지출 가이던스는 'AI 인프라 수요 건재' 논쟁의 직접 증거가 될 전망이며, 테슬라(TSLA)·텍사스인스트루먼트(TXN)·서비스나우(NOW) 등도 대기. S&P500 2분기 이익은 전년 대비 +23% 성장 예상, FOMC(7/28~29) 인상 확률은 10%로 후퇴. **관전:** 실적이 'AI 수익화 검증'을 통과하면 반도체 반등의 촉매, 실망 시 조정 연장.

## 🧭 섹션 4 · 다음 개장일(7/20 월) 섹터별 전망

**① 반도체·AI 하드웨어 — 이틀 휴장 뒤의 한국, '금요일 반등분'과 '주말 악재'의 줄다리기**
미국 금요일장은 SOX가 장중 베어마켓 진입 후 저가매수로 낙폭을 줄였고(−1.63%), SKHY도 +1.13% 반등하며 투매가 일단 진정됐다.
> 🇰🇷 [전달] 한국은 7/16 −6.37% 폭락(삼성전자 −8.77%·SK하이닉스 −11.53%)으로 미국 목요일분 악재까지 선반영한 뒤 7/17 휴장 — 금요일 미국장의 저점 반등분은 미반영 상태로, 전달 잔여는 소폭 양(+). 다만 SK하이닉스(000660)·삼성전자(005930)는 대미 베타가 높은 종목(베타 1.4~1.6)이라 주말 뉴스플로에도 민감. [수급] 지난주 외국인의 SK하이닉스 대규모 순매도 vs 기관 매수 대치 구도가 이어져 온 가운데, 레버리지 ETF 청산성 매물이 월요일 변수. [판정] '낙폭과대 기술적 반등 시도 후 수급 확인' 국면 — 반등의 지속성은 외국인 순매도 감속과 7/22 SK하이닉스 실적에 달렸다. (무효화: 월요일 SKHY 야간 급락 또는 외국인 반도체 순매도 1조 원 이상 재확대 시 반등 논리 소멸)

**② 에너지·정유 — 유가 주간 +15.5%의 수혜 지속**
발레로(VLO)·필립스66(PSX) 등 미 정유주가 주간 강세를 이어갔고, 유가 상승분의 마진 전이가 진행 중이다.
> 🇰🇷 [전달] 정제마진·재고평가 이익 기대는 S-Oil(010950)·SK이노베이션(096770)·GS(078930)에 양(+) 전달. [수급] 국내 정유주는 수급 공백이 길었던 만큼 순환매 유입 여지. [판정] 유가 $80대 유지 시 상대 강세 지속 후보 — 반대로 항공(대한항공 003490)은 원가 부담. (무효화: 호르무즈 사태 급반전·유가 급락 시)

**③ 방어주(헬스케어·보험·필수소비) — 로테이션 수혜 연장 여부**
유나이티드헬스(UNH)·애벗(ABT)·트래블러스(TRV)가 실적을 앞세워 주 후반 급등, AI 이탈 자금의 피난처가 됐다.
> 🇰🇷 [전달] 국내 제약·바이오 대형주와 보험·음식료에 온건한 양(+) 심리 전달 — 다만 미국은 '실적 동반' 로테이션이라 실적 없는 단순 방어주 추종은 한계. [수급] 급락장에서 국내 방어주로의 자금 이동은 아직 초기. [판정] 반도체 변동성 상시화 국면의 헤지 포지션으로 유효. (무효화: 반도체 V자 반등으로 위험선호 급반전 시)

**④ 금융 — 미 실적 호조 + 한은 인상의 이중 효과**
골드만삭스(GS)·블랙록(BLK) 등 미 금융주는 실적 서프라이즈로 주간 강세였다.
> 🇰🇷 [전달] 한국은행 깜짝 인상은 은행 NIM(순이자마진)에 양(+), 성장주 밸류에이션엔 음(−) — KB금융(105560)·신한지주(055550) 상대 우위 재료. [수급] 급락일(7/16)에도 금융주는 기관 매수 유입이 관찰된 업종. [판정] 금리 상승 국면의 상대 강세 후보. (무효화: 경기 급랭 우려로 인하 기대 급부상 시)

## 📅 섹션 5 · 주간 일정 (7/20~7/24)

- **7/20(월):** 한국 증시, 이틀 휴장 후 개장 — 금요일 미국 반등분 반영 + 레버리지 청산 매물 공방. 미국은 경제지표 한산.
