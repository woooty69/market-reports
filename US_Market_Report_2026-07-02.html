## 시장 요약

3분기 첫 거래일, 시장은 **반도체를 던지고 소프트웨어·금융·방어주를 사는 '뚜렷한 로테이션' 장세**로 마감했다. 나스닥 −0.66%(26,040.03), S&P500 −0.22%(7,483.23)로 지수는 눌렸지만, 다우(−0.03%)는 장중 사상 최고치(52,742.66)를 찍은 뒤 소폭 하락에 그쳤다. 지수를 끌어내린 건 오직 반도체다 — 필라델피아 반도체(SOX)가 **−5.39%(13,478.45)** 급락했고, 마이크론·샌디스크 −11%, KLA·테라다인 −12%, 인텔 −9%가 무너졌다.

핵심은 **시장이 'AI 인프라(칩·전력·데이터센터)'를 가장 나쁘게, 'AI 소프트웨어·금융·방어주'를 가장 좋게 봤다**는 점이다. 방아쇠는 셋이었다. ① **메타(+8.8%)의 클라우드 사업 진출** — 남는 컴퓨팅 파워를 외부에 팔겠다는 발표가 AWS식 위협으로 읽히며 코어위브(−14%)·네비우스(−12%) 등 AI 인프라주를 강타했다. ② **마이클 버리의 반도체 숏 공개** — 엔비디아($198.09)·어플라이드머티리얼즈($729.40)·SOXX($642.80)에 숏, "한국의 대규모 반도체 투자는 사이클 정점 신호 = 끝의 시작"이라 규정했다. ③ **차익실현** — 6월 30일 SOX +3.9% 이틀 랠리 직후의 되돌림. 반면 자금은 소프트웨어(팔란티어 +7.8%, 앱러빈 +9.6%)·금융(코인베이스 +8.9%, 로빈후드 +8.3%, S&P글로벌 +7.7%)·관리의료(엘레반스 +7.6%, 센틴 +6.5%)·음식료(제너럴밀스 +8.5%)로 이동했다.

매크로는 위험선호를 약화시키는 방향이었다. 6월 ISM 제조업 성장세가 둔화(물가는 소폭 하락)했고, 케빈 워시 의장은 ECB 포럼에서 금리 방향에 관한 힌트를 거의 주지 않은 채 "인플레이션을 끌어내리는 데 전념하겠다"고만 밝혔다. 워시 의장의 대차대조표 축소(QT) 기조가 금리를 밀어올려 **10년물이 4.48%로 상승**, 채권값 약세가 성장주 밸류에이션에 부담을 더했다. 유가는 $70 부근에서 안정됐지만(WTI −1.3%), 도하 미·이란 협상 관망 속 방향성은 제한적이었다.

## 📰 헤드라인 3선

1. **메타, 클라우드 사업 진출 선언 → +8.8%, AI 인프라주 붕괴.** 메타는 데이터센터·AI 인프라에 쏟아부은 잉여 컴퓨팅 파워를 외부 고객에 판매하는 사업을 만든다고 발표했다(AWS Bedrock식 AI 모델 접근권 판매·'원(raw)' 컴퓨팅 판매 검토). "인프라 공급자가 하나 더 늘어난다"는 해석에 코어위브 −14%, 네비우스 −12%, 엔비디아 −1.2%로 하락. AI 밸류체인 안에서 **'인프라 → 하이퍼스케일러/소프트웨어'로 수혜 축이 이동**했다.

2. **반도체 −5.4% 급락 — 마이클 버리 "칩 붐은 끝의 시작".** '빅쇼트' 마이클 버리가 엔비디아·어플라이드머티리얼즈·SOXX(및 테슬라·캐터필러·팔란티어) 숏을 공개하며 "**한국의 대규모 반도체 투자 발표가 사이클이 시작이 아니라 정점에 가까워졌다는 신호**"라고 주장했다. 6/30 이틀 랠리 뒤 차익실현과 겹쳐 마이크론·샌디스크 −11%, KLA·테라다인 −12%.

3. **팔란티어 +7.8% — 엔비디아 '소버린 AI' 파트너십.** 팔란티어가 엔비디아·Nemotron 오픈 모델을 미 정부·핵심 인프라용 보안 환경에서 구동하는 파트너십과 육군 수주를 공개하며 급등, 팔로알토네트웍스(+4%) 등 AI 소프트웨어 랠리를 이끌었다(엔비디아 본체는 하락). AI 투자 테마가 '칩'에서 '애플리케이션·소버린 AI'로 재편되는 흐름.

## 섹션 3. 마켓 구루·기관 코멘트

### (A) 증권사·기관·이벤트 5선

1. **마이클 버리(사이언 자산운용) — 반도체·AI 대규모 숏 공개.** 엔비디아($198.09)·어플라이드머티리얼즈($729.40)·SOXX($642.80), 추가로 테슬라·캐터필러·팔란티어 숏. *논리: "한국의 대규모 반도체 투자 발표는 사이클이 이제 막 시작이 아니라 정점에 가까워졌다는 신호 = 끝의 시작." AI 버블 경고.*

2. **메타 클라우드 진출 — 애널리스트 '수익화' 긍정 vs 인프라 경쟁 심화.** 잉여 컴퓨팅 파워 판매로 AI 인프라 투자 회수 기대(+8.8%). *함의: 하이퍼스케일러의 자본지출이 매출로 전환되는 신호이나, 코어위브·네비우스 등 순수 인프라 공급자에는 경쟁 위협.*

3. **팔란티어-엔비디아 소버린 AI 파트너십 — 강세 목표가 부각.** 정부·핵심 인프라용 보안 AI(Nemotron) + 육군 수주로 AI 소프트웨어 재평가(+7.8%), 팔로알토(+4%) 동반. *논리: AI 투자 수혜가 '칩'에서 '애플리케이션·데이터 플랫폼'으로 확산.*

4. **연준(케빈 워시 의장) — ECB 포럼서 '가이던스 최소화'.** 금리 방향 힌트를 거의 주지 않은 채 "인플레이션 억제 전념" 강조. QT(대차대조표 축소) 캠페인이 국채 금리를 밀어올려 10년물 4.48%로 상승. *함의: 시장의 정책 예측 가시성 저하, 채권 변동성 확대.*

5. **ISM 6월 제조업 — 성장 둔화·물가 하락.** 제조업 확장세가 약화되고 지불물가는 소폭 하락. *함의: 유가 하락과 맞물려 인플레 우려는 완화되나 경기 모멘텀 둔화 신호, 위험선호 약화의 배경.*

### (B) 구루·전략가 코멘트

- **마이클 버리:** "칩 붐은 시작이 아니라 끝의 시작." 반도체·AI 리더 전방위 숏으로 고점 경고를 행동으로 표현.
- **모틀리풀(마감 코멘트):** "칩 손실이 지수를 끌어내렸지만, 대다수 S&P500 종목은 인플레 완화에 상승." 즉 지수 하락은 소수 대형 반도체의 급락 탓, 시장 폭(breadth)은 오히려 개선.
- **참고(밸류에이션 경계론):** 같은 날 '버핏 지표 사상 최고' 등 고평가 경고 콘텐츠가 다수 — 반도체 고점 논쟁과 맞물려 3분기 초 조정 경계 심리 확산.
