## 🧭 시장 요약

6/23(화)은 **'칩-렉(chip-wreck)'의 날**이었다. 올해 시장을 끌어올린 주역인 반도체가 하루 만에 무너지며 나스닥이 **−2.21%**, S&P500이 **−1.44%**로 1주일 만의 최저로 마감했다. 반면 다우는 **−0.09%**로 거의 보합 — 자금이 빅테크·반도체에서 **필수소비재·헬스케어·유틸리티·보험 등 방어주로 대피**하며 지수 간 디커플링이 극심했다.

방아쇠는 둘이었다. ① **케빈 워시(Kevin Warsh) 의장 체제의 매파 기조** — 지난주 FOMC에서 위원 절반이 인상을 점친 데 이어, BofA가 "연준이 올해 0.25%p씩 세 차례 인상해 정책금리를 4.25~4.50%로 끌어올릴 것"이라는 보고서를 내놓으며 고금리 장기화 공포를 자극했다. ② **부채로 조달한 AI 투자(빚내서 짓는 데이터센터)의 지속가능성 의심** — 금리가 오르면 고밸류 성장주의 현재가치가 깎이고, 채권으로 AI 캐펙스를 대는 기업의 조달비용이 뛴다. 여기에 **아시아 증시 폭락(코스피 −10%, 삼성전자·SK하이닉스 −12%대)**이 미국 개장 전 투자심리를 무너뜨렸다.

필라델피아 반도체를 추종하는 **SMH ETF는 −6.5%**, 메모리 대표주 **마이크론(MU) −13%대·샌디스크(SNDK) −13.6%**가 하락을 주도했다. "맹목적 저가매수(buy the dip)가 오늘로 끝났다"(Triple D Trading)는 경계론과 "AI 혁명은 아직 3회 초, 가끔의 멘붕 구간일 뿐"(Strategy Asset Managers)이라는 반론이 맞섰다. 시장의 다음 시험대는 **24일(현지) 마이크론 실적**이다.

## 📰 헤드라인 3선

**1. 'AI 거품' 의심 + 매파 연준에 반도체 동반 폭락 — 시총 1조 달러 증발**
글로벌 칩 매도세로 하루 만에 1조 달러 안팎의 시가총액이 사라졌다. 마이크론·샌디스크 등 메모리주가 두 자릿수 급락했고, 엔비디아 −3.7%·AVGO −3.1%·AMD −5.8% 등 AI 대장주도 무더기 하락. "올해 세 자릿수 상승률을 낸 반도체가 갑자기 지속가능성 의심에 직면했다"는 평가.

**2. BofA "연준, 올해 3회 인상" — 워시 의장 매파 기조에 베팅 선회**
BofA는 워시 의장의 첫 FOMC(6/17) 매파 발언과 끈적한 인플레·견조한 고용을 근거로 인하 전망을 인상 전망으로 뒤집었다. 정책금리 목표를 현 3.50~3.75%에서 4.25~4.50%로. 2년물 금리가 선반영하며 위험자산 밸류에이션을 압박했다.

**3. 코스피 −10% '서킷브레이커' — 외국인 5.79조원 순매도**
미국 개장 전 한국 증시가 한때 6% 넘게 빠지며 20분간 거래가 멈췄고, 종가 −10%로 마감. 삼성전자·SK하이닉스가 12% 이상 급락. 외국인이 벤치마크 내 한국 비중 급등에 따른 리스크 한도 관리로 순매도를 쏟아냈다. 이 '아시아발 충격'이 미국 반도체 매도를 증폭시켰다.

## 🏛️ 섹션 3 — 구루·기관 코멘트

1. **BofA(매크로):** 연준이 올해 0.25%p씩 **3회 인상**, 정책금리 4.25~4.50% 전망(현 3.50~3.75%). 끈적한 인플레·견조 고용·유가가 근거. 고금리 장기화 → 고밸류 성장주 압박 논리의 핵심.
2. **모건스탠리(반도체):** 2026년 톱픽 **엔비디아·브로드컴·아스테라랩스** 유지. AMD 목표가 $255→**$360** 상향, 다만 등급은 Equal-Weight(상승 여지+불확실성 병존).
3. **BofA(엔비디아):** 목표가 **$320**(매수). "2026년은 AI 매출·ROI 가속의 해" — 단기 변동성과 무관하게 구조적 강세론 유지.
4. **Triple D Trading(데니스 딕):** "맹목적 저가매수로 돈을 벌던 시대가 **오늘로 끝났다**" — 쏠림 청산 경계.
5. **Strategy Asset Managers(톰 훌릭):** "재앙은 아니다. 시장은 매우 유동적이며 **AI 혁명은 3회 초**, 가끔의 '멘붕 구간(gut check)'일 뿐."

> **종합 시선:** 매도 트리거는 '매크로(고금리)'와 '미시(AI 캐펙스 지속성)'의 결합. Wall Street은 단기 변동성을 인정하면서도 AI 구조적 성장 서사 자체는 유지하는 분위기. **24일 마이크론 실적**이 메모리·AI 사이클 심리의 분수령.
