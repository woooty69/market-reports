# "수십조 매도 폭탄...!" 과연 그럴까? 계산해 봤습니다 | 빈센트 하나증권 애널리스트 [빈센트의 체크포인트]

> 채널: 삼프로TV 3PROTV | 게스트: 빈센트(하나증권 매크로 애널리스트) | 정리일: 2026-07-05 | 영상 길이: 38:48 | [영상 보기](https://www.youtube.com/watch?v=Ffifswczvx0)

> ⚠️ 증권사 애널리스트의 시장 전망·추정치가 담긴 매크로 분석 콘텐츠입니다. 투자 조언이 아니며, 수치·전망은 영상 시점(2026년 7월 초) 기준의 개인 견해입니다.

## 요약

### 총평 — "펀더멘탈은 바뀐 게 없다"

- 한 달 전보다 분위기는 불안해졌지만 빈센트는 "근본적으로 바뀐 게 없다"는 입장. 가파른 상승 뒤 수급 우려가 부각됐을 뿐, **수출 중심 펀더멘탈은 이상 없음**.

### 쟁점 ① 국민연금 매도 폭탄론 — "계산해 보면 과장"

- 우려의 핵심은 수급: 외국인은 계속 순매도, 개인이 받치는 구조에서 **국민연금이 팔 것인가**가 뜨거운 감자.
- 계산: 1분기 국민연금 총자산 약 1,526조, 국내주식 320조(21%). 2분기 시총 ~60% 상승 반영 시 국내주식 비중이 **약 28.5%**로 상승 추정.
- 목표 비중 20.8% + 전략적(SAA 6%)·전술적(TAA 2%) 운신폭 8% = **최대 28.8%까지 허용** → 지금 수준(28.5%)에서 **굳이 안 팔 수도 있음**(이사장도 "크게 안 판다"는 취지 발언).
- 판다고 가정해도: TAA 2%p 축소 시 ~30조, SAA까지 6%p ~100조, 전량 8%p ~138조. **전량 매도는 자기 발등 찍기라 거의 불가능**.
- **속도조절 장치**: 월간 매도 한도(총 보유액의 0.25~0.5%) = 약 **월 4조원**. 100조를 팔아도 2년 넘게 걸림. 반면 **개인은 연초부터 월평균 16조원 순매수** → 국민연금 월 4조는 충분히 흡수 가능. **결론: 과도한 패닉 불필요**.

### 쟁점 ② 실적·"1경 시대"

- 코스피 상장사 향후 1년 영업이익 컨센서스가 **약 1,000조(천조)** → 여기서 40% 더 늘면 시총 **1경** 시대도 가능하다는 낙관.
- 근거: **6월 수출 1,023억 달러(연 1조 달러 페이스, 사상 최대)**, 총수출 전년比 +70.9%. 그중 **반도체 448억 달러(+199.5%), 수출 비중 43.8%로 역대 최고**.

### 쟁점 ③ 삼성전자 실적(7/7 발표)

- 2분기 영업이익 눈높이가 100조 → **70조원 초중반**으로 하향됐지만, 이는 **상여금 충당금을 상반기에 보수적으로 반영**한 영향(노조 협상 타결분 등 이미 알려진 요인) → 하반기엔 그만큼 줄어들 여지. **실적 자체는 크게 걱정할 필요 없음**.

### 쟁점 ④ 반도체 — "사이클이냐, 인프라냐"

- 마이크론 실적에서 힌트: 기존 **LTA(장기공급계약)**를 넘어 **SCA(전략적 고객확약)** 등장 → 테이크오어페이(가져가든 안 가져가든 지급 의무)로 **구매자 부담 강화** = 단기 사이클을 벗어나려는 계약구조 변화.
- 마이크론이 16개 고객사(대형 4곳, 하나는 GM) 계약. 대형 고객은 **빅테크·하이퍼스케일러**로 추정(구글 7/22 실적 주목).
- 2차전지 LTA 취소 트라우마와 달리, "**영원한 건 없지만 벌어지지 않은 일을 미리 디스카운트할 필요 없다** → 지금은 밸류에이션을 줄 때."

### 쟁점 ⑤ 서남권 반도체 클러스터

- 삼성·SK가 **양사 시가총액에 맞먹는 규모**를 (10년에 걸쳐) 투자하는 이례적 프로젝트. 통상 물량 증가→가격 하락→사이클 둔화가 과거 패턴이나, 이번엔 "**AI는 시작도 안 했다**"는 강한 가정.
- 진행자 해석: 중국의 선제적 투자·기술추격 + 애플의 중국 메모리 구매 시도 등 "룰 치팅" 우려 속에서 **최태원·이재용 회장의 승부수(선제적 대전환)**일 수 있음. 현재 주가엔 아직 이 청사진이 크게 반영 안 됨(거품 지나면 재평가 기대).

### 쟁점 ⑥ 치플레이션 & 연준

- 메모리 가격 급등 → 노트북·스마트폰 가격 상승 → **성능 개선 없이 가격만 올라 수요 둔화**(치플레이션 확산 우려). 8월 미국 계절적 수요도 둔화 예상.
- 다만 빈센트는 **연준이 금리를 쉽게 못 올릴 것**으로 역발상 전망: 이란 전쟁 이전으로 회귀한 **유가 하락폭**이 치플레이션보다 크고 직접적, 미 CPI 정점은 **4분기**로 봄.
- **케빈 해셋 연준 의장(영상 기준)** 분석: 과거 포워드가이던스식 소통에서 **"전략적 모호성(블랙박스)"**으로 회귀 → 시장이 금리 인상으로 오해하기 쉬움(빈센트는 이를 '오해'로 봄). 연준 리모델링(5개 TF)을 **연내 완료**하겠다고 해, 하반기는 사실상 리모델링 기간이라 정책 변화가 어렵다는 정무적 해석(11월 선거 변수).

### 쟁점 ⑦ 환율

- 달러당 1,150원 돌파(원문). 달러 부족(외환보유·경상흑자·수출 1조달러)은 아니고, **쟁여둔 달러의 매도 회귀 부재**가 문제. 해결은 되겠지만 **시간이 오래 걸림**.
- 7월 한국은행 금리 인상 전망(경기 양호). 금리차만으로 환율이 급변하진 않으나, "미국은 2회+ 인상"이라는 기대가 "못 올린다"로 바뀌고 한국이 **점진적(step by step) 인상**을 이어가면 원화 약세를 상당 부분 완화할 수 있음.

### 코스닥 30주년

- 1996년 개장 후 30년은 **자금조달(양적 성장) 시장**이었을 뿐(시총 500조 미만). 정부가 **선별(AI·바이오·딥테크)** 방향 제시, 4분기(9월말~10월) **승급·승강제** 도입 예정 → 3분기(7~9월)는 변동성 격화 예상. 연초 '천닥' 기대는 다소 후퇴.

### 7월 결론 & 조언

- 수급·두려움은 **시간(기간 조정)**이 해결. 변동성은 매우 큼(사이드카 2008년 이후 최다). 그러나 작년 9월부터 시작된 상승 기세의 중심엔 **실적(숫자)**이 있음.
- 7월 일정: **7/7 삼성전자, 7/10 SK하이닉스 ADR, 7/22 구글 실적(자본지출 톤이 관건), 7/22~27 SK하이닉스**.
- 스탠스: **"밀리면 사자"** 유지. 지금은 **선택과 집중**의 시기. 6월 초 대비 FOMO가 식은 국면에서 대중과 반대로 견제하는 관점을 권함.
