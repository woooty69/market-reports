# 미국 증시 24시간 데일리 리포트
### 2026년 6월 5일(금) 작성 — 직전 미국 정규장(6/4) 세션

**주요 지수·자산**

| 지수·자산 | 지수/가격 | 등락 |
|---|---|---|
| 나스닥 | 26,830.96 | -0.09% |
| S&P 500 | 7,584.31 | +0.41% |
| 다우 | 51,561.93 | +1.73% (사상 최고) |
| WTI유 | ≈$93.7 | -3.1% |
| 美 10년물(금리) | ≈4.43% | 하락 |

> **시장 요약 — '대순환매(Great Rotation)' 본격화** — **다우가 +1.73%(+874p) 사상 최고치(51,561.93)** 로 마감한 반면 **나스닥은 -0.09%** 로 엇갈렸다. 방아쇠는 **브로드컴(AVGO) -12.6% 쇼크**(매출 소폭 미스) — 이를 계기로 AI/반도체에서 자금이 대거 이탈해 **금융·헬스케어·리츠·산업재 등 '실물·가치'로 이동**했다. 시에나(CIEN) -13.7%·마이크론(MU) -7.7% 등 칩이 무너진 자리에 UNH(+5.2%)·블랙스톤(+8%)·JP모건(+3.3%)이 들어섰다. 전일 급등했던 유가는 이란 우려 완화로 **WTI -3.1% 반락**.

**📰 시장 헤드라인 3선**

1. **다우 신고가 vs 나스닥 약세 — 순환매 본격화**: 다우 +1.73%(51,561.93)로 사상 최고, 8/11 섹터 상승(헬스케어 +3.1%·금융 +2.7%·리츠 +1.9% 주도). 나스닥은 칩 매도로 -0.09%. 'AI 일변도'에서 시장 폭이 넓어지는 전환.
2. **브로드컴 -15% 쇼크가 AI 차익실현 촉발**: 브로드컴(AVGO) FQ2 매출 221.9억 달러(예상 222.7억)로 소폭 미스 → -12.6% 급락. 시에나(CIEN -13.7%)·마이크론(MU -7.7%)·AMD(-3.6%)·아리스타(ANET -4.8%) 등 AI/칩 연쇄 하락. "AI 익스포저 축소" 로테이션.
3. **자금, 금융·헬스케어·리츠로 — 유가는 반락**: UNH +5.2%·JP모건 +3.3%·블랙스톤(BX) +8%·금리 하락에 금융·헬스케어·부동산이 시장을 견인. 이란-쿠웨이트 긴장 완화로 WTI -3.1% 반락(전일 급등 되돌림). 알파벳(GOOGL)은 +3.7% 반등.

→ **한국 연관(유추)**: 제약·바이오 대형주, 의료기기, 헬스케어 ETF.

**① 반도체·AI 하드웨어 — 차익실현 직격**
주요: 브로드컴(AVGO) -12.59%, 시에나(CIEN) -13.66%, 마이크론(MU) -7.74%, 아리스타(ANET) -4.79%, AMD(AMD) -3.56%, 퀄컴(QCOM) -2.98%, 램리서치(LRCX) -2.12%.
보도: 브로드컴의 소폭 매출 미스가 'AI 고밸류'에 대한 차익실현 빌미. 엔비디아(NVDA +1.8%)만 차별적으로 버팀.
→ **한국 연관(주의)**: **삼성전자·SK하이닉스·반도체 소부장** 단기 변동성 가능 — 단, 메모리 펀더멘털(HBM 수요)과 구분해서 볼 것.

주요: 버라이즌(VZ) -3.82%, AT&T(T) -3.31%, T모바일(TMUS) -2.44%.
보도: 금리 민감·저성장 통신주가 순환매 자금 이동 속 소외.

**③ 사이버보안·일부 SW**
주요: 크라우드스트라이크(CRWD) -3.82%, 인튜이트(INTU) -3.04%, 데이터독(DDOG) -2.69%.
보도: 실적·고밸류 부담 지속. 단, 소프트웨어 전반은 알파벳·오라클(+2.6%) 반등으로 혼조.

> **요약 — 시장의 시선**: AI/칩 고밸류에서 **금융·헬스케어·리츠·산업재 등 '실물·가치'로의 대순환매**가 본격화. 한국 적용 시 **은행·제약/바이오·리츠·전력기기 우호**, **반도체는 단기 변동성 주의(중장기 펀더멘털과 구분)**.

## 3. 마켓 구루·기관 코멘트 (+ 언론 최다 인용 증권사 리포트 5선)

### 📑 언론 최다 인용 증권사 리포트 5선

**① Great Rotation 전략(Goldman·Morgan Stanley·JPM)**: 금융·산업재 '비중확대' — 오늘 현실화. "AI 하드웨어 공급자에서 **채택자·실물경제**로의 전환." 은행·헬스케어·리츠 강세가 이 논리를 입증.

**③ UBS — 마이크론(MU)**: 목표가 $1,625, "메모리는 구조적 성장자산". 오늘 -7.7% 급락은 'AI 로테이션' 영향이며 HBM 펀더멘털과 구분해야 한다는 입장. → 한국 **SK하이닉스·삼성전자** 단기 노이즈 vs 중장기 분리.
