## 🧭 시장 요약

**이틀 연속 '물가 서프라이즈'가 지수를 밀어올렸지만, 메모리 반도체가 다시 급락하며 시장이 둘로 갈라졌다.** 6월 생산자물가(PPI)가 전월 대비 **−0.3%**(예상 0.0%)로 전일 CPI에 이어 하회하자 7월 인상 확률이 42%→17%로 급감했고, 뉴욕 연은 윌리엄스 총재는 "인플레이션이 정점을 지났다고 기대할 근거가 있다"고 말했다. 3대 지수는 동반 상승, **애플(+4.01%)이 사상 최고가를 경신**하며 나스닥(+0.62%)을 견인했다.

**그러나 메모리·반도체는 '중국발 경쟁 쇼크'로 사흘 만에 다시 무너졌다.** 중국 창신메모리(CXMT)가 상하이 STAR 상장으로 약 85억 달러 조달(시가총액 800억 달러대)을 추진하며 D램 경쟁 격화 우려가 부상, 마이크론 −8.02%, SK하이닉스 ADR −9.00%, 웨스턴디지털 −8.78%, 샌디스크 −8.13%가 급락했고 SOX는 −2.08%로 밀렸다. ASML이 AI 수요를 근거로 연간 가이던스를 상향(+2.87%)했지만 메모리 매도세를 막지 못했다. 월요일 급락→화요일 급등→수요일 급락, 메모리주의 롤러코스터가 이어지는 중이다.

**개별 이벤트로는 페이팔이 스트라이프+어드벤트 컨소시엄의 주당 $60.50(총 530억 달러) 인수 제안에 +17.21% 폭등**, 2015년 분사 이후 최대 상승을 기록했다. 워시 연준 의장은 첫 상원 증언에서 "최근 물가 개선은 '임무 완수'가 아니다"라며 9월 인상 여지를 남겼다. 금리는 소폭 하락(2년물 4.15%·10년물 4.56%), 유가는 미국의 이란 추가 공습·호르무즈 봉쇄 재개 속에도 $80 부근 보합($79.75)에 머물렀다.

## 📰 시장 헤드라인 3선

**1. 6월 PPI −0.3% '깜짝 하락' — CPI 이어 이틀 연속 디스인플레 확인**
도매물가가 2025년 8월 이후 첫 월간 하락(예상 0.0%)을 기록, 연율 5.5%로 둔화됐다. 7월 인상 확률이 42%→17%로 급감했고 윌리엄스 뉴욕 연은 총재의 "인플레 정점 통과" 발언이 위험선호를 지지했다. 다만 워시 의장은 상원 증언에서 "임무 완수가 아니다"라며 신중론을 유지했다.

**2. 페이팔 +17.2% — 스트라이프·어드벤트, 주당 $60.50·530억 달러 인수 제안**
스트라이프와 어드벤트 인터내셔널이 약 500억 달러의 은행 자금조달을 확보한 공동 인수안을 제시(전일 종가 대비 28% 프리미엄). 거래량은 3개월 평균의 5배가 넘는 8,900만 주로 폭증, 분사 후 최대 일간 상승을 기록했다.

**3. 중국 CXMT發 메모리 쇼크 — 마이크론 −8%, SK하이닉스 ADR −9%**
창신메모리가 STAR 상장으로 목표의 2배인 85억 달러 조달을 추진하며 중국 메모리 경쟁 우려가 재점화됐다. 마이크론(−8.02%)·SK하이닉스 ADR(−9.00%)·샌디스크(−8.13%)·웨스턴디지털(−8.78%)이 동반 급락, 화요일 반등분을 대부분 반납했다.

## 1️⃣ 업종별 흐름

### 🔺 상승 업종

**① 메가캡 빅테크 — 반도체에서 플랫폼으로 순환매**
대표주: 애플(AAPL) +4.01%(사상 최고), 알파벳(GOOG) +3.61%, 오라클(ORCL) +3.56%, 메타(META) +3.07%, 아마존(AMZN) +3.02%, 마이크로소프트(MSFT) +2.78%.
애플은 중국 내 생성형 AI 기능 출시 승인 보도와 AI 칩 스타트업 인수 검토 소식이 겹치며 급등. 반도체에서 빠진 자금이 밸류에이션 부담이 상대적으로 덜한 메가캡으로 이동했다.
*시장의 시선: "칩이 흔들릴 때는 플랫폼으로 — AI 랠리의 무게중심이 이동 중."*
*🇰🇷 [전달] 애플 사상 최고는 LG이노텍(011070)·비에이치(090460) 등 애플체인에 우호적이나, 캐시 기준 국내 애플체인의 SOX 갭베타는 낮아 전달력은 제한적. [수급] 전일 한국장 급등(코스피 +6.2%)에서 외국인·기관 동반 유입 확인. [판정] 메가캡 훈풍은 국내 플랫폼·부품주에 완충재 역할 (무효화: 미국 메가캡 −2% 이상 반락 시).*

**② 자산운용·은행 — 실적 시즌 순항**
대표주: 블랙록(BLK) +6.63%, 인베스코(IVZ) +5.47%, BNY(BNY) +5.08%, KKR(KKR) +3.85%, 웰스파고(WFC) +2.60%.
블랙록 실적 호조에 자산운용주가 일제히 급등. 전일 JP모건·골드만삭스에 이어 "은행 환경은 거의 최상"(다이먼)이라는 톤이 이어졌다.
*🇰🇷 [전달] 국내 증권·운용주에 실적 기대 우호. [수급] 캐시 top_signals에 삼성증권(016360)·NH투자증권(005940) 외국인 매도 감속 신호. [판정] 거래대금 회복 국면과 맞물려 상대 강세 여지 (무효화: KOSPI 거래대금 30조 원 미만 위축 시).*

**③ 결제·여행 소비 — 페이팔 이벤트 + 경기 연착륙 기대**
대표주: 페이팔(PYPL) +17.21%, 부킹홀딩스(BKNG) +4.55%, 로열캐리비안(RCL) +3.21%, 타깃(TGT) +3.20%.
페이팔 인수 제안이 핀테크 전반의 M&A 기대를 자극했고, 물가 둔화가 소비주 심리를 지지했다.
*🇰🇷 [전달] 국내 핀테크·PG(카카오페이 등) 심리 개선 재료. [판정] 단발성 이벤트 성격이 강해 추격보다는 참고 (무효화: 인수안 무산 보도 시).*

### 🔻 하락 업종

**① 메모리·스토리지 반도체 — CXMT發 중국 경쟁 쇼크**
대표주: 마이크론(MU) −8.02%($904), 웨스턴디지털(WDC) −8.78%, 샌디스크(SNDK) −8.13%, 마벨(MRVL) −7.27%, 인텔(INTC) −4.43%, 델(DELL) −9.81%(전일 +7.1% 반납).
CXMT의 대규모 상장 추진이 'AI 메모리 슈퍼사이클'의 가격 결정력 논리를 흔들었다. 델·루멘텀(LITE −7.71%)·넷앱(NTAP −7.13%) 등 서버·하드웨어까지 동반 하락. 다만 엔비디아(NVDA) +0.33%·브로드컴(AVGO) +1.33%는 방어하며 SOX 낙폭을 −2.08%로 제한.
*시장의 시선: "AI 수요는 의심 안 하지만, 메모리 '가격'은 의심하기 시작했다."*
*🇰🇷 [전달] 전일 한국장은 코스피 +6.24%·SK하이닉스 +12.7%로 미국 화요일 반등을 하루 만에 초과 반영(오버슈팅 영역) — 그 직후 미국 메모리가 −8~−9% 급락해 금일 되돌림 압력이 크다. 캐시 transfer_gap 삼성전자 +5.9·SK하이닉스 +4.4의 '전달 잔여'는 전일 급등으로 사실상 소진. [수급] SK하이닉스(000660) 외국인 +0.71조·기관 +0.56조 원(2일 연속 순매수, 7/13 −1.4조에서 전환), 삼성전자(005930) 외국인 +0.51조 원 전환 — 매도 클라이맥스 통과 후보. [판정] 갭다운 출발 후 외국인 순매수 유지 여부가 분수령, 수급 전환이 유효한 만큼 패닉 추종 매도는 경계 (무효화: 외국인 당일 −0.3조 원 이상 재순매도 또는 SKHY ADR 프리미엄 추가 급축소 시).*

**② 보험 — 실적 실망발 급락**
대표주: 프로그레시브(PGR) −9.43%, 이리인뎀니티(ERIE) −11.86%, 올스테이트(ALL) −4.34%, 엘레반스헬스(ELV) −8.54%.
프로그레시브 등 손해보험 실적 실망에 업종 전반이 급락했고, 엘레반스는 이익이 예상을 웃돌고도 마진 우려에 −8.5% — 헬스보험 약세가 이어졌다.
*🇰🇷 [전달] 국내 손보·생보주와의 직접 연동은 낮음, 심리 참고 수준.*

**③ 네트워크·통신장비 — 차익실현 확산**
대표주: 시스코(CSCO) −4.54%, 코닝(GLW) −7.05%, 아리스타(ANET) −5.83%, HPE(HPE) −4.38%, 시에나(CIEN) −6.37%.
AI 네트워킹 수혜주들이 메모리 급락에 동반 조정. 최근 급등 폭이 컸던 만큼 차익실현이 집중됐다.
*🇰🇷 [전달] 국내 광통신·네트워크 부품주 단기 조정 압력.*

> **요약 — 시장의 시선**: 물가 둔화(매수)와 중국 메모리 경쟁(매도)이 충돌하며 **메가캡·금융 ↔ 메모리·하드웨어**로 시장이 양분. 한국 적용 시 **전일 +6%대 급등의 되돌림 vs 외국인 순매수 전환**이 맞서는 구간 — 반도체는 변동성 관리가 우선.
