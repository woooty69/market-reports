## 🗓 시장 요약

6월 생산자물가(PPI)가 전월 대비 **−0.3%**로 예상(0.0%)을 밑돌며 디스인플레이션이 재확인됐고, 여기에 애플의 사상 최고가 경신과 은행·자산운용사의 실적 호조가 겹치며 3대 지수가 모두 상승 마감했다. 다만 시장은 **뚜렷한 양분(兩分) 장세**였다. 애플·알파벳·메타 등 메가캡 플랫폼과 금융주가 지수를 끌어올린 반면, 전일 폭등했던 **메모리·반도체는 대거 차익실현 매물**에 휩쓸려 필라델피아 반도체 지수(SOX)는 −2.08% 하락했다.

소프트 PPI에 국채는 강세(금리 하락)를 보였고, 2년물이 10년물보다 더 크게 내리며 **커브가 스티프닝**(10-2년 스프레드 +4.15bp)됐다. 위험선호가 살아나며 VIX는 15.67로 5% 하락했고, 달러지수는 100.36으로 약세, WTI 유가는 $80.24로 반등했다.

특히 전일(7/14) +27% 폭등했던 **SK하이닉스 ADR(SKHY)은 −9.00% 되돌림**하며 마이크론(−8.2%)·샌디스크(−8.1%)·WDC(−8.8%) 등 메모리 전반의 조정을 함께 받았다.

## 📰 시장 헤드라인 3선

**1. 6월 PPI −0.3%, 예상 하회 → 디스인플레이션 재확인·국채 랠리**
6월 생산자물가가 계절조정 기준 전월 대비 0.3% 하락하며 '변동 없음' 컨센서스를 뒤집었다. 도매물가 둔화는 소비자물가 둔화 흐름과 맞물려 9월 금리인하 기대를 지지했고, 2년물 금리는 4.14%까지 밀렸다.

**2. 애플, 중국 생성형 AI 승인 보도에 사상 최고가 — 메가캡 랠리 견인**
애플이 중국 내 생성형 AI 기능 출시 승인을 받았다는 보도에 +4.01% 급등한 $327.50로 사상 최고가를 새로 썼다. 알파벳(+3.17%)·메타(+3.07%)·아마존(+3.00%)·마이크로소프트(+2.78%)도 동반 강세를 보이며 나스닥을 밀어올렸다.

**3. 은행·자산운용 실적 호조 vs 메모리 반도체 급락**
블랙록이 2분기 실적이 월가 예상을 웃돌며 1년여 만에 최대폭인 +6.63% 상승했고 모건스탠리도 EPS·매출 모두 예상을 상회했다. 반면 마이크론·샌디스크·WDC 등 메모리주는 전일 급등에 대한 차익실현으로 8% 넘게 급락, SOX를 끌어내렸다.

애플(AAPL) +4.01%, 알파벳(GOOGL) +3.17%, 메타(META) +3.07%, 아마존(AMZN) +3.00%, 마이크로소프트(MSFT) +2.78%. 애플의 중국 생성형 AI 승인 보도가 촉매가 됐고, 소프트 PPI에 따른 금리 하락이 성장주 밸류에이션에 우호적으로 작용했다.

## 🧭 섹션 3 · 구루 · 기관 코멘트

**바클레이즈 — SK하이닉스 ADR 'Overweight', 목표가 $342.5**
메모리 공급 부족이 가격 인상으로 이어져 매출을 끌어올릴 것이라며, 현재가 대비 약 94% 상승여력을 제시. 다만 상장 초기 변동성(전일 +27% → 당일 −9%)이 극심해 단기 방향성은 불안정.

**ASML — 반도체 장비 수요 낙관 가이던스**
칩 장비 대장주 ASML의 강세 전망이 장 초반 반도체 투자심리를 지지했으나, 메모리 차익실현 흐름을 되돌리진 못했다.

**스티븐 이네스(SPI) — "은행이 빛나고, 소프트 인플레가 채권을 들어올렸다"**
소프트 물가 지표가 국채 랠리와 은행주 강세를 동시에 견인했으나, 지수 아래에서 반도체·보험 등 균열도 함께 드러났다고 평가.

**모건스탠리 2Q 실적** — EPS $3.46, 매출 $21.35B로 예상 상회. 대형 IB·트레이딩 호조 확인.

**루이스 나벨리어** — 지정학 불확실성에도 미 증시의 상승 탄력이 견조하다고 진단.
