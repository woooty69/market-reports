# 미국 증시 24시간 데일리 리포트
### 2026년 6월 3일(수) 작성 — 직전 미국 정규장 세션

**주요 지수·자산**

> **시장 요약 — "대순환매(Great Rotation)"의 하루** — 빅테크·소프트웨어에서 자금이 빠져 **반도체장비·산업재·은행·유틸리티**로 이동. 두 축이 동시에 작동했다. ① **휴렛팩커드 엔터프라이즈(HPE)의 어닝 폭등(+19.47%)** — AI 서버·네트워크 수요가 하드웨어로 번지는 증거. ② **'SaaSpocalypse'** — AI 에이전트가 좌석당 과금(SaaS) 모델을 위협한다는 공포로 소프트웨어 일제 급락(인튜이트(INTU) -8.94%, 서비스나우(NOW) -6.04%, 세일즈포스(CRM) -4.18%, 마이크로소프트(MSFT) -4.17%). 시장은 'AI를 파는 기업(하드웨어·장비)'은 좋게, '사람 수로 돈 버는 소프트웨어'는 나쁘게 보기 시작했다.

**📰 시장 헤드라인 3선**

1. **HPE 어닝 폭등 — "AI가 칩을 넘어 하드웨어로"**: 휴렛팩커드 엔터프라이즈(HPE)가 분기 매출 +40%, AI 수주 21억 달러, 네트워킹 +148%의 어닝 서프라이즈로 +19% 폭등. AI 인프라 수요가 서버·네트워크 장비로 확산된다는 신호로, 슈퍼마이크로·시스코·광통신주(코히어런트·루멘텀)까지 동반 강세.
2. **'SaaSpocalypse' — 소프트웨어 일제 급락**: AI 에이전트가 '좌석당 과금(per-seat)' SaaS 모델을 무력화한다는 공포로 인튜이트(INTU) -8.9%·서비스나우(NOW) -6%·세일즈포스(CRM)·마이크로소프트(MSFT) -4%대 급락. Goldman은 "Results-as-a-Service(성과당 과금)"로의 구조 전환을 매도 핵심으로 지목.
3. **반도체장비 슈퍼사이클 + 엔비디아 PC칩**: 젠슨 황의 Computex 키노트가 "AI 칩 사이클의 규모·기간을 재정의", 마이크론 capex 확대·WFE 1,400억 달러 전망에 어플라이드(AMAT)·램리서치(LRCX) 등 장비주가 랠리. 빅테크→반도체장비·경기 실물로의 '대순환매' 동력.

## 2. 업종별 흐름 — 시장이 좋게/나쁘게 보는 곳 (+ 한국 연관 유추)

주요: 어플라이드 머티어리얼즈(AMAT) +6.96%, 램리서치(LRCX) +5.45%, KLA(KLAC) +5.42%, 테라다인(TER) +6.27%, 퀄컴(QCOM) +5.18%, 브로드컴(AVGO) +4.70%, 마이크론(MU) +2.76%.

주요: 웰스파고(WFC) +2.94%, 피프스서드뱅코프(FITB) +3.60%, M&T뱅크(MTB) +2.68%, JP모건(JPM) +1.48%, 골드만삭스(GS) +1.53%.

→ **한국 연관(유추)**: 밸류업·금리 수혜 **KB금융·신한지주·하나금융지주**, 증권 **한국금융지주**.

**③ 결제·거래소·금융데이터**
주요: Cboe(CBOE) -8.44%, 팩트셋(FDS) -5.55%, 나스닥(NDAQ) -5.28%, 코인베이스(COIN) -4.72%, 마스터카드(MA) -3.55%, S&P글로벌(SPGI) -2.59%.
보도: 고밸류 '금융 플랫폼·데이터' 차익실현. 은행(전통 금융)은 사고 고밸류 핀테크·데이터는 파는 금융 내 차별화.

> **요약 — 시장의 시선**: 좋게 보는 곳 = **AI를 '만드는' 하드웨어·장비, 그리고 경기·금리 수혜 실물(산업재·은행)**. 나쁘게 보는 곳 = **AI에 '대체당할' 소프트웨어·IT서비스·고밸류 플랫폼**. 한국 적용 시 **반도체·전력기기·은행 우호 / 인력·SaaS 모델 경계**.

## 3. 마켓 구루·기관 코멘트 (+ 언론 최다 인용 증권사 리포트 5선)

### 📑 언론 최다 인용 증권사 리포트 5선

**① UBS — 마이크론(MU) 목표가 $1,625로 대폭 상향**
"메모리 공급부족이 최소 2028년 2분기까지 지속"될 것이라며, 메모리를 **'경기순환 트레이드'가 아니라 '구조적 성장 자산'**으로 재평가. 그동안 첨단 로직(GPU)에만 적용하던 밸류에이션 모델을 메모리에 적용하기 시작. → 한국 **SK하이닉스·삼성전자** HBM/DRAM에 직접적 함의.

**② Morgan Stanley·Mizuho·Goldman — 램리서치(LRCX)/반도체장비 '비중확대'**
Mizuho 목표가 $330→$380(Outperform), Morgan Stanley는 NAND 시스템 +59% 전망에 '비중확대'·목표가 $331, Goldman은 2026 WFE 약 1,400억 달러 전망에 "램리서치(LRCX)는 증착·식각·NAND 업그레이드 노출로 **아웃퍼폼에 잘 포지셔닝**." 장비 슈퍼사이클이 컨센서스화. → 한국 장비주(**한미반도체·HPSP·원익IPS**) 동행 가능성.

**③ Bank of America — 칩 장비 3사(LRCX·KLAC·AMAT) 최선호**
마이크론(MU)·삼성의 HBM/DRAM capex 확대(2026 메모리 WFE 약 1,120억 달러)가 장비주에 강한 순풍이라고 분석. "AI 인프라 투자가 칩을 넘어 칩 만드는 장비로 낙수"라는 논리.

**④ Wedbush — 소프트웨어 매도는 "과도(disconnected)"**
서비스나우(NOW)·세일즈포스(CRM) 급락은 과매도이며, **"OpenAI·Anthropic이 본격 엔터프라이즈 SW 공룡으로 진화한다는 공포는 비약"**이라 평가. 밸류에이션이 10년래 최저 수준이라며 '저가매수 기회'로 제시. (Dan Ives는 별도로 애플(AAPL) 목표가 $400 유지, AI 슈퍼사이클 'NVDA·AMD·MU·MSFT·ORCL' 선호.)

**⑤ Oppenheimer — 엔터프라이즈 SW '애플리케이션 레이어'로 자금 재배분**
서비스나우(NOW) 반등을 "순수 인프라 AI 플레이에서 **응용단(application layer)** 기업으로의 자금 이동"으로 해석. AI 수요가 칩·인프라를 넘어 소프트웨어 응용단으로 번질 수 있다는 반론. (RTX Spark가 AI 에이전트를 'SW를 대체'가 아니라 'SW 위에서 구동'으로 재정의한 점이 내러티브 반전 계기.)

> ※ 소프트웨어를 두고 **Goldman(구조적 약세 'Results-as-a-Service') vs Wedbush·Oppenheimer(과매도·저가매수)** 로 의견이 정면 충돌. 이날 시세는 약세 쪽이 우위였으나, 양측 논리를 함께 보는 게 방향 판단에 유용.

### 🗣 구루·기관 코멘트

**① Goldman Sachs (전략팀) — "Results-as-a-Service"**: 소프트웨어 매도의 본질은 단순 밸류에이션이 아니라 **과금 모델의 구조적 전환**. "기업은 이제 SW에 접속하는 사람 수가 아니라, 검토된 계약·해결된 티켓·구축된 영업 파이프라인 같은 **'결과'에 비용을 낸다.**" 좌석당 매출 공식이 흔들린다는 경고.

**② Goldman·Morgan Stanley·JPMorgan (공동 흐름) — "AI 슈퍼사이클 2단계 = 채택자의 해"**: **금융·산업재를 '비중확대'로 상향.** "2024~25년이 AI 하드웨어 공급자(엔비디아 등)의 시대였다면, 2026년은 AI를 실제로 쓰는 **'채택자'·실물경제의 해**." 금리 안정·리쇼어링·M&A 회복(+20%)을 근거로 제시. 최대 리스크는 **인플레 재가속 → Fed 중립 포기**.

**③ Antonio Neri (휴렛팩커드 엔터프라이즈/HPE CEO) — "수요의 지속성"**: "우리의 확신은 **AI 배치·데이터센터 현대화가 이끄는 수요의 지속성**에서 나온다." AI 수주 21억 달러·네트워킹 +148%를 근거로 AI 인프라 투자가 구조적임을 강조.

**④ Jensen Huang (엔비디아/NVDA CEO) — "AI 칩 사이클 재정의"**: Computex 키노트에서 RTX Spark PC칩 공개·CPU/GPU 공급능력 확보를 강조하고 **마벨(MRVL)을 "다음 1조 달러 기업"**으로 지목. 애널리스트들은 "AI 칩 사이클이 얼마나 크고 길지 다시 그렸다"며 장비주까지 동반 급등.

**⑤ 퀄컴·인텔 임원 — 엇갈린 반응**: 퀄컴(QCOM) SVP **Kedar Kondap**은 엔비디아 PC 진출을 "Arm 생태계 전체에 대한 인정"으로 해석. 반면 인텔(INTC) 제품 담당 시니어 디렉터는 "**건강한 수준의 경계심**으로 본다"며 Windows-on-Arm의 호환성·DRM 한계를 지적.

**⑥ Michael Burry ('빅쇼트') — "닷컴 막바지"**: Shiller CAPE 40선의 고밸류 집중 경고. 이날 소프트웨어·고밸류 플랫폼 차익실현과 맞물려 '버블 후반' 경계론 재부각.

**⑦ Tom Lee (Fundstrat) — 낙관 유지**: S&P500 연말 7,700, 변동성·조정을 매수 기회로 해석. AI 혁명 초기 국면이라는 입장.
