## 🧭 직전주 요약 — '고용 쇼크 + AI 언와인드'가 갈라놓은 연휴 직전

연휴(7/3~5) 직전 시장은 **두 갈래로 극단 분화**했다. 6월 비농업 고용이 **+5.7만 명**(컨센서스 약 +11.3만~11.5만의 절반)에 그치고 5월치도 하향되자, **7월 금리인상 기대가 후퇴**하며 금리민감 디펜시브(헬스케어·유틸리티·필수소비재)로 순환매가 유입됐다. 실업률은 4.2%로 침체 공포까지는 아니었고, **다우가 +1.14%(52,900.07)로 사상 최고**를 경신했다. S&P500 구성종목의 3분의 2 이상이 올라 '지수는 보합, 시장의 폭은 확대'.

반면 **반도체는 'AI 언와인드'에 직격**당했다. 메타가 잉여 데이터센터 용량을 외부에 파는 **'메타 컴퓨트'** 사업을 추진한다는 보도가 "AI 컴퓨트는 희소하다"는 랠리의 대전제를 흔들며, 직전 분기 사상 최고(+88%)를 썼던 **SOX가 −6.70%(이틀 누적 −12.6%)** 폭락했다. 테라다인·샌디스크·KLA 등 장비·메모리가 두 자릿수 급락했고, **테슬라는 2분기 인도 서프라이즈(48만 대)에도 −7.5%**였다. 유가는 WTI $67.17로 3거래일 연속 하락(호르무즈 정상화).

**분기 성적표**: 2분기 나스닥 약 +20%(2020년 이후 최고)·S&P +14%·다우 +13%. 다만 6월 한 달은 매그니피센트7이 시총 2.3조 달러를 잃고 나스닥 −3.6% — '분기 강세 + 월말·AI 차익실현'이 공존했다.

## 📰 직전주 핵심 3선 (이번 주로 이어질 이슈)

1. **6월 고용 쇼크(+5.7만) → 금리인상 확률 후퇴**: 7월 FOMC 인상 확률이 한 주 새 **30%→20%**로 낮아졌고(연말까지 ≥1회 인상 확률은 여전히 77%대). 소프트한 고용 + 유가 하락이 인플레·긴축 우려를 완화 → 채권·디펜시브·소형주 우호.
2. **'메타 컴퓨트' 쇼크 → AI 컴퓨트 희소성 논쟁**: 메타의 잉여 데이터센터 용량 외부판매 추진 보도가 AI 반도체·인프라 밸류체인 전반의 '수요 정점' 우려를 재점화. SOX 이틀 −12.6%. 이번 주 반도체의 안정/추가 조정 여부가 최대 관전 포인트.
3. **다우 사상 최고 + 방어주 로테이션**: 고용 둔화 → 금리 하락 기대에 헬스케어·유틸리티·필수소비재가 강세. '성장(반도체) 약세 ↔ 가치·방어 강세'의 로테이션이 이어질지.

- **거래 재개**: 7/6(월) 09:30 ET 정규장 재개. 연휴 직후 저(低)거래량 → 변동성 확대 가능.
- **실적**: Q2 실적시즌은 **7월 중순부터 본격화**돼 이번 주는 비교적 한산. **나이키(NKE)**가 화요일 장 마감 후 실적(컨센 매출 약 −3%대 $10.85B, EPS ~$0.12)으로 주목.
- **매크로**: 7월은 CPI·PCE·고용·관세 리스크·**7/29 FOMC**가 몰린 '빅 이벤트' 달. 이번 주는 지표 공백기지만 Fed 위원 발언·국채 입찰에 민감.
- **금리·유가**: 2년물 4.11%·10년물 4.46% 흐름, WTI $67선 지지 여부. 유가 추가 하락 시 인플레 완화 vs 에너지 부담.
- **반도체 방향**: '메타 컴퓨트'發 AI 언와인드가 진정될지, 아니면 추가 디레이팅으로 번질지가 나스닥·SOX의 핵심 변수.

- **반도체/AI 하드웨어**: 이틀 −12.6% 급락 후 기술적 반등 vs 'AI 수요 정점' 논쟁 지속. → 🇰🇷 **삼성전자·SK하이닉스** 단기 변동성 확대 주의(HBM 펀더멘털은 별개).

- **에너지**: 유가 $67선 향방이 갈림길. → 🇰🇷 정유(S-Oil) 정제마진 부담 vs 항공(대한항공) 원가 수혜.
