## 🗓 시장 요약

반도체는 나흘 만에 반등했으나(SOX +0.60%), 지수는 이란 리스크에 소폭 하락 마감했다. 주말 사이 미국-이란 충돌이 격화되며 이란이 쿠웨이트의 담수·발전소와 바레인·요르단·카타르 등지의 미군 목표를 공격했고, 미 중부사령부는 6일 연속 이란 공습을 이어갔다. 유가는 장중 $84대까지 치솟았다가 $82.42로 되돌림 마감했고, 안전자산 회피 속에 지수는 다우 −0.59%, S&P −0.19%, 나스닥 −0.05%로 밀렸다.

지정학 리스크에 따른 인플레 우려로 **국채 금리가 급등**했다(2년물 4.211%·10년물 4.589%). VIX는 18.65로 소폭 내렸다. 애플(−2.11%)·테슬라(−2.95%)가 약세를 주도했고, 오라클(−3.99%)은 52주 신저가로 밀렸다. 반면 마이크론(+1.94%)·마벨(+3.37%)·테라다인(+3.54%)·마이크로소프트(+2.15%) 등 반도체·메가캡 일부는 반등했다.

시장의 관심은 **이번 주 대형 실적**에 쏠려 있다. 수요일 알파벳·테슬라, 목요일 인텔에 더해 IBM·GM 등이 발표를 앞두고 있어, 'AI 자본지출의 첫 대규모 시험대'로 평가된다. SK하이닉스 ADR(SKHY)은 장초 $163(+6%)까지 급등했다가 −1.86%로 반락했고, 코스피200 야간선물은 +0.90% 반등했다.

## 📰 시장 헤드라인 3선

**1. 미국-이란 충돌 격화 → 유가 장중 $84대 급등 후 되돌림, 금리 급등**
이란이 쿠웨이트 담수·발전소와 걸프 지역 미군 목표를 공격하고 미국이 6일 연속 공습을 이어가면서 지정학 리스크가 고조됐다. WTI는 장중 $84.59까지 올랐다 $82.42로 마감(보합)했고, 인플레 우려에 2년물 금리가 4.211%로 뛰었다.

**2. 반도체 나흘 만에 반등 — 그러나 지수는 이란·실적 관망에 하락**
SOX가 +0.60% 반등하며 마이크론·마벨·테라다인이 강세를 보였으나, 이란 리스크와 이번 주 대형 실적 관망에 지수는 소폭 하락했다. 반도체 저가매수와 위험회피가 동시에 진행됐다.

**3. 이번 주 'AI capex 시험대' — 알파벳·테슬라·인텔·IBM 실적 대기**
수요일 알파벳·테슬라, 목요일 인텔 등 대형 실적이 줄줄이 발표된다. 투자자들은 막대한 AI 투자에 걸맞은 수익화 신호를 확인하려 하며, 이 결과가 최근의 섹터 순환매 방향을 결정할 전망이다.

## 📊 섹션 1 · 업종별 흐름

### 🔺 상승 업종

**1. 반도체 (반등)**
마이크론(MU) +1.94%, 마벨(MRVL) +3.37%, 테라다인(TER) +3.54%, AMD +1.58%. 나흘간의 급락 뒤 낙폭 과대 인식과 HBM·AI 수요 논리에 저가매수가 유입되며 SOX가 +0.60% 반등했다.
> 🇰🇷 [전달] 7/20 미국장 SOX +0.60%·SKHY 장초 +6% 급등 후 −1.86% 반락, 코스피200 야간선물 +0.90%(1,047.95). 서울은 7/20 코스피가 −4%(6,525)로 급락하고 삼성·SK하이닉스 레버리지 ETF가 붕괴(개인 최대 70% 손실)했으며 규제당국이 신규 레버리지 단일종목 ETF를 동결·증거금 3배 상향(pykrx 7/20 종가·수급은 갱신 지연). [판정] 야간선물 +0.9%·SOX 반등은 7/21 코스피 기술적 반등을 지지하나, 레버리지 ETF 청산 여진·유가 급등·규제 불확실성이 상단을 제한. (무효화: 이란 확전·추가 ETF 강제청산 시 반등 무산)

**2. 메가캡 소프트웨어**
마이크로소프트(MSFT) +2.15%, 알파벳(GOOGL) +1.54%, 아마존(AMZN) +1.16%. 수요일 실적 기대와 AI 클라우드 수요 논리에 일부 메가캡이 방어적 매수를 받았다.
> 🇰🇷 [전달] 미 메가캡 실적 기대는 국내 플랫폼 심리에 우호적이나 직접 연동은 약함.

**3. 에너지 (유가 수혜)**
지정학 리스크에 따른 유가 강세로 에너지 섹터가 상대적으로 견조했다. 다만 유가가 장 막판 되돌림하며 상승폭은 제한됐다.
> 🇰🇷 [전달] 유가 강세는 국내 정유·조선 심리엔 혼재(정제마진 vs 비용), 항공·화학엔 부담.

## 🏢 섹션 2 · 이슈 종목 10선

*그날 언론에 가장 많이 언급된 이슈 종목의 구체적 기사 내용 중심.*

**1. SK하이닉스 ADR (SKHY) −1.86% ($151.16)**
장 초반 $163.42(+6%)까지 급등했다가 −1.86%로 반락 마감했다. 한국에서 삼성전자·SK하이닉스 레버리지 ETF가 붕괴하며 개인투자자가 최대 70% 손실을 봤고, 규제당국이 신규 레버리지 단일종목 ETF를 동결하고 증거금을 3배로 올렸다. 회장은 강한 칩 수요를 들어 낙관론을 폈으나, 코스피가 7/20 −4%(6,525) 급락하며 변동성이 지속됐다. 시간외에서는 +0.88% 소폭 반등했다.

**2. 오라클 (ORCL) −3.99% ($121.37)**
52주 신저가로 밀렸다. 뉴멕시코의 $16.5B AI 데이터센터 프로젝트가 환경 인허가 장벽에 막혀 연료전지로 전환하면서 비용이 수십억 달러 증가한 것으로 전해졌다. 여기에 AI 투자수익(ROI) 관련 증권 소송과 클라우드 성장 지속성에 대한 의구심, 고금리 환경이 겹치며 밸류에이션 배수가 압박받았다.

**3. 테슬라 (TSLA) −2.95% ($369.59)**
수요일 2분기 실적 발표를 앞두고 경계 매물이 나왔다. 이번 주 알파벳·인텔·GM·IBM과 함께 'AI 자본지출과 자동차 수요'의 시험대에 오른다. 생산 전망과 로보택시·에너지 사업 진척이 실적의 핵심 관전 포인트로 지목된다.

**4. 애플 (AAPL) −2.11% ($326.70)**
주말 이란 리스크 고조에 메가캡 차익 매물이 집중됐다. 유가 급등과 안전자산 선호 속에서 시가총액 최상위 기술주가 지수 하락을 주도했다. 뚜렷한 개별 악재보다는 매크로·지정학 요인이 컸다.

**5. 마이크로소프트 (MSFT) +2.15% ($402.29)**
반도체 반등과 함께 메가캡 중 두드러진 강세를 보였다. AI 클라우드(애저) 수요 기대가 지속되며 방어적 매수가 유입됐다. 이번 주 빅테크 실적 시즌의 벤치마크로도 주목된다.

**6. 알파벳 (GOOGL) +1.54% ($352.10)**
수요일 실적 발표 기대에 반등했다. 광고·클라우드 성장률과 자본지출 코멘트가 AI 트레이드 전반의 방향을 좌우할 핵심 변수로 꼽힌다. 최근 '제미나이 지연' 우려로 눌렸던 만큼 실적 반전 기대가 실렸다.

**7. 마벨 (MRVL) +3.37% ($195.03)**
반도체 반등의 대표주로, AI 커스텀 실리콘(맞춤형 칩) 수요 기대가 낙폭 과대 반발 매수를 자극했다. 데이터센터·AI 가속기 연결 수요가 구조적으로 견조하다는 논리가 부각됐다.

**8. 마이크론 (MU) +1.94% ($865.46)**
나흘간의 급락 뒤 반등했다. 메모리 낙폭 과대 인식과 HBM 수요 논리가 저가매수를 유도했고, 거래량 상위(3,600만 주)로 시장 관심이 높았다. HSBC·모틀리풀 등의 강세론도 심리 안정에 기여했다.

**9. 테라다인 (TER) +3.54% ($333.76)**
반도체 테스트 장비 대표주로 칩 반등에 동참했다. AI·메모리 생산 확대에 따른 테스트 장비 수요 회복 기대가 반영됐다. 최근 급락한 반도체 장비 업종의 반발 매수 흐름을 보여줬다.

**10. 엔비디아 (NVDA) +0.28% ($203.38)**
AI 대장주로 강보합 마감했으나 여전히 언론 최다 언급 종목이었다. 젠슨 황이 '엔비디아가 HBM4의 첫 고객'이라고 언급하며 차세대 AI 메모리 수요 기대가 지지했다. 이번 주 대형 실적과 이란 리스크를 관망하는 흐름이었다.
