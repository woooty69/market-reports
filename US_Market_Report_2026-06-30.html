## 🧭 시장 요약

**지난주 급락의 반작용 — 광범위한 안도 반등으로 한 주를 출발했다.** 5거래일 연속 하락했던 나스닥이 **+2.07%** 급반등했고, S&P500은 +1.17%, **다우는 사상 처음 52,000을 돌파**(52,182.08, +0.59%)했다. **알파벳(GOOGL)이 다우 지수에 신규 편입**되며 첫날 +4.8% 급등, 다우의 기록 경신을 거들었다.

주도주는 지난주 가장 크게 두들겨 맞았던 **AI·반도체·성장주**였다. 아스테라랩스(ALAB) +16.5%, 코닝(GLW) +15.7%, KLA(KLAC) +12.0%, 웨스턴디지털(WDC) +11.2%, 어플라이드(AMAT) +10.8%가 반도체 반등을 이끌며 **SOX가 +3.83%** 치솟았고, 테슬라(+8.5%)·로켓랩(+15.9%)·마이크로스트래티지(+12.6%) 등 고베타 성장주도 급등했다. VIX는 −4.1%로 진정됐다.

반대로 지난주 상대적으로 버텼던 **산업재·소재(방어·가치)는 차익실현**에 밀렸다 — 하니웰(−6.5%)·마틴마리에타(−5.7%)·이스트만케미컬(−5.4%). '방어→성장'으로의 역(逆)로테이션이 뚜렷했다. 위험선호 회복에 금(−1.6%)·은(−1.5%) 등 안전자산은 되돌려졌고, 유가는 $70.42로 +1.7% 반등, 국채금리는 소폭 상승(2년물 4.11%·10년물 4.38%)했다. 시장의 시선은 이제 **주 후반 고용지표(7/2 비농업)**로 향한다.

## 📰 시장 헤드라인 3선

**1. 다우 사상 첫 52,000 돌파 — 알파벳 다우 편입 데뷔(+4.8%)**
알파벳(GOOGL)이 다우존스 산업평균지수에 신규 편입돼 첫 거래일 약 +4.8%($353.45) 급등했다. 광범위한 강세와 맞물려 **다우가 52,182.08로 사상 최고 마감**. 빅테크의 전통 지수 편입은 '구경제 vs 신경제' 경계가 흐려지는 상징적 이벤트로 평가된다.

**2. AI·반도체 안도 반등 — SOX +3.83%, 저가매수 유입**
지난주 −5%대 폭락했던 반도체가 일제히 반등. 아스테라랩스(+16.5%)·코닝(+15.7%)·KLA(+12.0%)·웨스턴디지털(+11.2%)·어플라이드(+10.8%)가 SOX를 +3.83% 끌어올렸다. 반에크 반도체 ETF(SMH)도 +3% 넘게 상승. 오픈AI IPO 연기설로 빠졌던 자금이 되돌아왔다.

**3. '방어→성장' 역로테이션 + 고용지표 대기**
지난주 강세였던 산업재·소재가 차익실현에 밀리고(하니웰 −6.5%·마틴마리에타 −5.7%), 성장·AI로 자금이 회귀했다. VIX −4.1%로 위험선호 회복. 시장은 **6/30 JOLTS·소비자신뢰, 7/1 ADP·ISM 제조업, 7/2 6월 비농업 고용**을 대기하며 워시 연준의 금리 경로를 가늠한다.
