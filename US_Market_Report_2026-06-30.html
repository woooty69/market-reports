## 시장 요약

분기 마지막 거래일, 시장은 **반도체·AI 인프라를 앞세운 기술주 랠리**로 마감했다. 나스닥 종합은 +1.52%(26,213.72), 필라델피아 반도체(SOX)는 +3.92%로 지수 강세를 주도했고, S&P500(+0.79%, 7,499.36)도 동반 상승했다. 다우(+0.26%, 52,319.20)는 상대적으로 둔했는데, 음식료·통신·헬스케어 등 방어주에 매물이 몰린 영향이다.

핵심은 **시장이 'AI 반도체·전력 인프라'를 가장 좋게, '필수소비재·통신·데이터센터 REIT·의료기기'를 가장 나쁘게 봤다**는 점이다. 샌디스크(+10.89%)·KLA(+8.85%)·AMD(+8.11%)·ON세미컨덕터(+6.92%) 등 반도체와, 버티브(+9.07%)·GE버노바(+6.56%)·이튼(+4.38%) 등 데이터센터 전력 설비가 동반 급등했다. 반면 호멜푸드(−5.66%)·제너럴밀스(−4.34%) 등 음식료, AT&T(−5.13%)·버라이즌(−3.99%) 통신, 짐머바이오메트(−5.64%)·스트라이커(−4.74%) 의료기기, 디지털리얼티(−5.77%)·에퀴닉스(−3.94%) 데이터센터 REIT는 약세였다.

분기 단위로 보면 나스닥은 약 +20%로 2020년 이후 최고 분기, S&P500 +14%, 다우 +13%(2022년 말 이후 최고)를 기록했다. 다만 6월 한 달만 보면 매그니피센트7이 시총 2.3조 달러를 잃고 나스닥은 −3.6%로, '분기 강세·월말 차익실현'이 공존했다. 유가는 모건스탠리의 Brent 전망 하향($75, −$15)과 호르무즈 해협 재개통 기대로 WTI가 $70선까지 밀렸고, 금은 분기 −13%로 2013년 이후 최악의 분기를 보였다. 컨퍼런스보드 소비자신뢰지수는 6월 91.2(+0.6p)로 소폭 개선됐으나, '일자리 구하기 어렵다'는 응답이 22.5%로 2021년 1월 이후 최고였다.

## 📰 헤드라인 3선

1. **AI 반도체 랠리 재점화 — 샌디스크·KLA·AMD 두 자릿수~8%대 급등.** 메모리·장비·로직 전반에 매수세가 유입됐다. 엔비디아 젠슨 황 CEO가 "마벨은 미래의 1조 달러 기업"이라 언급한 가운데, 키뱅크는 마벨 목표가를 $260→$385로 올렸다(UBS $340, 캔터 $300, 스티펠 $350). AI 데이터센터·옵티컬 인터커넥트 수요가 근거다.

2. **SK하이닉스, 나스닥 상장 추진 보도.** 24/7 Wall St.에 따르면 SK하이닉스가 지난달 처음 거론된 계획을 진전시켜 나스닥 상장을 추진 중이며, 미국 자본시장에 진입하는 칩 기업 대열에 합류하는 것으로 전해졌다. 한국 메모리 대장주의 美 상장 추진은 글로벌 메모리 사이클 기대를 반영한다.

3. **모건스탠리, 유가 전망 2주 새 두 번째 하향 — Brent Q3 $75($15 인하).** 호르무즈 해협 재개통에 따른 중동 물량 복귀, 견조한 미국 수출, 여전히 약한 중국 수요로 "공급 과잉 회귀"를 전망. 유가 하락은 인플레 우려를 낮춰 채권·소비주에 우호적이나, 에너지 섹터엔 부담으로 작용했다.

## 섹션 3. 마켓 구루·기관 코멘트

### (A) 증권사·기관 리포트 5선

1. **골드만삭스 — S&P500 연말 목표 8,000 상향(기존 7,600).** 2026년 S&P500 EPS 전망을 $340(전년比 +24%)로 상향. 벤 스나이더(Ben Snider) 美 주식 수석전략가는 6/28 노트에서 2분기 실적시즌을 "미국 주식의 결정적 시험대(critical test)"로 규정. *논리: 2026년 상승은 멀티플 확장이 아니라 이익 성장에 기반 → 실적이 받쳐주면 추가 상승.*

2. **모건스탠리 — S&P500 2026년 약 7,800 전망.** "롤링 리커버리(rolling recovery)" — 섹터가 번갈아 주도하며, 저평가 구간으로의 로테이션이 상승을 넓고 안정적으로 만든다는 시각. *논리: 쏠림보다 순환매가 강세장을 지지.*

3. **모건스탠리 — 알파벳(GOOGL) 목표가 $375→$415 상향.** 올해 시장 최고 성과주 중 하나에 대한 잇단 강세 콜에 합류. *논리: 검색·클라우드·AI 모멘텀 지속.*

4. **키뱅크/UBS/캔터/스티펠 — 마벨(MRVL) 목표가 일제히 상향.** 키뱅크 $260→$385, UBS $230→$340, 캔터 $220→$300, 스티펠 $321→$350. *논리: AI 데이터센터·옵티컬 인터커넥트 수요 급증, 컨센서스 'Buy'(28개사 기준).*

5. **BofA — 아마존(AMZN) AWS GPU 예약가 20% 인상(7/1부) 주목.** 1월 15% 인상에 이은 추가 인상으로, 하반기 AWS 성장률에 1~2%p 가산을 전망하며 클라우드 가속에 대한 확신 강화. *논리: GPU 수요 초과 → 가격 결정력 = AWS 마진·성장 동력.*

### (B) 구루·전략가 코멘트

- **젠슨 황(엔비디아 CEO):** "마벨은 미래의 1조 달러 기업." AI 인프라 생태계 전반 강세의 촉매로 작용.
- **씨티(Citi):** 나스닥에 **약세 경고** — 과도한 롱 포지션이 추가 조정에 취약하며, 자금은 소형주로 로테이션 중. 유럽 심리는 취약, 아시아는 혼조이나 **"한국에서는 강세 베팅이 쌓이고 있다"**고 언급(홍콩은 과도한 숏 → 숏스퀴즈 위험).
- **데이나 피터슨(컨퍼런스보드 수석이코노미스트):** "최근 유가 하락이 소비자 인플레 우려를 완화하며 6월 신뢰지수가 소폭 올랐다. 다만 노동시장 체감은 측정 가능할 정도로 약화됐다."
