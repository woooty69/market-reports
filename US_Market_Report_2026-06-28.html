# 미국 증시 주말 리포트
### 기간: 2026년 6월 22일(월)~26일(금) 주간 리뷰 · 다음 주(6/29~7/3) 전망
> 작성: 2026-06-28(일) KST · 주말 휴장 — 직전 정규장 6/26(금)은 6/27 리포트에서 다룸. 본편은 주간 리뷰 + 다음 주 전망.

## 🧭 한 주 시장 요약 — 'AI 청구서'가 돌기 시작한 한 주

2026년 상반기를 마무리하는 이번 주는 **AI 밸류에이션과 자본지출(capex)에 대한 검증**이 본격화된 한 주였다. 그 결과는 **메가캡·반도체(약세) vs 다우·러셀2000·소프트웨어·헬스케어(상대 강세)**의 뚜렷한 로테이션이었다. 나스닥은 주간 −4.6%로 **5거래일 연속 하락**한 반면, 다우는 +0.6%로 올랐다 — 상반기 말의 대표적 디버전스.

주중 흐름은 롤러코스터였다. **(화) 6/23** 'chip-wreck'으로 SOX가 −7.9% 폭락했고, **(수) 6/24** 이란 데탕트로 유가가 70달러 밑으로 무너지며($-3.9%) 항공·주택·소비주가 반등(다우 상승). **(목) 6/25** 마이크론의 어닝 서프라이즈(EPS $25.11)로 칩이 +3.6% 급등했지만, 메모리값 상승에 애플(−6%)·MS가 가격 인상을 발표하며 메가캡이 무너졌다. **(금) 6/26** 오픈AI IPO 연기설로 반도체가 다시 −5.3% 투매되는 반전이 나왔다.

브로드컴이 주간 −13%(2024년 9월 이후 최악)를 기록할 만큼 AI 반도체의 변동성이 극심했고, 마이크론의 호실적조차 칩 랠리를 지키지 못했다. **PCE 물가가 4%대(2023.4 이후 최고)**로 확인되며 연준(케빈 워시 의장) 인상 가능성이 살아있는 가운데, 금·은 등 안전자산이 강세를 보였다.

## 📰 한 주 핵심 뉴스 5선 (투자자 함의)

**1. 오픈AI, IPO를 2027년으로 연기 검토 — AI 트레이드 '벽'에 부딪히다**
NYT 보도로 오픈AI가 가을 상장 대신 **IPO를 2027년으로 미루는 방안을 검토** 중이라는 소식이 전해졌다(6월 비공개 신청서는 제출). '초우량 AI 상장'의 변동성(스페이스X의 부진한 데뷔)이 배경. → *함의: AI 인프라 수요·상장 사이클에 대한 신뢰가 칩주 방향의 핵심 변수가 됨.*

**2. 마이크론 어닝 서프라이즈 — 그러나 '메모리값의 양면'**
마이크론이 FY26 3Q EPS $25.11(예상 $20.78)·매출 $41.46B(전년比 4배), HBM 완판을 발표. BofA·니덤·번스타인·씨티가 목표가를 $1,200~1,550로 상향. → *함의: 메모리 슈퍼사이클은 칩 메이커엔 호재지만, 메모리 원가 상승은 애플·MS 등 기기 메이커엔 악재로 작용(가격 인상).*

**3. 유가 급락 — 이란 데탕트로 WTI $69대, 'post-war low'**
이란-미국 휴전 진전으로 전쟁 프리미엄이 소멸하며 WTI가 한 주 만에 70달러를 하회($69.23). → *함의: 항공·여행·소비주엔 마진 호재, 에너지·정유주엔 부담. 인플레 완화 시그널로 금리도 하락.*

**4. 브로드컴 −13%·반도체 변동성 폭발 + 오픈AI-브로드컴 커스텀 칩 'Jalapeño'**
브로드컴이 주간 −13%(2024.9 이후 최악)로 AI 칩 약세를 상징. 한편 포춘은 오픈AI·브로드컴이 커스텀 AI 칩 'Jalapeño'를 공개했다고 보도(6/25). → *함의: 'AI 자체 칩' 확산은 엔비디아 의존도 변화의 장기 변수.*

**5. 매크로 — PCE 4%·스태그플레이션 경계·미국 신용등급 AA+ 재확인**
5월 PCE가 4%대(2023.4 이후 최고)로 물가 고착을 시사. 다수 중앙은행은 **스태그플레이션을 5년 유력 시나리오**로 인식. S&P글로벌은 미국 신용등급 **AA+(안정적)**를 재확인(재정 부담 경고). → *함의: 물가-성장 줄다리기 속 7/29 FOMC와 고용지표가 금리 경로의 분수령.*

## 🔎 주말 신규 뉴스 & 다음 개장일 관전 포인트

- **오픈AI IPO 타임라인**: '2027년 연기' 검토가 사실로 굳어질지, 추가 보도가 AI 관련주(엔비디아·브로드컴·반도체 ETF) 변동성을 좌우.
- **AI capex '청구서' 내러티브**: 빅테크의 막대한 AI 투자비가 언제 이익으로 전환되는지에 대한 시장의 의구심이 핵심 — BofA 하트넷은 '사상 최대 기술주 자금 유출, 금 선호'를 지적.
- **반도체 바닥 탐색**: SOX가 이틀 만에 +3.6%↔−5.3%로 출렁인 만큼, 다음 주 변동성 지속 가능. HBM 펀더멘털(삼성전자·SK하이닉스) vs AI 수요 정점론의 줄다리기.

## 🧭 다음 주(6/29~7/3) 섹터별 전망 (+한국 연관)

- **반도체/AI 하드웨어**: 변동성 최고 구간. 오픈AI IPO·AI capex 뉴스플로우에 민감. → 🇰🇷 **삼성전자·SK하이닉스**는 단기 변동성 주의하되 HBM 수요는 구조적 유효.
- **소프트웨어·플랫폼**: 'AI 하드웨어→소프트웨어' 로테이션 지속 시 상대 강세. → 🇰🇷 네이버·카카오·SaaS 심리 우호.
- **헬스케어·방어주·금**: 기술주 변동성 헤지 수요. → 🇰🇷 바이오·제약 방어주.
- **에너지/항공**: 유가 $69선 향방이 갈림길. 추가 하락 시 항공·소비 수혜 vs 에너지 부담. → 🇰🇷 항공(대한항공)·정유(S-Oil) 상반된 영향.
- **로테이션 지속성**: 'Mag7·반도체 약세 vs 다우·러셀2000 강세'의 디버전스가 이어질지가 상반기 말 핵심 테마.
