## 📈 시장 요약

6월 18일(목)은 전일 FOMC 매파 충격을 딛고 **반도체가 주도한 강한 반등** 세션이었다. 필라델피아 반도체지수(SOX)가 **+6%대 급등하며 사상 최고**를 기록, 나스닥(+1.91%)이 지수 상승을 견인했다. 반면 다우는 **+0.14%(+72p)** 로 거의 제자리였는데, **방산·에너지·IT컨설팅** 등 일부 대형 구섹터가 큰 폭으로 빠지며 상승을 상쇄했기 때문이다.

방향성의 핵심은 두 갈래다. ① **반도체 르네상스** — 트럼프 대통령이 "인텔이 애플과 미국 내 반도체 설계·생산 계약을 맺었다"고 밝히자 **인텔이 +10.6%** 폭등하고 마이크론(+8.7%)·브로드컴(+4.7%)·KLA(+8.7%) 등 칩 전반이 동반 급등했다. 전일 FOMC發 매도를 하루 만에 되돌리는 'AI·반도체 사자' 심리가 재점화됐다. ② **미·이란 봉쇄 해제로 평화 테마 강화** — 지정학 프리미엄이 더 빠지며 **방산주(록히드 -4.0%, 노스럽 -5.2%, RTX -3.6%, L3해리스 -5.9%)** 와 안전자산(금 -3.1%, 은 -6.3%)이 급락했다. 유가는 보합.

개별 악재도 컸다. **액센츄어가 -18% 폭락**(FY26 매출 가이던스 하향·연방정부 사업 둔화)하며 IT컨설팅·서비스(코그니전트 -10.5%, IBM -5.1%)를 끌어내렸고, **크로거 -8.4%**(실적 부진)도 두드러졌다. 시장은 "AI·반도체는 사고, 비싼 컨설팅·방산·안전자산은 던지는" 뚜렷한 색깔을 보였다.

※ **6/19(금)은 준틴스(Juneteenth) 연방공휴일로 미국 증시 휴장** — 다음 정규장은 6/22(월).

## 📰 헤드라인 3선

**1) 인텔 +10.6%·SOX 사상최고… 반도체가 FOMC 충격 되돌렸다**
트럼프 대통령이 "인텔-애플, 미국 내 반도체 설계·생산 딜" 발언 → 인텔 급등. 마이크론 +8.7%, 브로드컴 +4.7%, KLA +8.7% 등 칩 전반 동반 강세로 SOX +6%대 사상 최고. 나스닥 +1.91%(26,517.93) 마감.

**2) 액센츄어 -18% 폭락… IT컨설팅·서비스 동반 급락**
액센츄어 FY3Q EPS $3.80(예상 $3.72 상회)에도 **FY26 매출 가이던스 3~4%로 하향**(연중 두 번째)+연방정부 사업 둔화·신규수주 부진. $41.8억 사이버보안 인수(드라고스 등) 발표. 코그니전트 -10.5%, IBM -5.1% 동반 약세.

**3) 평화 테마에 방산·안전자산 급락**
미·이란 봉쇄 해제로 지정학 프리미엄 추가 해소. 록히드마틴 -4.0%, 노스럽그루먼 -5.2%, RTX -3.6%, L3해리스 -5.9%. 안전자산도 금 -3.1%·은 -6.3%로 급락, VIX -4%.
