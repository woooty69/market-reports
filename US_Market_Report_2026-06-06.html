**📰 시장 헤드라인 3선**

1. **5월 고용 서프라이즈 → 금리 급등**: NFP +17.2만(컨센 8만)·실업률 4.3%. 강한 노동시장이 'Fed 인하 지연/인상' 우려를 자극, 10년물 4.5%·30년물 5% 돌파. 금리 민감한 고밸류 자산이 일제히 무너짐.
2. **반도체 시총 약 $1조 증발**: 마이크론(MU) -13.3%·인텔(INTC) -11.3%·AMD -10.9%·퀄컴(QCOM) -11.0%·테라다인(TER) -12.0%·장비3사(AMAT·LRCX·KLAC -9%대)·엔비디아(NVDA) -6.2%. 브로드컴 어닝 쇼크 + 금리 급등이 AI 밸류에이션을 직격.
3. **방어주로 피신 + 위험자산 동반 약세**: 필수소비(클로락스 +5%·킴벌리클라크 +4.8%·P&G·콜게이트 +4.1%·코카콜라 +3.5%)·유틸리티·보험·리츠로 자금 이동. 반면 금/구리(-3~9%)·유가(-2.7%)·크립토(코인베이스 -7%)도 금리 충격에 동반 하락.

주요: 마이크론(MU) -13.25%, 테라다인(TER) -12.03%, 인텔(INTC) -11.28%, ON세미(ON) -11.05%, 퀄컴(QCOM) -10.98%, AMD(AMD) -10.86%, 램리서치(LRCX) -9.85%, 어플라이드(AMAT) -9.71%, KLA(KLAC) -9.47%, 엔비디아(NVDA) -6.20%.

주요: 슈퍼마이크로(SMCI) -11.22%, 웨스턴디지털(WDC) -11.08%, 코히어런트(COHR) -10.65%, 코닝(GLW) -10.18%, 시게이트(STX) -8.48%, HPE -8.36%, 시에나(CIEN) -8.85%, 아리스타(ANET) -7.07%.
보도: 반도체와 한 묶음으로 AI 인프라 하드웨어 전반 투매.

**③ 에너지·소재(원자재)**
주요: 슐럼버거(SLB) -5.41%, 할리버튼(HAL) -4.95%, 다이아몬드백(FANG) -5.09%, 프리포트맥모란(FCX) -9.07%, 뉴몬트(NEM) -7.96%.
보도: 금리 급등·달러 강세에 유가·금속(금·구리·은)이 동반 하락. 경기둔화 우려도 가세.

> **요약 — 시장의 시선**: 강한 고용→금리 급등이 **고밸류 성장·반도체를 청산**시키고 **방어(필수소비·유틸·보험)로 피신**. 한국은 **반도체 직접 충격(월요일 경계)**, 상대적으로 **통신·필수소비·유틸·고배당 방어주**가 선방 기대. 금리·고용 추가 지표가 분수령.

## 3. 마켓 구루·기관 코멘트 (+ 언론 최다 인용 증권사 리포트 5선)

### 📑 언론 최다 인용 증권사 리포트 5선

**① 고용 서프라이즈 후 금리 전망(주요 IB)**: +17.2만 서프라이즈로 "Fed 인하 지연" 컨센서스 강화. 10년물 4.5% 돌파를 고밸류 성장주의 단기 역풍으로 해석.
**② 반도체 급락 관련 셀사이드**: 일부는 "금리·실적발 밸류 조정은 과도, AI 자본지출 사이클은 유효"(저가매수)로, 일부는 "고밸류 정당화 어려움"(추가 조정)으로 의견 분열.
**③ UBS — 마이크론(MU)**: 목표가 $1,625 유지, "메모리 공급부족은 구조적" — 오늘 -13%는 매크로 충격이며 HBM 수급과 구분. → 한국 SK하이닉스·삼성전자 단기 노이즈 vs 중장기 분리.
**④ 방어주·배당 로테이션 노트**: 다수 하우스가 금리·변동성 국면에서 필수소비·유틸·보험 비중확대 권고. CLX·KMB·KO 강세가 그 흐름.
**⑤ Great Rotation 전략**: AI에서 가치·실물로의 이동이 금리 충격으로 가속. 단, 금리 급등은 가치주에도 부담이라 'preference는 방어·배당'으로 이동.

**① Tom Lee (Fundstrat)**: 금리발 조정을 '일시적'으로 보되, 고용 강세가 이어지면 변동성 장기화 가능성 인정. 연말 목표는 유지하나 단기 보수적.

**④ 방어 컨센서스**: 변동성(VIX +12.8%) 급등 국면에선 필수소비·유틸·보험·고배당이 상대적 안전판이라는 시각이 우세.
