> 작성: 2026-06-25(목) 06:43 KST · 2차 백업 재시도본

---

## 🧭 시장 요약

기술주와 비(非)기술주가 정반대로 움직인 '로테이션' 장세였다. 마이크론 실적 발표(장 마감 후)를 앞둔 경계감에 반도체가 다시 밀리며 **SOX가 −2.54%**, 나스닥과 S&P500은 소폭 약세로 마감했다. 반면 **국제유가가 배럴당 70달러까지 무너지면서**(3월 초 이후 처음 70달러 붕괴) 항공·여행·소비주가 급등했고, **10년물 금리 안정 + 주택 관련 법안 통과** 기대에 주택건설주가 폭등하며 **다우는 +0.35%로 홀로 상승**했다.

유가 급락의 배경은 이스라엘–이란 휴전 진전이다. 미·이란이 60일 휴전 연장 MOU에 서명하며 호르무즈 해협 정상화 기대가 커졌고, 전쟁 프리미엄이 빠르게 해소됐다. 한편 자산운용·자본시장주(블랙스톤·아폴로·코인베이스·로빈후드 등)는 차익실현과 금리·크립토 약세 속에 −5~6%대로 급락했다.

장 마감 후 **마이크론(MU)이 시장 예상을 크게 상회하는 어닝 서프라이즈**를 발표하며 시간외에서 +6% 급등, 칩 업종 전반을 끌어올렸다 — 25일(현지) 개장의 핵심 변수다.

---

## 📰 시장 헤드라인 3선

**1. 유가 70달러 붕괴 — 항공·여행주 '안도 랠리'**
WTI가 장중 $69.63까지 밀려 3월 2일 이후 처음 70달러를 하회했다($70.34 마감, −3.92%). 미·이란 휴전 진전으로 호르무즈 해협 유조선 운항이 재개될 것이라는 기대가 전쟁 프리미엄을 빠르게 걷어냈다. 익스피디아·부킹홀딩스·유나이티드항공이 큰 폭으로 뛰었다.

**2. 마이크론 어닝 서프라이즈 — 장 마감 후 시간외 +6%**
마이크론(MU)이 FY26 3분기 매출 약 $41.5B, 조정 EPS 약 $25로 컨센서스(매출 $35.1B·EPS $20.39)를 대폭 상회했다. 4분기 매출 가이던스도 $49~51B로 월가 전망($43.2B)을 크게 웃돌았다. HBM 수요 폭발에 따른 'AI 메모리 슈퍼사이클'을 재확인하며 시간외 급등, 칩주 전반에 온기를 불어넣었다.

**3. 주택건설주 폭등 — 금리 안정 + 주택 법안 통과 기대**
10년물 금리 안정과 초당적 주택 공급 법안 통과 기대가 모기지 금리 인하 시그널로 읽히며 주택건설주가 NYSE 상승률 상위를 휩쓸었다. 빌더스퍼스트소스(BLDR) +11.3%, 풀티그룹(PHM) +7.2%, D.R.호튼(DHI) +6.7% 등.

## 3️⃣ 마켓 구루·기관 코멘트

**증권사·기관 리포트 5선**
1. **LPL 파이낸셜 (Jeff Buchbinder, 수석 주식전략가)**: "기업들이 이미 제시한 캐펙스를 줄이기 시작하고 시장이 AI 투자 수익에 대한 신뢰를 잃으면, 올해는 보합 내지 소폭 마이너스 흐름이 될 수 있다." — AI 캐펙스 ROI 검증 국면 경고.
2. **뱅크오브아메리카(BofA)**: 마이크론 목표주가 상향 리셋(실적 발표 전), HBM 수요·메모리 가격 상승 사이클 지속 전망.
3. **모닝스타**: "2026년 대형 섹터 로테이션 — AI가 디스럽터를 디스럽트". 투기적 기술주에서 마진·재무 안정 우량주로의 자금 이동 진단.
4. **FactSet 컨센서스**: 마이크론 EPS $20.39·매출 $35.1B 예상 → 실제 대폭 상회(어닝 서프라이즈).
5. **EIA(에너지정보청) 6월 전망**: 글로벌 석유 수요가 연초 예상보다 둔화. 유가 약세 배경이나, 인플레이션 압력 변수는 잔존.

**구루·매크로 코멘트**
- 연준 의장 **케빈 워시(Kevin Warsh, 2026.5.22 취임)** 체제의 매파적 출발 이후 단기 금리가 높은 수준을 유지. Fed 점도표는 2026년 금리 인상 1회를 시사(직전 두 차례 점도표의 인하 전망과 대비).

- 시장 톤: "AI가 증시를 띄우는 동안 유가는 인플레이션 재림을 경고한다"는 상충 구도가 2026년 대표 매크로 서사로 부각.
