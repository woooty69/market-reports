## 🧭 시장 요약

**지수가 극명하게 갈린 '분열' 장세였다.** 반도체·AI 하드웨어는 급등한 반면, 다우는 −577p(−1.09%)나 무너졌다. 트럼프 대통령이 **미국-이란 양해각서(MOU)가 "끝났다(over)"**고 선언하며 지정학 리스크가 재점화, 유가가 추가 급등(WTI ≈$74.6·+3.4%, 브렌트 $79대)했다. 여기에 **6월 FOMC 의사록에서 일부 위원이 "인플레이션이 높으면 추가 인상"을 지지**한 사실이 확인되며 국채금리가 급등(10년물 4.58%·2년물 4.22%)했다.

이 조합이 **하이퍼스케일러·금융·헬스케어를 눌렀다.** 알파벳(−1.4%)·아마존(−1.0%)·MS(−1.4%)·메타(−2.0%) 등 빅테크 플랫폼이 데이터센터 과잉투자 우려로 밀렸고, JP모건(−2.5%)·싱크로니(−9.6%)·글로벌페이먼츠(−5.9%) 등 금융·결제, 모더나(−7.5%)·레스메드(−6.3%) 등 헬스케어가 급락하며 다우를 끌어내렸다.

반대로 **반도체·AI 하드웨어는 나홀로 강세**였다. 브로드컴이 애플과 미국산 부품 공급 확대에 합의하며 +4.8%, 엔비디아 +3.7%, 아리스타 +8.8%, 아카마이 +10.7%, 코어위브 +7.8%, 슈퍼마이크로 +7.3%, 샌디스크 +6.9%가 뛰며 **SOX가 +2.23%** 반등, 나스닥을 +0.2%로 끌어올렸다. 유가 급등에 발레로(+6.3%) 등 정유도 강했다. VIX +4.8%(16.9).

## 📰 시장 헤드라인 3선

**1. 트럼프 "이란 MOU 끝" → 유가 재급등·다우 −577p**
트럼프 대통령이 미국-이란 양해각서가 "끝났다"고 선언하며 중동 리스크가 재부각, 유가가 다시 급등(WTI ≈$74.6·+3.4%, 브렌트 $79)했다. 지정학·인플레 우려에 다우가 장중 하락 폭을 키우며 −1.09%(−577p) 마감. 루이스 나벨리에는 이를 "블랙스완이 블랙피닉스로(Black Swan into Black Phoenix)"라 표현했다.

**2. 6월 FOMC 의사록 '매파적' — 일부 위원 추가 인상 지지**
6월 회의록에서 **"인플레이션이 계속 높으면 추가 금리 인상"** 을 지지한 위원들이 있었음이 확인됐다. 유가 반등과 맞물려 국채금리가 급등(10년물 4.58%·2년물 4.22%), 7/29 FOMC 인상 확률은 32%대로 반등. 금리 상승이 금융·고밸류 성장주를 압박했다.

**3. 반도체 나홀로 반등 — 브로드컴·애플 미국산 부품 딜**
브로드컴이 애플과 미국산 부품 공급을 확대하기로 하며 +4.8%, 엔비디아 +3.7%로 AI 반도체가 강세를 주도했다. AI 하드웨어·네트워킹·서버(아리스타·코어위브·슈퍼마이크로)가 동반 급등하며 SOX +2.23%. 반면 하이퍼스케일러(구글·아마존·MS)는 데이터센터 과잉투자 우려로 약세 — 'AI 하드웨어는 사고 소프트웨어·클라우드는 판다'는 분리가 재부각됐다.
