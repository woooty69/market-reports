# 미국 증시 24시간 데일리 리포트
### 2026년 6월 13일(토) 작성 — 직전 미국 정규장(6/12, 금) 세션

**주요 지수·자산**

| 지수·자산 | 지수/가격 | 등락 |
|---|---|---|
| 나스닥 | 25,888.84 | +0.31% |
| S&P 500 | ≈7,431 | +0.50% |
| 다우 | 51,202.26 | +0.70% |
| WTI유 | ≈$83 | -3.23% |
| 美 10년물(금리) | ≈4.4% | 보합 |

> **시장 요약 — 'SpaceX 데뷔 + 금속 랠리 + 유가 추가 하락'** — 미-이란 평화협상 기대가 이어지며 **유가가 -3.2% 추가 하락($83선)**, 위험선호가 완만히 이어졌다(다우 +0.70%·S&P +0.50%·나스닥 +0.31%, VIX -6.6%). 이날 최대 이벤트는 **스페이스X의 사상 최대 IPO 데뷔(공모가 대비 +19.3%, $161.11 마감)**. 시장 내부에서는 **금속(은 +6.2%·금 +3.0%·구리 +2.7%)·소재·금융이 주도**했고 반도체(스토리지·장비·인텔)도 강세였던 반면, **소프트웨어는 어도비 -6.8% 등 약세를 이어갔다.**

**📰 시장 헤드라인 3선**

1. **스페이스X, 사상 최대 IPO로 +19% 데뷔**: 스페이스X가 상장 첫날 공모가 대비 **약 19.34% 급등, $161.11 마감**하며 역대 최대 규모 IPO로 거래량 기록을 갈아치웠다. 우주·성장 테마 투자심리를 자극.
2. **이란 평화협상 기대 지속 → 유가 추가 -3.2%, 위험선호 완만**: 합의 임박 기대에 WTI가 -3.2%($83선)로 추가 하락. 3대 지수 소폭 상승, VIX -6.6%로 변동성 추가 진정. 소재·금융·유틸리티가 상승을 주도하고 하락 섹터는 2개뿐.
3. **금속 급등(은 +6.2%·금 +3.0%·구리 +2.7%) + 금융 강세**: 약달러·인플레(4.2%) 헤지 수요에 귀금속·산업금속 급등 — 모자이크(MOS) +7.6%·알버말(ALB) +7.1%·프리포트(FCX) +3.1% 등 소재주와 금융(골드만 +2.6%·JP모건 +2.3%)이 시장을 견인.

## 1. 업종별 흐름 — 시장이 좋게/나쁘게 보는 곳 (+ 한국 연관 유추)

**① 소재·금속 — 약달러·인플레 헤지**
주요: 모자이크(MOS) +7.6%, 알버말(ALB) +7.1%, 프리포트(FCX) +3.1%, 듀폰(DD) +3.0%, 뉴몬트(NEM) +2.7%, CF인더스트리(CF) +2.7%, 뉴코어(NUE) +2.1%.

보도: 위험선호 회복·거래대금 기대에 은행·브로커·거래소가 시장을 견인. 소재와 함께 상승 주도 섹터.
→ **한국 연관(유추)**: **KB금융·신한지주·하나금융지주**, 증권 **한국금융지주·미래에셋증권**.

**③ 반도체(스토리지·장비·인텔) — 강세 지속**
주요: 시게이트(STX) +7.3%, 웨스턴디지털(WDC) +6.4%, 인텔(INTC) +6.5%, KLA(KLAC) +5.5%, 테라다인(TER) +5.7%, AMD(AMD) +4.7%, 퀄컴(QCOM) +4.3%.
보도: 전일 대반등에 이어 스토리지·장비·인텔이 강세 연장. (단 마이크론 -1.4%·엔비디아 +0.2%·브로드컴 -0.9% 등 일부 대형칩은 숨고르기.)
→ **한국 연관(유추)**: **삼성전자·SK하이닉스**, 장비 **한미반도체·HPSP·이오테크닉스**.

### 🔴 하락 업종 TOP 3

**① 소프트웨어 — 약세 지속**
주요: 어도비(ADBE) -6.8%, PTC(PTC) -4.0%, 오토데스크(ADSK) -3.5%, 팔란티어(PLTR) -2.4%, 데이터독(DDOG) -1.9%, 서비스나우(NOW) -0.9%.
보도: 칩·소재·금융이 오르는 와중에 고밸류 소프트웨어는 차익실현·순환매로 또 소외. 'AI 인프라는 사고 소프트웨어는 던진다'는 분리가 지속.
→ **한국 연관(경계)**: SaaS **더존비즈온·한글과컴퓨터**, SI **삼성SDS**.

**② 미디어·일부 통신**
주요: 에코스타(SATS) -11.0%, TKO그룹(TKO) -4.8%, 폭스(FOX) -4.0%, 뉴스코퍼(NWS) -2.9%, 넷플릭스(NFLX) -1.1%.
보도: 전일 급등했던 종목들의 되돌림 + 미디어 차익실현.

**③ 주택건설 — 금리 부담**
주요: 레나(LEN) -4.9%, NVR(NVR) -1.6%, 풀티(PHM) -0.7%.
보도: 인플레·금리 경계로 금리 민감 주택건설이 차별적 약세.

> **요약 — 시장의 시선**: 위험선호 지속 속 **소재·금속(인플레 헤지)·금융·반도체는 매수**, **고밸류 소프트웨어·일부 미디어·주택건설은 매도**. 한국 적용 시 **비철/철강·금융·반도체 우호 / SaaS·금리민감주 경계**.

## 3. 마켓 구루·기관 코멘트 (+ 언론 최다 인용 증권사 리포트 5선)

**① 스페이스X(SpaceX) IPO 평가**: 사상 최대 규모 IPO가 +19% 데뷔하며 우주·위성·성장 테마에 대한 위험선호를 재확인. 거래량 기록 경신.

**③ 금속·소재 비중확대**: 약달러·인플레(4.2%) 헤지 수요로 귀금속·산업금속·비료 비중확대 시각 확산. 모자이크·알버말·프리포트가 그 흐름.
**④ 금융 비중확대**: 위험선호 회복·거래대금 기대에 은행·거래소(GS·JPM·NDAQ·CME) 우호 의견.
**⑤ 소프트웨어 신중론**: 칩·소재·금융 강세 속 고밸류 소프트웨어(ADBE·PTC 등) 약세에 대해 "AI 인프라 수혜 vs SW 잠식 우려"의 분리가 지속된다는 평가.

### 🗣 구루·기관 코멘트

**① 지정학·매크로 컨센서스**: 미-이란 합의 기대가 유가 하락·위험선호 회복으로 이어지나, 합의 서명 전까지 헤드라인 변동성 잔존. 유가 하락은 인플레 완화에도 우호.
