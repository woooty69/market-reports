## 🗓 시장 요약

반도체·메모리가 폭발적으로 반등하며 3대 지수가 3일 연속 하락을 끊고 일제히 상승했다. 필라델피아 반도체 지수(SOX)는 **+5.21%** 급등했고, 그동안 투매를 받았던 메모리·스토리지에 저가매수가 집중됐다(마이크론 +12.04%, 샌디스크 +14.24%, WDC +12.51%, 시게이트 +11.14%). **SK하이닉스 ADR(SKHY)은 +13.75% 폭등**했다.

여기에 **엔비디아가 AI 클라우드 업체 네비우스(NBIS)의 지분 9.3%를 취득**한 사실이 공개되며 네비우스가 +18.78% 급등했고, 엔비디아도 +1.97% 올랐다. 제너럴모터스(GM)는 2분기 실적이 예상을 웃돌고 연간 전망을 올해 두 번째로 상향하며 강세를 보였다.

한편 지정학 리스크는 이어졌다. 미국이 이란에 추가 공습을 가했다는 보도 속에 유가가 다시 +2.5%($84.54, 브렌트 $91) 올랐고, 국채 금리는 이란·유가 여파로 2개월 최고 수준으로 뛰었다(2년물 4.262%·10년물 4.626%). 다만 위험선호가 살아나며 VIX는 17.05로 8.6% 급락했다. 실적 실망 종목도 있어 다나허(−10.99%)·MSCI(−10.35%)가 급락했다.

한국 증시도 화답했다. **코스피가 7/21 +3.56% 급등**(장중 변동성 완화 조치 발동)했고, 코스피200 야간선물은 +4.38%(1,133.75)로 추가 반등해 강세 연장을 예고했다.

## 📰 시장 헤드라인 3선

**1. 반도체·메모리 대반등 — SOX +5.21%, 3일 연속 하락 마감**
그동안 급락했던 메모리·스토리지에 저가매수가 폭발적으로 유입되며 마이크론(+12%)·샌디스크(+14%)·WDC(+12.5%)·SK하이닉스 ADR(+13.75%)이 동반 급등했다. 3대 지수가 3거래일 만에 반등에 성공했다.

**2. 엔비디아, AI 클라우드 네비우스 지분 9.3% 취득 공개 → NBIS +18.78%**
엔비디아가 AI 클라우드 인프라 업체 네비우스의 지분 9.3%(패시브)를 보유한 사실이 드러나며 네비우스가 급등했다. AI 인프라 밸류체인 전반의 투자심리가 개선됐다.

**3. GM 실적 호조·연간 전망 상향 vs 다나허·MSCI 실적 실망**
GM은 2분기 EPS $3.57로 예상($3.29)을 넘겼고 연간 전망을 올해 두 번째로 올렸다. 반면 다나허는 실적 비트에도 바이오프로세싱·마진 우려로 −10.99%, MSCI는 매출이 예상을 하회하며 −10.35% 급락했다.

## 📊 섹션 1 · 업종별 흐름

### 🔺 상승 업종

**1. 반도체 · 메모리 (핵심)**
마이크론(MU) +12.04%, 샌디스크(SNDK) +14.24%, WDC +12.51%, 시게이트(STX) +11.14%, 테라다인(TER) +12.07%, 인텔(INTC) +8.64%, AMD +8.12%. 나흘간의 투매가 과도했다는 인식에 저가매수가 폭발하며 SOX가 +5.21% 급등했다.
> 🇰🇷 [전달] 7/21 미국장 SOX +5.21%·SKHY +13.75% 대반등, 코스피200 야간선물 +4.38%(1,133.75). 서울은 7/21 코스피가 +3.56% 급등(장중 변동성 완화 조치 발동)하며 삼성·SK하이닉스가 반등, 강한 수출 데이터와 지정학 완화 기대가 겹쳤다. 모틀리풀은 지난주 한국 성인 3%가 마진콜을 받았다며 '마진콜 청산이 SK하이닉스를 세대적 매수기회로 만들 수 있다'고 진단. [판정] SKHY·야간선물·코스피가 반등 정렬을 이루며 마진콜 청산 고비를 통과하는 신호 → 7/22 코스피 반도체 강세 지속 가능성. 단 유가·금리 상승과 수요일 빅테크(알파벳) 실적이 변수. (무효화: 이란 확전·유가 $90 재돌파 또는 알파벳 실적 실망 시)

**2. AI 인프라 · 클라우드**
네비우스(NBIS) +18.78%, 루멘텀(LITE) +9.41%. 엔비디아의 네비우스 지분 취득 공개가 AI 인프라 투자심리를 되살렸다.
> 🇰🇷 [전달] AI 인프라 반등은 국내 HBM·소부장·데이터센터 밸류체인 심리에 우호적.

**3. 자동차 (실적)**
제너럴모터스(GM)가 2분기 실적 호조와 연간 전망 상향에 강세를 보였다. 관세·비용 우려에도 트럭·소프트웨어 수익성이 확인됐다.
> 🇰🇷 [전달] 미 완성차 실적 호조는 국내 자동차·부품 밸류체인 심리에 소폭 우호적.

## 🏢 섹션 2 · 이슈 종목 10선

*그날 언론에 가장 많이 언급된 이슈 종목의 구체적 기사 내용 중심.*

**1. SK하이닉스 ADR (SKHY) +13.75% ($171.94)**
사흘간의 폭락을 딛고 +13.75% 폭등했다. 지난주 한국에서 성인 인구의 3% 이상이 마진콜을 받으며 레버리지 청산이 쏟아졌으나, 이 강제 청산이 마무리 국면에 들어가면서 낙폭 과대 반발 매수가 유입됐다. 코스피가 +3.56% 급등하고 HBM 수요의 구조적 강세 논리가 재부각된 것도 힘을 실었다. 시간외에서도 +1.25% 추가 상승했다.

**2. 네비우스 (NBIS) +18.78% ($216.92)**
엔비디아가 이 AI 클라우드 인프라 업체의 지분 9.3%(패시브)를 취득한 사실이 공개되며 급등했다. AI 데이터센터 수요의 최대 수혜주로 재평가받았고, 최근 자본지출·내부자 매도 우려로 눌렸던 주가가 반전했다. AI 인프라 밸류체인 전반의 투자심리를 되살린 촉매가 됐다.

**3. 엔비디아 (NVDA) +1.97% ($207.29)**
네비우스 지분 취득이 공개되며 AI 인프라 생태계 지배력이 부각됐다. 젠슨 황이 언급한 차세대 HBM4의 첫 고객 지위와 맞물려 메모리·인프라 밸류체인의 구심점 역할을 했다. 거래량 1억 주 이상으로 시장 관심이 집중됐다.

**4. 마이크론 (MU) +12.04% ($969.65)**
메모리 대장주로 나흘간의 급락 뒤 +12% 폭등했다. SK하이닉스의 '메모리 호황이 영원하지 않다'는 경고에도, 낙폭 과대 인식과 HBM 수요 논리가 대규모 저가매수를 이끌었다. 거래량 상위(4,400만 주)로 반등의 중심에 섰다.

**5. 샌디스크 (SNDK) +14.24% ($1,588.96)**
스토리지·낸드 대표주로 이날 최대 반등폭 중 하나를 기록했다. 메모리·스토리지 전반의 급락이 과도했다는 인식에 WDC(+12.51%)·시게이트(+11.14%)와 함께 폭등했다. 최근 낙폭이 컸던 만큼 반발 매수 강도도 셌다.

**6. 인텔 (INTC) +8.64% ($105.45)**
목요일 2분기 실적 발표를 앞두고 +8.64% 급반등했다. 반도체 전반의 저가매수 흐름에 편승했고, 파운드리·AI PC 전략에 대한 기대가 실렸다. 거래량 1억 주로 관심이 높았다.

**7. AMD (AMD) +8.12% ($544.46)**
반도체 랠리에 동참하며 급등했다. AI 가속기 수요와 데이터센터 모멘텀이 재부각됐고, 최근 낙폭 과대에 대한 반발 매수가 유입됐다. SOX 급등을 견인한 대형 반도체 중 하나였다.

**8. 테라다인 (TER) +12.07% ($374.04)**
반도체 테스트 장비 대표주로 +12% 급등했다. AI·메모리 생산 확대에 따른 테스트 장비 수요 회복 기대가 반영됐다. 전일에 이어 반도체 장비 업종의 강한 반발 매수 흐름을 이어갔다.

**9. 다나허 (DHR) −10.99% ($179.01)**
2분기 조정 EPS $1.94로 예상($1.84)을, 매출 $6.3B로 예상($6.14B)을 넘겼고 연간 가이던스도 상향했다. 그러나 바이오프로세싱 수요 회복 타이밍과 마진 압박에 대한 우려가 헤드라인 호실적을 눌러 −10.99% 급락했다(장중 −15%). '실적 비트에도 급락'의 대표 사례였다.

**10. MSCI (MSCI) −10.35% ($560.44)**
2분기 EPS $4.94로 예상($4.86)을 소폭 넘겼으나, 매출 $867M이 컨센서스를 근소하게 하회했다. 구독형 지수·데이터 사업의 성장 둔화 우려가 부각되며 −10.35% 급락했다. 고밸류 성장주에 대한 눈높이가 높아진 실적 시즌의 민감도를 보여줬다.

## 🧭 섹션 3 · 구루 · 기관 코멘트

**루이스 나벨리어 — "강한 실적이 이끄는 리스크온 랠리"**
견조한 실적이 급격한 기술주 반등을 견인하며 위험선호가 되살아났다고 평가.

**모틀리풀 — "마진콜 청산이 SK하이닉스를 세대적 매수 기회로"**
지난주 한국 성인 3% 이상이 마진콜을 받으며 급락했으나, 메모리에 대한 장기 강세 논리는 그대로라며 강제 청산에 따른 낙폭을 기회로 해석.

**바클레이즈 — 반도체 강세론 유지**
코스피 변동성에도 메모리 수요의 구조적 성장을 근거로 반도체 업종 강세 전망을 유지.

**모건스탠리(GM 관련)** — GM의 실적 호조·전망 상향이 완성차 업종의 우상향 추세를 재확인시켰다고 평가.

**투자 심리** — 엔비디아의 네비우스 지분 취득이 'AI 인프라 투자 재점화' 신호로 해석되며, 최근의 반도체·AI 되돌림 우려를 완화시켰다.
