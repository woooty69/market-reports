## 🧭 시장 요약

6/22(월)은 **'대(大)로테이션'의 날**이었다. 나스닥은 −1.32%로 빅테크가 두들겨 맞았지만, 다우는 캐터필러(+3.7%) 등 산업재·은행·에너지 강세에 힘입어 **+0.29%로 디커플링**. S&P500도 −0.37%로 선방. 자금이 **AI 성장주에서 에너지·금융·산업재 등 경기민감/가치주로 이동**하는 흐름이 뚜렷했다.

촉매는 셋이다. ①**알파벳 −5%** — DeepMind 부사장 존 점퍼가 앤트로픽으로 이직(6/18 노암 셰이저는 오픈AI행에 이어 'AI 스타' 연쇄 이탈) + FY26 캐펙스 $180~190B 상향(FCF 마진 압박) + $84.75B 증자 희석 + 캘리포니아 'YouTube 미성년 중독' 소송 재심 기각 패소. ②**이란 평화 로드맵 진전** — 스위스 고위급 회담이 '60일 내 최종합의 로드맵'과 호르무즈 충돌방지 핫라인에 합의(카타르·파키스탄 중재). 지정학 완화가 위험선호를 'AI 성장주 → 실물경제'로 돌렸다. ③**메모리·AI 하드웨어 강세** — 마이크론이 6/24 실적 앞두고 신고가, 슈퍼마이크로 +15.7%(엔비디아 베라 루빈 파트너).

시장의 시선: **"AI 빌더(고밸류 성장주)에서 발을 빼 실물경제·가치·메모리로"**. 단, AI 인프라의 물리적 수혜(메모리·전력·장비)는 여전히 강세라는 점이 핵심 분기점.

## 📰 헤드라인 3선

1. **빅테크 '대로테이션' — 나스닥 −1.32% vs 다우 +0.29%.** 알파벳 −5.1%, 오라클 −5.0%, 팔란티어 −7.0%, 넷플릭스 −5.8%, 아마존 −4.7%가 지수를 눌렀다. 반대로 캐터필러 +3.7%, 콴타서비스 +5.4%, 버티브 +7.5%, JP모건 +1.9% 등 산업재·은행·에너지로 매수가 몰렸다. 모건스탠리 GIC는 "AI '빌더'에서 AI '어답터'로, 디스럽션 위험 종목은 리프라이싱"이라는 로테이션 논리를 제시. (출처: TheStreet, Morgan Stanley)

2. **알파벳 −5%, 악재 동시다발.** Google DeepMind 부사장 존 점퍼의 앤트로픽 이직(전주 셰이저는 오픈AI행)으로 장중 −7.2%까지 급락. FY26 캐펙스를 $180~190B로 $5B 상향하고 CFO가 "2027년 캐펙스는 크게 증가"라고 밝히며 FCF 마진이 2025년 18%→약 5%로 압축될 것이란 우려. $84.75B 증자 희석과 캘리포니아 소송 패소까지 겹쳤다. (출처: Bloomberg, Yahoo Finance)

3. **이란 평화 로드맵 진전 → 유가 −2.6%.** 스위스 고위급 회담이 '60일 내 최종합의 로드맵'과 호르무즈 사고방지 소통채널 구축에 합의. WTI는 $75.85(−2.62%)로 3월 이후 최저권. 지정학 완화가 위험선호를 가치·경기민감주로 이동시킨 배경. (출처: NPR, Washington Post)
