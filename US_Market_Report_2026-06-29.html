## 🧭 시장 요약

지난주 미국 증시는 **AI·반도체 트레이드의 급격한 되감기(unwind)**가 주도했다. 핵심 트리거는 **오픈AI(OpenAI)의 IPO를 2027년으로 연기할 수 있다는 보도**(뉴욕타임스)였다. 오픈AI는 6월 9일 비공개로 IPO를 신청했으나 "상장까지 시간이 걸릴 수 있다"는 신호가 나오면서, 시장 전반의 AI 밸류에이션에 대한 의구심이 한꺼번에 터져 나왔다. 그 결과 나스닥은 주간 약 4.7% 하락하며 1년여 만의 최악의 한 주를 기록했고, 반도체 지수(SOX)는 약 7.9% 빠지며 4월 초 이후 가장 부진했다.

반면 자금은 **헬스케어·제약, 소프트웨어 일부, 방어·가치주**로 빠르게 이동했다. 다우가 주간 소폭 상승한 것이 이 로테이션을 단적으로 보여준다. 금리는 하락(안전자산 선호)했고, 유가는 **美·이란 평화협상 진전(호르무즈 해협 정상화 기대)**으로 한 주 내내 급락하며 WTI가 약 $69까지 밀렸다.

월가의 시각은 갈린다. 모건스탠리의 마이클 윌슨은 "S&P가 저점을 다지고 있다"며 조정이 상당히 진행됐다(선행 PER 6개월 고점 대비 −18%)고 평가했고, 웰스파고는 "구조적 붕괴가 아닌 포지셔닝 주도의 급격한 조정"으로 본다. 반대로 일부 분석가(애캐디언 오언 라몬트 등)는 장기 이익성장 기대치(20%+)가 2000년 닷컴 고점을 넘어선 점을 거품의 신호로 지목한다.

## 📰 한 주간 주요 뉴스 5선 (투자자 함의)

**1. 오픈AI(OpenAI) IPO 2027년 연기 보도 → AI 트레이드 급랭**
NYT 보도로 오픈AI가 1조 달러 밸류에이션을 고집하며 상장을 미룰 수 있다는 관측이 확산. 샘 올트먼은 "1조 달러 미만은 논의 불가"라는 입장으로 알려짐. **함의:** AI 대장주의 상장 지연은 1차 시장(프라이빗) 밸류에이션 정점 신호로 읽히며, 2차 시장(상장 AI주) 멀티플 디레이팅을 촉발.

**2. 소프트뱅크 도쿄 증시 13% 급락**
오픈AI 지분 약 13%(약 650억 달러 보유)를 가진 소프트뱅크가 IPO 연기 보도에 급락. **함의:** AI 익스포저가 큰 지주·투자회사로 충격이 전이. 한국의 AI·반도체 밸류체인 심리에도 직접 영향.

**3. 반도체 지수(SOX) 주간 −7.9%, 4월 초 이후 최악**
마이크론 실적 이후 AI 밸류에이션·수요 지속성 우려가 겹치며 칩주 전반 급락. **함의:** AI 인프라(메모리·HBM·파운드리) 사이클의 '고점 논쟁'이 재점화. 한국 메모리주에 가장 민감한 변수.

**4. 美·이란 평화협상 진전 → 유가 급락**
호르무즈 해협 정상화·이란 항만 봉쇄 해제를 골자로 한 MOU 기대가 커지며 WTI가 약 $69, 브렌트가 $70대 초반까지 하락(2월 말 이후 최저권). **함의:** 인플레이션 압력 완화는 채권·소비주에 우호적이나, 정유·에너지주에는 부담.

**5. 자금 로테이션: 헬스케어·제약·방어주로 이동**
모더나(MRNA)·일라이릴리(LLY)·바이오젠(BIIB) 등 제약·바이오와 보험·필수소비재가 강세. 다우만 주간 상승. **함의:** "AI 일극(一極)"에서 균형 포트폴리오로의 전환 시도. 경기방어·배당주 재평가 가능성.

## 🔎 휴장·주말 신규 뉴스 5선 (다음 개장일 관전 포인트)

**1. AI 밸류에이션 논쟁의 향배 — '거품 vs. 매수 기회'**
주말 사이 "오픈AI 연기는 2026년 AI주의 조종(弔鐘)"이라는 비관론과 "에어가 빠지는 지금이 드문 매수 기회"라는 낙관론이 동시 확산. 월요일 개장 초반 반도체·하이퍼스케일러 매수세 유입 여부가 방향타.

**2. 오픈AI·소프트뱅크 후속 코멘트 주시**
경영진·이사회의 추가 입장(밸류에이션 눈높이, 상장 시점)이 나올 경우 변동성 재확대 가능. SpaceX 상장 후 6거래일간 24% 급락한 전례가 IPO 시장 전반의 경계심을 키운 상태.

**3. 美·이란 MOU 이행 리스크**
시장은 호르무즈 정상화의 '최선 시나리오'를 선반영. 이행 과정의 물류·지정학 잡음이 불거지면 유가가 되돌림(반등)할 수 있어, 월요일 에너지·항공·운송주 영향에 주목.

**4. 마이크론 실적 여진 → 메모리 가이던스 재평가**
주중 마이크론 실적 이후 AI 메모리 수요·가격 전망을 둘러싼 갑론을박이 이어짐. 월요일 SK하이닉스·삼성전자 등 한국 메모리주가 미국 칩주 흐름을 그대로 받을 공산.

**5. 단축 거래주 + 고용지표 대기 심리**
이번 주는 독립기념일(7/4 토요일, 7/3 금요일 휴장)로 단축 거래주. 목요일(7/2) 6월 고용보고서가 하루 앞당겨 발표되며, 그 전까지는 관망·저변동 흐름이 나타나기 쉬움.

## 🏭 다음 개장일(6/29 월) 섹터별 전망 + 한국 연관

**강세 후보 (금요일 종가 기준 자금 유입 섹터)**
- **헬스케어·제약:** 모더나(MRNA) +12.6%, 일라이릴리(LLY) +7.1%, 바이오젠(BIIB) +7.0%, 애브비(ABBV) +4.2%, 존슨앤드존슨(JNJ) +4.0%. AI 차익 자금의 방어처. → *한국 연관:* 셀트리온·삼성바이오로직스 등 바이오 심리에 우호적.
- **소프트웨어·플랫폼:** 서비스나우(NOW) +9.9%, 워크데이(WDAY) +9.2%, 데이터독(DDOG) +8.5%, 마이크로소프트(MSFT) +5.7%, 세일즈포스(CRM) +5.4%, 우버(UBER) +5.5%. '하드웨어 약세 vs. 소프트웨어 차별화' 구도. → *한국 연관:* 국내 SW·플랫폼주에 상대 강세 단서.
- **미디어·통신:** 넷플릭스(NFLX) +4.1%, 차터(CHTR) +3.1%. 경기방어적 성장.

**약세 후보 (금요일 급락 섹터)**
- **반도체:** 온세미(ON) −23.7%, 웨스턴디지털(WDC) −13.2%, 시게이트(STX) −12.2%, 마이크로칩(MCHP) −6.6%, 마이크론(MU) −6.7%, 텍사스인스트루먼트(TXN) −8.5%, 퀄컴(QCOM) −7.6%, ASML 고객사 AMAT −6.2%. → *한국 연관:* **SK하이닉스·삼성전자·한미반도체 등 메모리·HBM 밸류체인 직접 충격 우려.** 월요일 코스피 최대 변수.

**"시장의 시선" 요약:** 월요일은 *반도체·AI 인프라의 반등(저가매수) 여부* vs. *방어·소프트웨어 로테이션 지속* 의 줄다리기. 한국 시장은 미국 메모리주 흐름과 다우식 가치주 강세 중 어느 쪽을 추종하느냐가 관건이며, 단축 거래주 + 7/2 고용보고서 대기로 변동성은 이벤트 전까지 제한될 소지.
