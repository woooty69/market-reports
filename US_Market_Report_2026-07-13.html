## 🧭 직전주 요약 (7/6~7/10) — 'AI·반도체 vs 유가·지정학'의 롤러코스터

한 주 내내 **AI·반도체와 이란·유가 리스크가 번갈아 시장을 흔든** 변동성 장세였다. **(월) 7/6** 연휴 뒤 다우가 사상 최고(53,055)로 출발했지만, **(화) 7/7** 미국의 이란 원유 라이선스 취소로 유가가 급등하며 **SOX가 −4.65%** 급락했다. **(수) 7/8** 트럼프의 "이란 MOU 종료" 선언에 유가·금리가 뛰며 다우가 −577p 빠졌으나 반도체는 브로드컴-애플 딜로 반등했다. **(목) 7/9** 이란 공습 확전에도 **반도체가 +3.06%** 오르며 위험선호가 회복됐고, 유가는 EIA 재고 서프라이즈 증가로 반락했다. **(금) 7/10**은 조용한 강보합으로 마감하며 **SK하이닉스가 나스닥 IPO 가격을 확정**했다.

주간 성적은 소폭 상승(나스닥·S&P 강보합, 다우 상대 부진)이었지만, 그 안에서 **반도체가 하루 ±3~5%씩 출렁이는 극심한 변동성**과 **유가·금리·지정학의 상호작용**이 두드러졌다. 6월 고용 쇼크(+5.7만)로 후퇴했던 금리인상 기대는 유가·인플레 재점화로 다시 살아나, **7/29 FOMC를 앞두고 물가 지표가 최대 변수**로 부상했다.

---

## 📰 직전주 핵심 3선 (이번 주로 이어질 이슈)

1. **반도체 극심한 변동성 + SK하이닉스 나스닥 IPO**: SOX가 주중 −4.7%↔+3.1%로 출렁였고, 금요일 SK하이닉스가 나스닥 상장 공모가를 확정. 'AI 밸류에이션 검증'과 메모리 슈퍼사이클 기대가 공존.
2. **이란 확전·유가 급등락**: 미국의 이란 공습·MOU 파기로 유가가 $74대까지 급등했다가 EIA 원유재고 증가로 $71대로 반락. 지정학 프리미엄과 공급 펀더멘털이 힘겨루기.
3. **인플레·금리 재점화**: 유가 반등이 인플레 우려를 되살리며 10년물 4.56%·2년물 4.19%로 상승. 6월 FOMC 의사록의 '추가 인상 여지'와 맞물려 이번 주 **CPI가 분수령**.

## 🔭 이번 주(7/13~7/17) 관전 포인트 & 일정 — '빅위크'

- **7/14(화) — 최대 분수령**:
  · **6월 CPI**(08:30 ET) — 헤드라인 **약 3.8%** 예상(5월 4.2%에서 둔화), PPI 약 6.2%. 물가 둔화 확인 시 금리·성장주에 우호, 상회 시 인상 우려 재점화.
  · **대형은행 실적 개막** — **JP모건·골드만삭스·BofA·웰스파고·씨티** 동시 발표. 실적시즌 첫 신호탄.
  · **케빈 워시 연준 의장, 첫 의회 통화정책 증언** 시작 — 매파/비둘기 톤이 금리 경로의 핵심.
- **7/15(수)**: 모건스탠리·블랙록 실적, **ASML**(반도체 장비) 실적 — AI капex·주문 동향.
- **7/16(목)**: **TSMC**(AI·반도체 심리 테스트)·**넷플릭스** 실적, **6월 소매판매**.
- **시장 컨센서스**: 2분기 실적은 **2개 분기 연속 +20% 이익 성장** 기대. 전망은 "약(弱)강세, 단 변동성 확대" — 재료가 몰려 등락 폭이 커질 수 있음.
- **금리**: 시장은 12월까지 **0.25%p 인상 1회**를 반영. CPI·워시 증언이 이 기대를 좌우.

## 🧭 섹터 전망 + 한국 연관

- **반도체/AI 하드웨어**: **ASML(수)·TSMC(목)** 실적이 AI capex·메모리 업황의 직접 가늠자. → 🇰🇷 **삼성전자·SK하이닉스**(SK하이닉스 나스닥 상장 직후)·장비주에 강한 읽을거리. 서프라이즈 여부에 변동성 확대 가능.
- **금융(은행)**: CPI·금리 환경에서 대형은행 실적(순이자마진·트레이딩·대손) 주목. → 🇰🇷 은행·증권주 심리 참고.
- **인터넷/미디어**: **넷플릭스** 실적 — 스트리밍·광고 성장. → 🇰🇷 콘텐츠·플랫폼주 간접.
- **에너지**: 이란 리스크 vs 재고 부담의 유가 방향. → 🇰🇷 정유(S-Oil)·항공 상반 영향.
- **금리민감(성장주·리츠)**: CPI 결과가 밸류에이션 좌우. 둔화 시 성장주 우호.
