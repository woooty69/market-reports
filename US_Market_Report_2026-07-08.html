## 🧭 시장 요약

**하루 만에 다시 뒤집혔다 — 'AI 언와인드 재개 + 유가 급등'이 강한 로테이션을 만들었다.** 미 재무부가 **이란산 원유 판매를 허용하던 라이선스를 취소**하면서 유가가 급등(WTI +5.3% $72.20, 브렌트 $76대), 이것이 인플레이션·금리 상승 우려로 이어지며 **반도체·성장주에서 에너지·가치·헬스케어로 자금이 대거 이동**했다.

반도체가 직격탄이었다. **SOX가 −4.65%** 급락하며 인텔(−9.5%)·아스테라랩스(−11.5%)·테라다인(−9.8%)·웨스턴디지털(−7.8%)·샌디스크(−7.3%)·AMD(−6.4%)·마이크론(−4.7%)이 무너졌다. 삼성전자의 어닝 서프라이즈조차 미국 칩주를 끌어올리지 못했고, "기대치는 높은데 펀더멘털이 그 눈높이를 못 따라간다"는 분석이 매도를 부추겼다. 테슬라도 −4.0%. 반면 **엔비디아(+0.7%)·메타(+2.6%)는 나홀로 선방**했다.

반대편에서 **에너지·소재·헬스케어·금융이 급등**했다. 옥시덴탈(+5.9%)·데번(+5.1%)·아파치(+4.7%) 등 에너지, 다우케미컬(+4.8%)·길리어드(+5.2%)·코그니전트(+6.2%)·CBOE(+5.5%)가 강했다. 유가發 인플레와 **매파적 FOMC 의사록(7/8) 경계**에 국채금리가 급등(10년물 4.55%·2년물 4.19%)했고, 다우는 장중 사상 최고를 찍은 뒤 −0.25%로 반락했다. VIX +3.6%(16.1).

## 📰 시장 헤드라인 3선

**1. 이란 원유 라이선스 취소 → 유가 +5% 급등, 에너지주 랠리**
미 재무부가 이란산 원유 판매 허가를 철회하면서 WTI가 +5.3%($72.20), 브렌트가 $76대로 뛰었다. 옥시덴탈(+5.9%)·데번(+5.1%)·아파치(+4.7%) 등 E&P가 급등. 유가 반등은 인플레이션 재점화 우려로 이어지며 금리 상승·성장주 부담으로 작용했다.

**2. 반도체 재차 급락(SOX −4.65%) — 삼성 호실적도 못 살린 'AI 언와인드'**
직전 반등하던 반도체가 다시 무너졌다. 인텔 −9.5%, 아스테라랩스 −11.5%, 테라다인 −9.8%, WDC −7.8%. 삼성전자의 어닝 서프라이즈에도 미국 칩주는 하락 — "기대치 대비 펀더멘털이 부족하다"는 경계가 매도를 키웠다. 반에크 반도체 ETF(SMH) −3%대.

**3. 국채금리 급등 + 매파 FOMC 의사록 경계**
유가發 인플레와 7/8(현지) FOMC 의사록의 매파적 톤 경계로 **10년물이 4.55%(+7bp), 2년물 4.19%(+6bp)** 로 급등. "국채금리가 매파적 의사록에 대비해 상승한다"는 평가. 금리 상승이 고밸류 성장주 밸류에이션을 압박했다.

### 🔻 하락 업종

**① 반도체·AI 하드웨어 — 'AI 언와인드' 재개**
대표주: 아스테라랩스(ALAB) −11.52%, 테라다인(TER) −9.79%, 인텔(INTC) −9.53%, 웨스턴디지털(WDC) −7.81%, 샌디스크(SNDK) −7.26%, AMD(AMD) −6.43%, 마이크론(MU) −4.66%.
금리 급등 + '기대 대비 펀더멘털 부족' 경계에 반도체 전반이 급락. SOX −4.65%.
*시장의 시선: "AI 밸류에이션은 여전히 검증 중 — 금리가 오르면 가장 먼저 판다."*
*🇰🇷 한국 연관: **삼성전자·SK하이닉스**·장비주 단기 변동성 확대(삼성 호실적에도 美 칩 약세 주의).*

**② 전기차·고밸류 성장**
대표주: 로켓랩(RKLB) −10.40%, NBIS(−8.38%), 테슬라(TSLA) −4.02%.
금리 상승에 고밸류·장기성장주가 큰 폭 조정.

**③ 전력설비·기타**
대표주: 제너랙(GNRC) −8.54%.
AI 전력 테마 일부도 되돌림.

> **요약 — 시장의 시선**: 유가 급등·금리 상승이 **에너지·가치·헬스케어(매수) ↔ 반도체·성장(매도)** 로테이션을 촉발. 한국 적용 시 **정유·화학·제약 상대 우위 / 반도체·성장주 단기 변동성**. 7/8 FOMC 의사록과 유가 방향이 다음 분수령.
