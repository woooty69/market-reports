# 미국 증시 데일리 리포트 — 칩 반등 하루 만에 소멸, 방어·금리민감주로 재로테이션
기준일: 2026년 6월 9일(화) 미국 정규장 마감

## 주요 지수·자산

| 지수·자산 | 지수·가격 | 등락 |
|---|---|---|
| 나스닥 종합 | 25,678.82 | ▼ 0.97% (칩 반등 동력 소진) |
| S&P 500 | 7,386.65 | ▼ 0.26% |

| WTI 유 (근월) | 약 $88 | ▼ 3.4% (정산가 기준; 중동 재긴장에도 하락) |

> 변동성: VIX 선물 ▲1.41% / 비트코인 ▼약 2% / 달러(DXY) 보합. 금리 하락에 주택·헬스케어·리츠 등 **금리민감·방어주는 강세**, AI·반도체·광통신은 **재차 약세**. 다우만 상승한 "지수 내부 분열" 장.

## 시장 요약

6월 9일 미국 증시는 **전일(6/8) 반도체 V자 반등이 하루 만에 꺾이며** 나스닥·S&P500이 하락 반전했다. 월요일 S&P 상승분의 대부분을 엔비디아·마이크론이 책임졌을 만큼 반등이 칩에 편중됐는데, 그 동력이 소진되자 매도가 시장 전반으로 번졌다. 장중에는 **트럼프 대통령이 이란에 대한 추가 군사 대응을 시사**(미군 헬기 피격 관련 "대응해야 한다" 발언)하면서 낙폭이 커졌다.

다만 **금리 하락(10년물 약 4.54% 보합~소폭 하락)** 에 힘입어 주택건설·주택연관, 헬스케어, 리츠, 항공·여행, 은행 등 **금리민감·경기방어·가치주가 일제히 강세**를 보이며 다우는 오히려 상승했다. 유가는 중동 재긴장에도 3% 넘게 하락(WTI 약 $88)해 항공주엔 호재, 에너지주엔 악재로 작용했다. 한 마디로 "AI에서 빠진 돈이 가치·금리민감주로 옮겨간" 로테이션 장세다. 시장의 시선은 다시 *AI 쏠림의 지속성*에 대한 의심으로 기울었고, **오늘(6/10) 발표되는 5월 CPI** 가 방향을 가를 분수령이다.

## 📰 시장 헤드라인 3선

**1. 칩 반등은 '하루짜리'였다.** 월요일 S&P 상승의 대부분을 책임졌던 엔비디아·마이크론의 반등 동력이 소진되자 매도가 전 시장으로 확산. 나스닥 ▼0.97%, S&P ▼0.26%, 다우는 ▲0.17%. (CNBC·Investing.com)

**2. 트럼프, 이란 추가 타격 시사 → 후장 낙폭 확대.** "미군 헬기 피격에 미국은 대응해야 한다"는 SNS 발언 후 매도 가속. 지정학 리스크가 위험자산을 압박. (TheStreet)

**3. 유가 3%+ 하락, 금리 안정 → 가치·금리민감주 로테이션.** WTI 약 $88로 후퇴, 10년물 약 4.54% 보합. 주택건설·헬스케어·리츠·항공이 강세로 다우를 견인. (Trading Economics·CNBC)
