### 기준: 직전 정규장 2026년 7월 17일(금) · 주말(7/18~19) 새 정규장 없음 · 한국 증시 오늘(7/20 월) 이틀 휴장 후 개장

## 🗓 한 주 요약

**AI·반도체 밸류에이션 재평가와 유가 급등이 겹친 격동의 한 주 뒤, 시장은 '실적 슈퍼위크'를 앞두고 월요일을 맞는다.** 지난주 나스닥 −2.90%·S&P500 −1.55%·다우 −0.93%로 3대 지수가 동반 하락했고, **SOX는 주간 −9.97% 급락하며 금요일 장중 6월 고점 대비 −20%를 넘겨 베어마켓에 진입**했다. 반도체 ETF(SMH)는 최근 4주 중 3주째 주간 하락(이번 주 약 −9%)이다. SK하이닉스 ADR(SKHY)은 화요일 +27% 폭등에서 목요일 −13.7% 폭락을 오간 끝에 주간 −8.32%($154.03)로 마감했고, WTI는 호르무즈 봉쇄 재개로 주간 +15.5%($82.47)까지 치솟았다.

한국은 지난주(7/13~16) **KOSPI가 주간 −8.76%(−655.34p) 폭락하며 7,000선을 반납**했고(7/16 하루 −6.37%, 매도 사이드카 발동, 한국은행 깜짝 인상), 7/17 제헌절 휴장으로 금요일 미국장의 저점 반등을 반영하지 못한 채 오늘 이틀 만에 개장한다. 주말 사이 중동 긴장은 완화 신호 없이 이어졌고, AI 조정의 성격(차익실현 vs 구조적 재평가) 논쟁이 지속돼 오늘 아시아장이 첫 시험대다.

## 📰 섹션 2 · 한 주간 주요 뉴스 5선

**1. SOX 주간 −9.97% — 반도체 베어마켓 진입**
월요일 −4.78%(유가·금리 쇼크), 목요일 −4.29%(TSMC 자본지출 상향의 '메모리 과잉투자' 역해석), 금요일 −1.63%(장중 −20% 하회 후 저가매수 반등)로 이어진 사흘 급락. 일부 분석은 이번 조정을 장기 랠리 뒤의 차익실현으로, 다른 쪽은 AI 투자 규모 자체에 대한 재평가로 해석한다. **투자자 함의:** 조정 성격 논쟁이 정리되기 전까지 반등 시에도 변동성 상시화를 전제해야 한다.

**2. 호르무즈 봉쇄 재개 — WTI 주간 +15.5%**
미국의 이란 선박 봉쇄 재개와 통항 수수료 20% 부과로 월요일 WTI가 +9.2% 폭등, 주 후반 $82선에 안착했다. 해협 통항은 주간 52% 급감했고 브렌트는 장중 $87을 터치했다. **투자자 함의:** 유가발 인플레 재점화는 연준 인하 기대를 흔드는 최대 매크로 리스크 — 정유 수혜·항공 원가 부담의 명암이 뚜렷하다.

**3. 6월 CPI 3.5%·PPI −0.3% — 7월 FOMC 인상 확률 10%로 급락**
CPI가 전월 −0.4%로 예상(3.8%)을 크게 밑돌며 디스인플레가 확인됐고, 7/28~29 FOMC 인상 확률은 주초 44%(한때 33%)에서 10%로 후퇴했다. 케빈 워시 연준 의장은 의회 증언에서 인플레 급등의 종식을 시사하면서도 '미션 완수'에는 선을 그었다. **투자자 함의:** 물가 둔화 vs 유가 급등의 힘겨루기 — 다음 지표까지 금리 변동성 구간.

**4. 중국 문샷 'Kimi K3' — 제2의 딥시크 모먼트**
2.8조 파라미터의 역대 최대 오픈웨이트 모델 Kimi K3가 공개되며 미국 선두 모델들과의 벤치마크 격차를 좁혔고, 입력 100만 토큰당 $3의 공격적 가격까지 겹쳐 금요일 글로벌 반도체 투매를 촉발했다(대만 −6%, 일본 −4%). 케이던스(CDNS)·시놉시스(SNPS)도 EDA 자동화 시연 여파로 급락했다. **투자자 함의:** 저비용 중국 AI의 추격은 미국 AI 인프라 수요 논리를 시험한다 — 시연의 성숙공정 한계 등 반론도 병존.

**5. SKHY 롤러코스터와 한국 증시 폭락**
SKHY는 CPI 랠리에 $194.16(+27.4%)까지 치솟았다가 목요일 −13.69% 급반락, 금요일 +1.13%($154.03)로 진정됐다(장중 IPO 공모가 $149 하회 후 회복). 서울에서는 7/16 KOSPI −6.37% 폭락(삼성전자 −8.77%·SK하이닉스 −11.53%)과 사이드카, 한은 깜짝 인상, 레버리지 반도체 ETF 거래 중단이 이어졌다. **투자자 함의:** ADR-원주-지수선물이 실시간으로 얽힌 새 구조에서 미국장 급변이 한국으로 즉시 전이되는 변동성 체계가 확인됐다.

## 🌙 섹션 3 · 휴장·주말 신규 뉴스 5선 (오늘 개장 관전 포인트)

**1. 미·이란 협상 사실상 중단 — 주말에도 야간 공습 지속**
이란 당국자는 토요일 국영방송에서 "모든 약속의 이행을 중단했다"고 밝혔고, 카타르·파키스탄 중재 협상은 사실상 표류 상태다. 미군은 한 주 내내 야간 공습을 이어갔고 UAE·쿠웨이트·바레인의 전력망·정유·담수화 설비 피해까지 확인됐다. **관전:** 월요일 아시아 시간대 유가 갭업 여부 — 갭업 시 금리·성장주에 재차 역풍.

**2. 'AI 조정의 성격' 주말 논쟁 — 차익실현인가, 구조적 재평가인가**
주말 외신들은 금요일 급락을 두고 "장기 랠리 뒤의 차익실현"(수급 요인)과 "AI 과잉투자 우려의 구조화"(펀더멘털 요인)로 해석이 갈렸다. 방어주 로테이션(버크셔 +1% 등)이 병행된 점은 후자의 방증이라는 지적도 있다. **관전:** 월요일 저가매수 유입 강도 — SMH 4주 −9.5% 낙폭 뒤 기술적 반등 여지.

**3. Kimi K3 오픈웨이트 무료 공개(7/27) 카운트다운**
7/27부터 누구나 Kimi K3를 무료로 구동할 수 있게 되면서 미국 AI 모델·인프라의 가격 결정력 논쟁이 이번 주 내내 이어질 전망이다. 엔비디아(NVDA) 중심의 'AI 지출 필연론'이 흔들리는지가 핵심. **관전:** 알파벳 실적(수요일)의 자본지출 가이던스가 'AI 수요 건재'의 직접 증거가 될지.

**4. 한국 증권가 주간 전망 — "수급 충격, SK하이닉스 실적이 반등 가른다"
증권가는 지난주 폭락을 펀더멘털 훼손보다 레버리지 ETF 청산이 겹친 수급 충격으로 진단하며, **7/24 예정(잠정)인 SK하이닉스 실적발표**를 이번 주 최대 분수령으로 꼽았다. "반도체 이익 전망은 크게 훼손되지 않아 밸류에이션 매력 구간에서 저가매수 유입 가능"(대신증권) 견해와, 코스피 6,400선까지 열어둬야 한다는 신중론이 병존한다. **관전:** 오늘 개장 시 반대매매·청산성 매물 소화 여부.

**5. 어닝 슈퍼위크 개막 — S&P500 77개사 실적, 알파벳·테슬라(7/22 수)**
경제지표가 한산한 대신 실적이 몰린다. 알파벳은 연간 자본지출 가이던스($180~190B) 유지·상향 여부가, 테슬라는 마진·사이버캡 수익화가 초점. GM·인텔(INTC)·IBM·버라이즌(VZ)·록히드마틴(LMT) 등도 대기하며, S&P500 2분기 이익은 전년 대비 +23% 성장 컨센서스다. **관전:** 실적이 'AI 수익화 검증'을 통과하면 반도체 반등 촉매, 실망 시 조정 연장.

## 🧭 섹션 4 · 오늘 개장일(7/20 월) 섹터별 전망

**① 반도체·AI 하드웨어 — '금요일 반등분 + 낙폭과대' vs '주말 무완화 + 청산 매물'**
미국 금요일장은 SOX가 베어마켓 진입 후 저가매수로 낙폭을 줄였고(−1.63%), SKHY도 +1.13%로 투매가 일단 진정됐다. 주말 신규 악재는 제한적이나 완화 재료도 없다.
> 🇰🇷 [전달] 한국은 7/16 −6.37% 폭락으로 미국 목요일분 악재까지 선반영한 뒤 이틀 휴장 — 금요일 미국장 반등분(SOX 낙폭 축소·SKHY +1.13%)은 미반영 상태로 전달 잔여는 소폭 양(+). SK하이닉스(000660)·삼성전자(005930)는 대미 베타 1.4~1.6의 고베타 종목이라 오늘 밤 미국장 선물 흐름에도 재민감. [수급] 외국인은 반도체 투톱에서 5일 누적 각 −8.3조·−7.7조 원 규모의 대량 순매도를 이어온 반면, 급락일 기관은 SK하이닉스 +2.5조·삼성전자 +1.3조 원 순매수로 맞섰다 — 외국인 매도 감속 + 기관 전환이 동시 확인되면 매도 클라이맥스 통과 후보. [판정] '낙폭과대 기술적 반등 시도 후 수급 확인' 국면 — 반등의 지속성은 외국인 순매도 감속과 7/24(잠정) SK하이닉스 실적에 달렸다. (무효화: 개장 후 외국인 반도체 순매도 1조 원 이상 재확대, 또는 유가 갭업發 위험회피 재점화 시 반등 논리 소멸)

**② 에너지·정유 — 유가 주간 +15.5%, 주말 무완화로 수혜 연장**
발레로(VLO)·필립스66(PSX) 등 미 정유주 주간 강세가 이어졌고, 주말 협상 표류로 공급 차질 장기화 리스크가 유지됐다.
> 🇰🇷 [전달] 정제마진·재고평가 이익 기대는 S-Oil(010950)·SK이노베이션(096770)·GS(078930)에 양(+) 전달. [수급] 국내 정유주는 수급 공백이 길었던 만큼 순환매 유입 여지. [판정] 유가 $80대 유지 시 상대 강세 지속 후보 — 반대로 항공(대한항공 003490)은 원가 부담 지속. (무효화: 휴전 협상 급진전·유가 급락 시)

**③ 방어주(헬스케어·보험·필수소비) — '실적 동반' 로테이션 연장 여부**
유나이티드헬스(UNH)·애벗(ABT)·트래블러스(TRV)에 이어 금요일 버크셔(BRK)까지, AI 이탈 자금의 피난처 역할이 확인됐다.
> 🇰🇷 [전달] 국내 제약·바이오 대형주와 보험·음식료에 온건한 양(+) 심리 전달 — 다만 미국은 실적 동반 로테이션이라 실적 없는 단순 방어주 추종은 한계. [수급] 급락일 기관 매수가 KB금융(105560) 등 금융·방어 쪽에서도 관찰돼 초기 이동 신호. [판정] 반도체 변동성 상시화 국면의 헤지 포지션으로 유효. (무효화: 반도체 V자 반등으로 위험선호 급반전 시)

**④ 금융 — 미 실적 호조 + 한은 인상의 이중 효과**
골드만삭스(GS)·블랙록(BLK) 등 미 금융주는 실적 서프라이즈로 주간 강세였다.
