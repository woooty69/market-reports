## 🗓 시장 요약

반도체 매도세가 사흘째 이어졌다. 장중 필라델피아 반도체 지수(SOX)가 고점 대비 20% 이상 빠지며 **베어마켓에 진입**했으나, 저가매수가 유입되며 낙폭을 −1.63%로 줄여 마감했다. 그럼에도 넷플릭스의 실적 실망(−7.38%), 인튜이티브서지컬의 가이던스 하향(−14.17%), 그리고 EDA(반도체 설계 SW) 대표주 케이던스(−9.47%)·시놉시스(−7.83%)의 급락이 겹치며 3대 지수는 모두 하락 마감했다(나스닥 −1.40%, S&P −1.01%, 다우 −0.77%).

특히 중국 AI 스타트업 **문샷(Moonshot)의 신모델 'Kimi K3'가 오픈소스 EDA 툴만으로 반도체 칩 설계 전 과정을 48시간 만에 완주**했다는 시연이 공개되며, 케이던스·시놉시스의 '해자(moat)'와 미국의 기술 우위에 대한 의구심을 자극했다.

유가는 중동 리스크에 **+3.6% 급등($82.47)**했고, 단기 인플레 우려로 2년물 금리가 4.181%로 올랐다(10년물은 4.547% 보합). VIX는 18.74(+12%)로 뛰었다. 주간 기준 나스닥은 −2.9%, S&P는 −1.5%+ 하락했다. 반면 방어주는 강세로, 트래블러스가 실적 대폭 상회에 +9.22% 급등했고 센틴·휴마나 등 헬스케어가 순환매를 이어갔다.

한편 **SK하이닉스 ADR(SKHY)은 사흘 만에 +1.13% 반등**($154.03)하며, 장중 IPO 공모가($149)를 밑돈 $147.45까지 밀렸다가 회복했다.

## 📰 시장 헤드라인 3선

**1. 반도체 매도 3일차 — SOX 장중 베어마켓 진입 후 저가매수로 반등 마감**
SOX는 장중 고점 대비 −20%를 넘겨 베어마켓에 들어섰으나, 막판 저가매수로 −1.63%까지 낙폭을 축소했다. 마이크론(−0.46%)·SK하이닉스(+1.13%) 등 메모리는 상대적으로 안정됐고, 시게이트(+5.56%) 등 스토리지 일부는 반등했다.

**2. 중국 문샷 'Kimi K3', 오픈소스 EDA로 칩설계 완주 → 케이던스·시놉시스 급락**
문샷의 신모델이 라이선스 EDA 없이 오픈소스 툴만으로 칩 설계 전 공정을 자동 완수했다고 밝히면서, "AI 복잡도 상승 = EDA 수요 증가"라는 케이던스·시놉시스의 핵심 논리에 물음표가 붙었다. 두 종목은 각각 −9.47%, −7.83% 급락했다.

**3. 넷플릭스 실적 실망 −7.4% · 인튜이티브서지컬 가이던스 하향 −14% vs 트래블러스 +9.2%**
넷플릭스는 EPS는 소폭 상회했으나 매출이 컨센서스를 밑돌고 3분기 가이던스가 실망스러워 급락했다. 인튜이티브서지컬은 어닝 비트에도 가이던스가 부드러워 −14% 급락했다. 반면 트래블러스는 어닝 서프라이즈로 52주 신고가를 썼다.

## 📊 섹션 1 · 업종별 흐름

### 🔺 상승 업종

**1. 보험 · 금융**
트래블러스(TRV) +9.22%. 2분기 실적이 예상을 크게 웃돌며 52주 신고가를 경신, 방어·가치주 선호를 대표했다.
> 🇰🇷 [전달] 미 보험주 강세는 실적 개별 이슈로 국내 연동은 약하나, 위험회피 국면의 방어주 선호 심리를 시사.

**2. 헬스케어 (방어)**
센틴(CNC) +3.99%, 휴마나(HUM) +3.50%. 반도체·AI에서 이탈한 자금이 저평가 방어 업종으로 이동하는 순환매가 이어졌다.
> 🇰🇷 [전달] 방어주 로테이션 지속은 성장주 조정 국면의 방증 — 국내에서도 반도체 쏠림 완화 시 참고.

**3. 스토리지 (반등)**
시게이트(STX) +5.56%. SK하이닉스가 지속적 수요를 시사하면서 낙폭 과대 스토리지주가 반등했다.
> 🇰🇷 [전달] 스토리지 반등은 메모리 투매 진정 신호일 수 있어 국내 SK하이닉스·삼성전자 단기 바닥 탐색에 우호적.

### 🔻 하락 업종

**1. 반도체 설계(EDA) · 장비**
케이던스(CDNS) −9.47%, 시놉시스(SNPS) −7.83%, 어플라이드머티어리얼즈(AMAT) −5.57%. 문샷 Kimi K3의 오픈소스 EDA 칩설계 시연이 EDA 해자를 위협했고, 반도체 장비도 셀오프 여파를 받았다.
> 🇰🇷 [전달] EDA·장비 우려는 국내 반도체 소부장(설계 IP·장비) 밸류체인 심리에 잠재적 부담.

**2. 커뮤니케이션 · 미디어**
넷플릭스(NFLX) −7.38%, 알파벳(GOOGL) −2.21%, 메타(META) −2.79%. 넷플릭스 실적 실망과 AI 경쟁 우려가 겹쳤다.
> 🇰🇷 [전달] 미디어·플랫폼 개별 이슈로 국내 직접 연동은 낮음.

**3. 반도체 (핵심)**
엔비디아(NVDA) −2.21%, AMD −1.03%. 사흘째 약세이나 장 막판 저가매수로 낙폭이 축소됐고, SK하이닉스 ADR은 +1.13% 반등했다.
> 🇰🇷 [전달] 7/17 미국장에서 SKHY ADR이 3일 만에 +1.13% 반등($154.03, 장중 IPO가 $149 하회 후 회복)했고 SOX도 장중 베어마켓 진입 후 반등 마감. 서울 SK하이닉스(000660)는 7/16 −11.53% 급락에 이어 7/17(금)에도 아시아 AI 로우트(삼성·소프트뱅크 동반 급락) 속 추가 하락한 것으로 보도됐다(pykrx 7/17 종가·수급은 주말 미갱신으로 확인 지연). 코스피200 야간선물은 토요일 새벽 데이터 미갱신으로 미확인. [판정] 금요일 미국장의 SKHY 반등·SOX 저점 반등은 월요일(7/20) 한국 반도체의 단기 바닥 탐색 신호로 긍정적. 단 EDA·넷플릭스 등 개별 악재와 유가 급등(단기금리 상승)이 변수. (무효화: 주말 중 문샷發 반도체 밸류 재평가 확산 또는 추가 악재 시 반등 무산)

**시장의 시선:** 반도체 조정이 사흘째지만 저가매수와 SK하이닉스 반등으로 '바닥 탐색' 조짐이 나타났다. 다만 중국 문샷의 EDA 시연이라는 새 변수와 유가 급등이 겹치며, AI 트레이드의 되돌림과 순환매가 동시에 진행되고 있다.

## 🏢 섹션 2 · 이슈 종목 10선

*그날 언론에 가장 많이 언급된 이슈 종목의 구체적 기사 내용 중심.*

**1. 넷플릭스 (NFLX) −7.38% ($68.86)**
2분기 EPS는 $0.80으로 예상을 소폭 상회했으나, 매출이 $12.56B로 컨센서스 $12.6B를 근소하게 밑돌았다. 특히 3분기 매출·이익 가이던스가 팩트셋 컨센서스를 하회하며 실망을 키웠다. 장 초반 −10% 넘게 밀렸다가 −7.38%로 마감, 이날 거래량 상위(1.3억 주)를 기록했다.

**2. 인튜이티브서지컬 (ISRG) −14.17%**
2분기 EPS $2.80으로 예상 $2.50을 12% 상회했고 매출도 $2.89B로 컨센($2.82B)을 넘겼다. 그러나 향후 가이던스가 시장 기대에 못 미치면서 애널리스트들이 목표주가를 잇따라 하향했다. '실적 비트에도 소프트한 가이던스'가 −14% 급락으로 이어진 전형적 사례였다.

**3. 트래블러스 (TRV) +9.22% ($368.98)**
2분기 EPS가 $10.26으로 컨센 $5.34를 무려 $4.92 상회하는 대형 어닝 서프라이즈를 냈다. 매출도 $11.53B로 예상 $11.26B을 웃돌았다. 손해율 개선과 투자수익 호조가 겹치며 장중 $364.93까지 올라 52주 신고가를 경신, 이날 방어·가치주 강세의 상징이 됐다.

**4. 케이던스 (CDNS) −9.47%**
중국 문샷의 Kimi K3가 오픈소스 EDA 툴만으로 48시간 만에 칩 설계 전 공정을 자동 완주했다는 시연이 악재였다. "AI 칩 복잡도 상승 → 프리미엄 EDA 수요 증가"라는 케이던스의 핵심 투자 논리에 직접적 물음표가 붙었다. 라이선스 SW 없이 설계가 가능하다는 점이 해자 훼손 우려로 번졌다.

**5. 시놉시스 (SNPS) −7.83%**
케이던스와 함께 글로벌 EDA 양강으로, 동일한 문샷 Kimi K3 시연의 직격탄을 맞았다. 오픈소스 기반 자동 설계가 상용화될 경우 EDA 라이선스 모델의 성장성이 훼손될 수 있다는 우려가 부각됐다. 반도체 설계 SW 밸류에이션 전반에 대한 재평가 심리로 확산됐다.

**6. SK하이닉스 ADR (SKHY) +1.13% ($154.03)**
사흘 만에 반등했다. 장중 IPO 공모가 $149를 처음으로 밑돈 $147.45까지 밀렸다가 회복했으며, 회장이 "주식을 보유하라"며 강한 메모리 수요를 강조한 점이 심리 안정에 기여했다. SK하이닉스가 지속 수요를 시사하자 시게이트 등 스토리지주도 동반 반등했다.

**7. 어플라이드머티어리얼즈 (AMAT) −5.57%**
반도체 장비 대표주로 사흘째 이어진 칩 셀오프의 여파를 받았다. TSMC 자본지출 논쟁과 EDA 우려가 장비 업종 전반의 투자심리를 위축시켰다. 다만 SOX와 마찬가지로 장 막판 낙폭은 일부 축소됐다.

**8. 엔비디아 (NVDA) −2.21% ($202.81)**
AI 대장주로 이날도 언론 최다 언급 종목 중 하나였다. 문샷 신모델 등장과 반도체 로테이션 압력에 약세였으나, HBM·AI 수요의 구조적 강세 논리가 낙폭을 제한했다. 거래량 1.4억 주로 시장 관심이 집중됐다.

**9. 시게이트 (STX) +5.56% ($786.93)**
스토리지·HDD 대표주로, 전일까지 급락했다가 이날 반등에 성공했다. SK하이닉스가 지속적 메모리·스토리지 수요를 시사한 것이 반등 촉매가 됐다. 낙폭 과대 인식과 저가매수가 유입됐다.

**10. 마이크론 (MU) −0.46% ($849.25)**
메모리 대장주로 사흘간의 급락 뒤 이날은 보합권에서 안정됐다. HSBC가 '메모리 피크 우려 과도'를 재확인하고 SK하이닉스 반등이 겹치며 낙폭이 진정됐다. 거래량 상위(5,900만 주)로 여전히 시장 관심이 높았다.

## 🧭 섹션 3 · 구루 · 기관 코멘트

**HSBC — "SK하이닉스가 최선호주" (피크 우려 과도)**
메모리 업황이 정점에 근접했다는 우려는 지나치며, 강력한 AI 수요가 향후 실적 성장을 뒷받침한다고 재차 강조. 마이크론과 함께 상승여력을 제시했다.

**모틀리풀 — "메모리 슈퍼사이클은 아직 다리가 남았다"**
SK하이닉스는 HBM 리더이자 엔비디아 주력 공급사로, DRAM이 최소 2030년까지 공급 부족일 것으로 전망하며 최근 급락을 매수 기회로 해석.

**앨릭스 카프(팔란티어 CEO)** — 팔란티어를 엔비디아·마이크론·SK하이닉스와 함께 'AI 인프라의 진정한 승자' 그룹으로 분류하며 AI 투자 확대의 최대 수혜주로 지목.

**비즈니스인사이더 — "한국 증시 랠리의 한 가지 큰 리스크"**
한국 개인투자자들이 삼성전자·SK하이닉스 레버리지 ETF에 빚을 내 몰리고 있다며, 변동성 확대 시 손실 위험을 경고.

**시장 코멘트(문샷 이슈)** — 중국 문샷 Kimi K3의 오픈소스 EDA 칩설계 시연이 미국 반도체 설계 SW의 해자와 기술 우위 논쟁을 촉발.
