# 미국 증시 24시간 데일리 리포트
### 2026년 6월 11일(목) 작성 — 직전 미국 정규장(6/10) 세션

**주요 지수·자산**

| 지수·자산 | 지수/가격 | 등락 |
|---|---|---|
| 나스닥 | ≈25,300 | -1.93% |
| S&P 500 | ≈7,340 | -1.55% |
| 다우 | ≈50,500 | -1.81% |
| WTI유 | ≈$94.1 | +2.07% |
| 美 10년물(금리) | 4.45% | 보합 (-0.07%) |

> **시장 요약 — 'CPI 쇼크 + 지정학'의 이중 악재** — 5월 소비자물가가 **+4.2%(2023년 5월 이후 3년 최고)** 로 나오며 **Fed 금리인상 우려가 폭발**했고, 여기에 **미-이란 군사 충돌이 재점화**되며 위험회피가 겹쳤다. 다우 -1.9%(약 950p)·S&P -1.6%·나스닥 -2%. 금리·경기 민감한 **산업재·기술·경기소비재가 급락**한 반면, **유가 급등으로 에너지가 아웃퍼폼**, 통신·필수소비 등 방어주가 상대적으로 선방했다. 개별로는 **슈퍼마이크로(SMCI) -28% 폭락**과 **캐시스(CASY) +20% 급등**이 극단적으로 갈렸다.

**📰 시장 헤드라인 3선**

1. **5월 CPI +4.2% 3년 최고 → 금리인상 우려**: 소비자물가가 2023년 5월 이후 가장 빠르게 상승. "Fed가 연내 인상할 수 있다"는 베팅이 커지며 금리 급등·증시 급락. 금리 민감 자산이 직격탄.
2. **미-이란 충돌 재점화 → 유가↑·산업재↓**: 미국의 추가 타격 시사로 지정학 위험 부각. 유가 상승에 에너지(데번 DVN +5.7%·코노코 COP +2.7%)가 아웃퍼폼한 반면, 산업재(캐터필러 CAT -6.4%·이튼 ETN -6.5%)·항공(유나이티드 UAL -6.2%) 급락.
3. **슈퍼마이크로 -28% 폭락 vs 캐시스 +20% 급등**: 슈퍼마이크로(SMCI)가 개별 악재로 -28% 폭락(AI 하드웨어 투매 가속). 반대로 캐시스(CASY)는 어닝 서프라이즈로 +20% 급등하며 극단적 차별화.

## 1. 업종별 흐름 — 시장이 좋게/나쁘게 보는 곳 (+ 한국 연관 유추)

### 🟢 상승 업종 TOP 3 (방어·유가 수혜)

**① 에너지 — 유가 급등 수혜**
주요: 데번에너지(DVN) +5.74%, 코노코필립스(COP) +2.68%, 원오크(OKE) +3.17%, 타거리소스(TRGP) +3.17%, 셰브론(CVX) +1.63%, 엑손모빌(XOM) +1.15%.
보도: 미-이란 충돌 재점화로 유가 상승. 지정학 프리미엄이 E&P·미드스트림을 끌어올림.
→ **한국 연관(유추)**: 정유 **S-Oil·SK이노베이션**, 가스 **한국가스공사**, 방산 **한화에어로스페이스·LIG넥스원**.

**② 통신 — 금리·경기 무관 방어**
주요: T모바일(TMUS) +3.39%, 버라이즌(VZ) +2.56%, AT&T(T) +2.20%.
보도: 변동성·금리 상승 국면에서 현금흐름 안정적인 통신주로 자금 피신.
→ **한국 연관(유추)**: **SKT·KT·LG유플러스** 등 고배당 방어주.

**③ 필수소비·거래소**
주요: 코카콜라(KO) +2.77%, 스머커(SJM) +4.15%, 캠벨(CPB) +3.39%, 거래소 Cboe(CBOE) +3.61%·CME(CME) +3.07%.
보도: 방어적 스테이플 매수 + 변동성 급등에 거래소(파생 거래량 기대) 강세.
→ **한국 연관(유추)**: 필수소비 **KT&G·오리온**, 고배당주.

### 🔴 하락 업종 TOP 3

**① 산업재 — CPI·금리 직격**
주요: 캐터필러(CAT) -6.40%, 이튼(ETN) -6.54%, 커민스(CMI) -5.78%, GE버노바(GEV) -5.77%, 퀀타서비스(PWR) -5.93%, 하니웰(HON) -4.55%, 록웰(ROK) -4.43%.
보도: 금리 상승·경기 둔화 우려가 자본재·전동·건설기계를 직격. 운송(페덱스·UPS -4%대)도 동반 약세.
→ **한국 연관(경계)**: 기계·전력기기 **HD현대일렉트릭·효성중공업·두산에너빌리티** 단기 변동성 주의.

**② 반도체·기술**
주요: 슈퍼마이크로(SMCI) -27.98%, 퀄컴(QCOM) -6.92%, 브로드컴(AVGO) -5.12%, AMD(AMD) -4.86%, 마이크론(MU) -4.70%, 엔비디아(NVDA) -3.73%.
보도: 금리 급등에 AI 고밸류 추가 조정. 특히 슈퍼마이크로는 개별 악재로 -28% 폭락.
→ **한국 연관(경계)**: **삼성전자·SK하이닉스·반도체 소부장** 단기 약세 노출(메모리 펀더멘털과 구분).

**③ 경기소비재·여행**
주요: 유나이티드항공(UAL) -6.25%, 카니발(CCL) -6.28%, 노르위전크루즈(NCLH) -5.83%, 익스피디아(EXPE) -5.25%, GM(GM) -5.21%, 포드(F) -4.35%.
보도: 인플레·금리·유가 상승이 항공·크루즈·자동차 등 경기소비재를 직격.

> **요약 — 시장의 시선**: CPI 쇼크·지정학에 **금리·경기 민감(산업재·기술·여행)은 매도**, **유가 수혜(에너지)·방어(통신·필수소비)는 매수**. 한국 적용 시 **정유·방산·통신·고배당 우호 / 반도체·기계·경기소비 단기 경계**.
