# 미국 증시 데일리 리포트 — AI·반도체발 '블랙 프라이데이'
기준일: 2026년 6월 5일(금) 미국 정규장 마감

## 주요 지수·자산

| 지수·자산 | 지수·가격 | 등락 |
|---|---|---|
| 나스닥 종합 | 25,709.43 | ▼ 4.18% (2025년 4월 이후 최악, 올해 최대 낙폭) |
| S&P 500 | 7,383.74 | ▼ 2.64% (9주 연속 상승 마감, 작년 10월 이후 최악) |
| 다우 산업 | 50,866.78 | ▼ 1.35% (▼695.15p) |
| WTI 유 (근월) | 약 $93 | ▼ 3.1% (Finviz 선물 CL ▼2.69%) |
| 美 10년물 금리 | 4.54% | ▲ (강한 고용에 급등) |

> 변동성: VIX 선물 ▲12.78% / 달러(DXY) ▲0.67% / 금 ▼3.1%·은 ▼6.58%·구리 ▼3.83% — 주식·채권·금·비트코인까지 동반 약세(BTC는 +2.45%로 예외). "리스크 자체를 줄이는" 디레버리징 장세.

## 시장 요약

6월 5일 미국 증시는 **고용 쇼크와 AI 거품 재평가가 겹치며 올해 최악의 하루**를 보냈다. 5월 비농업 고용이 17.2만 명으로 컨센서스(8만 명)를 두 배 이상 상회하자 "강한 경제 = 연준 금리인상 가능성"이라는 *good news is bad news* 반응이 나왔다. 10년물 금리는 4.54%로 튀었고, 연내 인상 확률은 발표 전 50%에서 약 57%로 올랐다.

여기에 전날(6/4) 브로드컴의 AI 칩 가이던스 실망(Q3 AI 매출 160억 달러로 시장 172억 달러 하회, 연간 전망 미상향)이 도화선이 됐고, 6/5에는 **엔비디아 차세대 Rubin 플랫폼의 메모리 용량 축소 루머**(SemiAnalysis: 랙당 55TB→28TB, SOCAMM 192GB→96GB)가 메모리·스토리지를 직격했다. 그 결과 반도체(SOXX ▼10.4%)가 지수 하락 전체를 설명할 정도로 무너졌고, 자금은 필수소비재·유틸리티·헬스케어·보험 등 방어주로 피신했다. 핵심 서사는 "쏠렸던 AI·반도체 포지션의 강제 청산"이다.

## 📰 시장 헤드라인 3선

**1. 나스닥 4% 폭락, 약 1.7조 달러 증발.** 9주 랠리 끝에 "댐이 터졌다." AI·반도체·모멘텀주가 가장 먼저, 가장 크게 팔렸다. (CNBC·CNN)

**2. 5월 고용 17.2만 명 '서프라이즈', 금리인하 기대 소멸.** 실업률 4.3% 유지·시간당 임금 +3.4%(YoY). 연내 인상 확률 57%로 상승, 10년물 4.54%. (CNBC·BLS)

**3. 브로드컴 가이던스 + Rubin 메모리 축소 루머의 결합.** 메모리 칩 ETF 하루 ▼15%, 마이크론 주간 ▼17%. 엔비디아 젠슨 황은 "마이크론 HBM4 인증 완료, 용량 반감설은 사실무근"이라며 진화. (24/7 Wall St·TradingKey)

- 시장이 나쁘게 본 이유: 밸류에이션이 "완벽"을 가격에 반영한 상태에서 가이던스 미세 실망이 곧바로 차익실현으로 연결. 메모리 수요 피크아웃·스마트폰 수요 둔화 우려도 가세.

> **시장의 시선:** 이날 시장은 *"AI·반도체의 무결점 성장 스토리에 의문"* 을 던지면서 동시에 *"금리인하는 당분간 없다"* 를 가격에 반영했다. 핵심은 펀더멘털 훼손보다 **과열·쏠림의 강제 해소(포지셔닝 청산)** 다. 한국 시장 시사점은 명확하다 — 반도체·AI 인프라 쏠림주는 단기 변동성 경계, 음식료·통신·보험·유틸리티 등 방어 섹터는 상대적 피난처가 될 수 있다.

## 섹션 3 — 마켓 구루·기관 코멘트

### (A) 언론 최다 인용 증권사·리서치 5선

1. **SemiAnalysis (리서치)** — *반도체/엔비디아 Rubin*: "Rubin NVL72의 랙당 메모리를 55TB→28TB로 축소, 192GB SOCAMM 대신 96GB 채택" 보도가 이날 메모리 투매의 직접 트리거. 한국 함의: 삼성·SK하이닉스 HBM·SOCAMM 물량 추정치 변동성 확대.

2. **KeyBanc** — *엔비디아(NVDA)*: 비중확대 유지, 목표가 **$275**. "SK하이닉스·마이크론 HBM4 검증 지연으로 엔비디아가 2026년 Rubin GPU 생산목표를 200만→150만 대로 하향"했지만 구조적 성장 전망은 유지. 한국 함의: HBM4 양산 타이밍이 한국 메모리 실적 모멘텀의 키.

3. **Baird (Ross Mayfield, 투자전략가)** — *시장 전반*: "대부분 종목의 포물선형 상승은 영원히 지속 불가능. 사실상 '완벽'을 가격에 반영했고, 브로드컴 가이던스가 그 한계의 예." 밸류에이션 부담 경고.

4. **Wells Fargo (Ohsung Kwon)** — *반도체/시장*: 이번 매도는 "펀더멘털보다 포지셔닝 주도"이며 반도체는 "심한 과매수 상태"였다고 진단. → 단기 청산성 조정 성격.

5. **Citi (리스크 지표)** — *시장 전반*: Citi의 리스크 플래그가 2008년 이후 최고 수준에 도달했다는 보도. 과열·쏠림에 대한 경계 신호로 인용.

### (B) 구루·전략가 코멘트

- **Ryan Detrick (Carson Group, 수석시장전략가):** "지난 9주간의 기록적 랠리 끝에, 오늘 댐이 그냥 터져버렸다(the dam just broke today)." → 조정의 불가피성과 누적된 과열 강조.
- **시장 컨센서스(언론 종합):** 이번 하락은 "주식·채권·금이 동반 하락"한 데서 보듯 *듀레이션 매수(채권으로의 회전)가 아니라 그로스 익스포저 축소(디레버리징)*. 즉 자금이 방어주로 "회전"한 게 아니라 위험 자체를 "회수"했다는 해석이 우세.
- **연준 시각(시사):** 17.2만 고용·임금 +3.4%는 연준의 *wait-and-see*(관망) 기조를 강화. 연내 인상 확률 57%로 상승하며 "인하 베팅"은 후퇴.
