## 시장 요약

독립기념일 연휴(7/3 휴장)를 앞둔 마지막 거래일, 시장은 극단적인 두 갈래로 갈라졌다. 6월 비농업 고용이 5.7만 명 증가에 그쳐 컨센서스(11.5만 명)를 크게 밑돌고 5월치도 12.9만 명으로 하향 수정되자, "이 정도 데이터로는 7월 인상 경로를 그리기 어렵다"(BMO캐피털 이언 링겐)는 해석 속에 금리인상 공포가 후퇴했다. 실업률은 4.2%로 예상(4.3%)보다 양호해 침체 공포까지는 번지지 않았고, 그 결과 다우는 594포인트(+1.14%) 오른 52,900.07로 사상 최고가를 새로 썼다. 헬스케어·유틸리티·필수소비재 등 금리민감 디펜시브가 일제히 랠리를 펼쳤다.

반면 기술주는 이틀째 'AI 언와인드'에 시달렸다. 메타가 잉여 데이터센터 용량을 외부에 판매하는 클라우드 사업 '메타 컴퓨트'를 추진한다는 보도가 "AI 컴퓨트는 희소하다"는 반도체 랠리의 대전제를 흔들면서, 2분기에 사상 최고 분기(+88%)를 기록했던 SOX 지수는 이날 6.7% 폭락하며 이틀 연속 급락(전일 -6.3%)했다. 낙폭은 메모리·장비·광통신·서버 등 AI 하드웨어 밸류체인 전반으로 확산됐고, 테슬라는 2분기 인도량 서프라이즈에도 7.5% 급락했다. S&P500은 두 흐름이 상쇄되며 보합(7,483.24)에 그쳤다.

## 📰 헤드라인 3선

**1. 6월 고용 5.7만 명 '쇼크'…금리인상 베팅 후퇴, 다우 사상 최고가**
6월 비농업 고용은 +5.7만 명으로 다우존스 컨센서스(+11.5만 명)의 절반 수준에 그쳤고 5월치는 12.9만 명으로 하향됐다. 다만 실업률 4.2%(예상 4.3%), 신규 실업수당청구 21.5만 건(예상 21.9만 건)으로 노동시장 붕괴 신호는 아니었다. 2년물 금리가 5bp 내린 4.114%로 반응했고, BMO캐피털 미국금리전략 헤드 이언 링겐은 "오늘 데이터는 인플레이션 상방 서프라이즈가 나오더라도 7월 인상 경로를 상상하기 어렵게 만든다"고 평가했다. 전일 신트라 ECB 포럼에서 "인플레이션이 여전히 너무 높다"던 케빈 워시 의장의 매파 발언으로 달아올랐던 인상 기대(BofA는 연내 3회 인상, 3.50~3.75%→4.25~4.50% 전망)가 한풀 꺾인 셈이다.

**2. '메타 컴퓨트' 충격 2일차…SOX -6.7%, AI 하드웨어 밸류체인 투매**
메타가 2026년 설비투자 가이던스를 1,250억~1,450억 달러로 올려놓은 상황에서 잉여 컴퓨트를 외부 판매하는 '메타 컴퓨트'(AWS·애저형 클라우드, 코어위브형 네오클라우드) 사업을 검토한다는 보도가 이틀째 반도체를 강타했다. 하이퍼스케일러의 용량이 '남아돈다'는 신호로 읽히며 테라다인(-13.6%), KLA(-11.5%), 램리서치(-10.2%), 어플라이드 머티어리얼즈(-7.4%) 등 장비주와 샌디스크(-14.1%)·씨게이트(-10.4%)·웨스턴디지털(-9.9%) 등 메모리·스토리지가 폭락했고, 네오클라우드 코어위브도 12% 급락했다. JP모건 니콜라오스 파니기르초글루는 "작년 9월 이후 반도체의 하이퍼스케일러 대비 초과 상승은 장기적으로 지속 불가능해 보인다"고 지적했다. 전일 보도 당일 9% 급등했던 메타 자신도 이날 4.9% 반락했다.

**3. 테슬라, 2분기 인도 48만 대 '어닝 비트'에도 -7.5%**
테슬라 2분기 인도량은 480,126대로 월가 추정(406,600대)을 크게 웃돌았고 생산은 451,758대였다. 그럼에도 주가는 7.5% 급락 — 나스닥 전체가 AI 언와인드에 눌린 데다, 인도 서프라이즈가 세액공제 종료 전 선수요라는 의심과 차익실현이 겹쳤다. 월가 목표가는 웰스파고 $125(매도적)부터 웨드부시 $600(강세)까지 극단적으로 갈라져 있어, 호재에도 매물이 나오는 '컨센서스 부재' 상태가 확인됐다.

## 섹션 1. 업종별 흐름

### 상승 업종 TOP3

**② 유틸리티 (+2~3.5%)**
서던(SO) +3.0%, 엑셀론(EXC) +3.5%, 듀크에너지(DUK) +3.0%, PPL +3.6% 등 전 종목이 고르게 상승. 금리 하락(2년물 -5bp)에 가장 기계적으로 반응하는 채권대용(bond proxy) 섹터다. 다만 AI 전력수요 테마로 묶였던 비스트라(VST) -1.4%, 컨스텔레이션(CEG)은 +1.2%에 그치고 NRG -2.9%로, '규제형 유틸리티 강세 vs AI 전력주 약세'가 뚜렷했다. **한국 연관**: 한국전력·가스공사 등 유틸리티에는 우호적이나, HD현대일렉트릭·효성중공업 등 전력기기(변압기) 수출주는 미국 AI 인프라 축소 우려를 경계해야. **시장의 시선**: 금리인상 사이클 종료 베팅 + AI 전력수요 스토리에 대한 첫 균열.

코카콜라(KO) +3.5%, 월마트(WMT) +2.8%, P&G(PG) +2.7%, 코스트코(COST) +2.9%, 맥도날드(MCD) +4.2%. 고용 둔화 국면에서 실적 방어력이 부각되는 전형적 디펜시브 랠리로, 크로거(KR) +3.5% 등 식품유통까지 골고루 올랐다. **한국 연관**: 음식료(CJ제일제당·오리온)·유통 등 내수 방어주 재평가 여지. **시장의 시선**: 경기 둔화 헤지 수요 — '성장 쏠림'에서 '배당·현금흐름'으로 무게 이동.

## 섹션 3. 마켓 구루·기관 코멘트

### (A) 증권사 리포트 5선

**1. 파이퍼샌들러 — 모더나(MRNA), 비중확대, 목표가 $69→$77 상향.** FDA 자문위 만장일치 지지로 독감백신 승인 가시성이 높아졌고, 사이언스데이에서 공개한 종양(다발골수종·난소암)·in vivo CAR-T 등 백신 밖 파이프라인 확장을 반영.

**2. 제프리스 — 모더나(MRNA), 보유, 목표가 $45 유지.** 승인 자체는 예상하나 "실질적인 독감백신 매출 기여는 2027년 이후"라며 당일 급등을 과열로 평가. 같은 이벤트에 대한 강·약 시각차가 목표가 $77 vs $45로 극명.

**3. 에버코어 ISI(그레그 멜리치) — 제뉴인파츠(GPC), 인라인, 목표가 $175→$160 하향.** 분할 기대에도 자동차 애프터마켓 수요 둔화를 반영해 목표가는 오히려 하향 — 이날 +12.9% 급등과 대비되는 신중론.

**4. 웰스파고 vs 웨드부시 — 테슬라(TSLA) 목표가 $125 vs $600.** 인도 서프라이즈에도 월가 컨센서스는 '보유'에 그치고 목표가 밴드가 5배 가까이 벌어져 있어, 실적보다 내러티브(로보택시·AI)가 주가를 지배하는 구조가 지속.

**5. JP모건(니콜라오스 파니기르초글루) — 반도체 비중 경계.** "지난해 9월 이후 반도체의 하이퍼스케일러 대비 꾸준한 초과 성과는 장기적으로 지속 가능해 보이지 않는다" — 메타 컴퓨트 보도 이전부터 누적된 밸류에이션 부담이 이번 조정의 토양이라는 진단.

### (B) 구루·기관 코멘트

- **이언 링겐(BMO캐피털 미국금리전략 헤드)**: "오늘 아침 데이터는 아직 실현되지 않은 인플레이션 상방 리스크가 있더라도 7월 연준 인상 경로를 그리기 어렵게 만든다" — 고용 쇼크 직후 단기금리 하락의 논리를 제공.
- **케빈 워시 연준 의장(7/1 신트라 ECB 포럼)**: 7월 결정에 대한 힌트는 거부하면서도 "인플레이션이 여전히 너무 높다"고 발언 — 6월 FOMC(3.50~3.75% 동결, 점도표상 연내 인상 다수)의 매파 기조 유지.
- **BofA**: 연내 25bp 3회 인상으로 기준금리 4.25~4.50% 도달 전망. 단, "고용이 급격히 둔화하거나 증시가 급락하면 긴축을 보류할 수 있다"는 단서 — 이날 고용 쇼크는 정확히 그 단서를 건드렸다.
- **TS 롬바드**: "경제가 시장 예상보다 훨씬 강한 인상 경로를 강제할 것" — 인상 사이클 지속론.
- **가르기 초두리(블랙록 미주 CIO 전략가)**: "중요한 것은 워시 의장이 인플레이션, AI, 금리 경로를 어떻게 프레이밍하는가" — 연준 커뮤니케이션 리스크가 하반기 변수임을 지적.
