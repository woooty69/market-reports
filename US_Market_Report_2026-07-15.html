## 🧭 시장 요약

**빅위크의 하이라이트, 6월 CPI가 예상을 큰 폭 하회하며 시장이 리스크온으로 반전했다.** 6월 소비자물가가 전월 대비 **−0.4%**(6년여 만의 최대 월간 하락), 연율 **3.5%**(예상 3.8%)로 둔화되자 **7월 금리인상 확률이 전날 44%에서 17%로 급감**했고, 금리 하락과 함께 반도체·AI·성장주가 랠리했다. 나스닥이 +0.90%, S&P500 +0.38%.

**반도체가 전날 급락을 되돌렸다.** SOX가 +2.54% 반등하며 델(+7.1%)·모놀리식파워(+6.7%)·넷앱(+6.5%)·루멘텀(+6.1%)·샌디스크(+5.0%)·마이크론(+4.9%)·엔비디아(+4.1%)가 급등했다. AI·사이버 소프트웨어(크라우드스트라이크 +12.1%, 팔로알토 +6.8%)와 대형은행(골드만삭스 +9.2%, 실적 호조)도 강했다.

**그러나 다우는 IBM 쇼크로 보합에 그쳤다.** IBM이 **실적 경고와 함께 "기업들이 소프트웨어·메인프레임 지출을 AI 인프라로 이동시키고 있다"**고 밝히며 **−25%** 폭락, 다우 상승을 상쇄했다. 역설적으로 이 발언은 AI 인프라(델·반도체) 강세의 근거가 됐다. 헬스케어·의료기기(바이오젠 −8.3%·인튜이티브서지컬 −6.8%·스트라이커 −6.2%)는 약세였다. 금리 하락(2년물 4.19%·10년물 4.59%), 유가는 이란 리스크에 $79.83(+2.16%)로 추가 상승.

## 📰 시장 헤드라인 3선

**1. 6월 CPI 3.5%로 '깜짝 둔화' — 인상 우려 급감, 성장주 랠리**
6월 CPI가 전월 대비 −0.4%(6년여 만 최대 월간 하락), 연 3.5%(예상 3.8%)로 전방위 하회했다. 7/29 FOMC 인상 확률이 44%→17%로 급감하며 반도체·AI·성장주가 반등, SOX +2.54%. '인플레 정점 통과' 기대가 위험선호를 되살렸다.

**2. IBM −25% 폭락 — "기업 지출이 SW·메인프레임 → AI 인프라로 이동"**
IBM이 실적 경고를 내며 기업들의 지출이 레거시 소프트웨어·메인프레임에서 AI 인프라로 옮겨가고 있다고 밝혔다. 주가는 −25% 폭락해 다우를 눌렀지만, 역설적으로 **델(+7.1%)·반도체 등 AI 인프라 수혜주 강세의 논거**가 됐다.

**3. 대형은행 실적 호조 — 골드만 +9.2%, 트레이딩·수익 견조**
JP모건·골드만삭스·BofA·웰스파고·씨티의 2분기 실적이 트레이딩·이익 호조를 확인했다. 골드만삭스가 +9.2% 급등하며 금융주를 이끌었다. 실적시즌이 '이익 성장' 기대(2분기 +20%대)를 뒷받침하는 출발.

## 1️⃣ 업종별 흐름

### 🔺 상승 업종

**① 반도체·AI 하드웨어 — 전일 급락 되돌림 + IBM發 AI 인프라 수혜**
대표주: 델(DELL) +7.13%, 모놀리식파워(MPWR) +6.65%, 넷앱(NTAP) +6.48%, 루멘텀(LITE) +6.07%, 샌디스크(SNDK) +5.01%, 마이크론(MU) +4.92%, 엔비디아(NVDA) +4.06%.
쿨 CPI에 금리 부담이 완화되고, IBM의 'AI 인프라로의 지출 이동' 발언이 델·서버·반도체 수요 기대를 키웠다. SOX +2.54%.
*시장의 시선: "물가가 잡히면 AI 하드웨어가 가장 먼저 산다 — IBM의 손실은 AI 인프라의 이익."*
*🇰🇷 한국 연관: **SK하이닉스 ADR(SKHY)이 +27.4%($194.16) 급반등**(전일 −9% 폭락 되돌림, 바클레이즈 Overweight·목표가 $330 개시). **삼성전자·SK하이닉스**·서버·장비주 우호.*

**② AI·사이버 소프트웨어**
대표주: 크라우드스트라이크(CRWD) +12.12%, 팔로알토네트웍스(PANW) +6.78%.
금리 하락에 고성장 SW가 강하게 반등, 특히 사이버보안이 급등.
*🇰🇷 한국 연관: 보안·SaaS 성장주 심리 개선.*

**③ 금융(은행) — 실적 호조**
대표주: 골드만삭스(GS) +9.16%. JP모건 등 대형은행 실적 서프라이즈.
*🇰🇷 한국 연관: 은행·증권주 실적 기대 참고.*

### 🔻 하락 업종

**① IT서비스·레거시 — IBM 실적 경고**
대표주: IBM(IBM) −25.21%.
'기업 지출의 AI 인프라 이동' 경고로 레거시 SW·메인프레임 대표주가 폭락, 다우 상승을 상쇄.
*시장의 시선: "구식 IT는 팔고, AI 인프라는 산다 — 지출 이동의 승자·패자가 갈린다."*

**② 헬스케어·의료기기 — 방어주 회전 매도**
대표주: 바이오젠(BIIB) −8.27%, HCA(HCA) −6.95%, 인튜이티브서지컬(ISRG) −6.79%, 스트라이커(SYK) −6.15%.
리스크온 국면에 방어적 헬스케어·의료기기에서 자금 이탈.

**③ 일부 반도체·메가캡 되돌림**
대표주: ARM(ARM) −5.96%, NBIS(−7.83%), 마이크로소프트(MSFT) −1.55%.
전일 방어했던 일부 종목의 차익실현.

> **요약 — 시장의 시선**: 쿨 CPI가 **반도체·AI·성장·은행(매수) ↔ 레거시 IT·헬스케어(매도)**의 리스크온을 촉발. 'IBM發 AI 인프라 지출 이동'이 상징적. 한국 적용 시 **삼성·SK하이닉스·서버·보안 우호 / 방어 헬스케어 상대 약세**. 유가·이란 리스크는 잠재 변수.
