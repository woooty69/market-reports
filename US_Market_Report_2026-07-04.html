# 미국 증시 데일리 리포트 (2026-07-04 · 휴장 에디션)

> **7/3(금) 미국 증시 휴장.** 독립기념일(7/4)이 토요일인 관계로 NYSE·나스닥은 전일(7/3) 대체휴일로 전면 휴장했고, 채권시장도 SIFMA 권고에 따라 7/2(목) 오후 2시 조기 폐장 후 7/3 전면 휴장했다. 신규 거래 세션이 없어 아래 수치는 직전 거래일(7/2, 현지) 마감 확정 종가다. **정규 거래는 7/6(월) 오전 9시 30분(ET) 재개.**

|---|---|---|
| 나스닥 | 25,832.67 | -0.80% |

## 시장 요약 — 연휴 직전 한 주의 결산

시장은 극단적인 두 갈래로 갈라진 채 사흘 연휴에 들어갔다. 한쪽에서는 6월 비농업 고용 쇼크(+5.7만 명, 컨센서스 +11.5만 명)로 케빈 워시 의장 체제의 7월 금리인상 기대가 후퇴하면서 다우가 52,900.07로 사상 최고가를 경신했고, 헬스케어·유틸리티·필수소비재 등 금리민감 디펜시브로 순환매가 유입됐다. 7월 FOMC 인상 확률은 한 주 전 30%에서 20%로 내려왔다.

다른 한쪽에서는 메타의 잉여 컴퓨트 외부 판매('메타 컴퓨트') 보도가 촉발한 'AI 언와인드'가 이틀간 SOX를 13% 가까이(-6.3%, -6.7%) 끌어내리며 메모리·장비·광통신·서버 등 AI 하드웨어 밸류체인 전반의 포지션 청산으로 번졌다. 삼성전자·SK하이닉스가 7/2 한국장에서 9%대 급락하며 선반영을 시작한 만큼, 7/6(월) 미국장 재개 시 반도체의 되돌림 여부가 다음 주 최대 관전 포인트다.

유가는 금요일 배럴당 $69 안팎에서 보합권을 유지했다. 사우디 원유 수출이 전쟁 전의 약 90% 수준까지 회복됐고 UAE도 호르무즈 우회 파이프라인 등으로 수출을 정상화했다는 소식이 상단을 눌렀지만, 미국 원유 재고가 12주 연속 감소해 2025년 3월 이후 최저치라는 점이 하단을 받쳤다. 카타르 도하에서 진행 중인 미·이란 협상은 이란 전 최고지도자 하메네이의 장례(7/4 시작)로 지연이 예상되나, 트럼프 대통령은 "협상이 잘 진행되고 있다"고 언급했다.

## 다음 주(7/6~) 관전 포인트

**1. 7/8(수) 6월 FOMC 의사록** — 케빈 워시 의장 체제 첫 회의(동결)의 내부 논의가 공개된다. 점도표상 '연내 인상' 다수의견의 강도, 그리고 고용 쇼크 이후에도 매파 기조가 유지될지가 핵심. 시장은 12월 인상은 기정사실로, 7월 인상 확률은 20%로 보고 있다.

**2. 반도체 — 'AI 언와인드' 3일차 여부** — 이틀 누적 SOX -13% 이후 첫 거래일. 애플의 메모리 조달난(부품가 +272%) 등 실수요는 타이트하다는 반론과 "하이퍼스케일러 용량 과잉" 공포가 충돌하는 구간으로, 낙폭과대 반발 매수 vs 추가 청산의 분기점. 삼성전자·SK하이닉스 등 한국 반도체의 월요일 방향성과 직결.

**3. 경제지표·실적** — 7/6(월) 6월 ISM 서비스업 PMI, 7/8(수) 리바이스(LEVI), 7/9(목) 펩시코(PEP) 실적. 지표·실적 캘린더가 가벼운 한 주라 기술적 수급, 중동 헤드라인, 유가, 금리가 방향을 좌우할 전망. 7월 중순 6월 CPI와 대형은행 2분기 어닝시즌 개막이 대기 중.

**4. 중동·유가** — 도하 협상 재개 시점과 하메네이 장례 이후 이란 정세. 7월 WTI 예상 밴드는 $52~$77로 넓게 열려 있다.

## 일정

- **7/4(토)**: 미국 독립기념일. 이란 하메네이 전 최고지도자 장례 시작(도하 협상 지연 요인).
- **7/6(월)**: 미국 증시 정규 거래 재개(9:30 ET). 6월 ISM 서비스업 PMI.
- **7/8(수)**: 6월 FOMC 의사록 공개. 리바이스(LEVI) 실적.
- **7/9(목)**: 6월 기존주택판매. 펩시코(PEP) 실적.
- **7월 중순**: 6월 CPI, 대형은행발 2분기 어닝시즌 개막.
- **7/21(화)**: 제뉴인파츠(GPC) 2분기 실적.
- **8/5**: 모더나 mRNA-1010 독감백신 PDUFA.
