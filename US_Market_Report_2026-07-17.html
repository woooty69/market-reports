## 🗓 시장 요약

반도체 매도세가 이틀째 심화되며 3대 지수가 동반 하락했다. TSMC가 2분기 호실적에도 연간 자본지출 전망을 기존 520억~560억 달러에서 **600억~640억 달러로 대폭 상향**하자, 시장은 오히려 "메모리 업체들의 과잉 투자 → 공급과잉" 우려로 반응하며 반도체 전반이 급락했다. 필라델피아 반도체 지수(SOX)는 −4.29% 떨어졌고, 메모리·스토리지가 특히 참혹했다(샌디스크 −12.63%, 시게이트 −10.00%, WDC −9.15%, 마이크론 −5.65%).

여기에 **알파벳이 −4.44%** 급락했다. 블룸버그가 알파벳의 최강 AI 모델 '제미나이 3.5 Pro' 출시가 지연되고 있다고 보도한 것이 악재였다. 엔비디아(−2.40%)·AMD(−5.33%)도 약세였다.

반면 시장은 **뚜렷한 순환매** 양상을 보였다. 반도체·AI에서 빠진 자금이 헬스케어·경기방어·산업재로 이동하며 유나이티드헬스(+7%)·애벗(+10.71%)·덱스콤(+7.25%)·JB헌트(+8.01%)·인거솔랜드(+7.13%)·신타스(+7.24%)가 급등했다. 애플(+1.76%)·마이크로소프트(+1.38%)도 방어했다.

경제지표는 양호했다(신규 실업수당 청구 20.8만 건, 예상 21.8만 하회 / 6월 소매판매 +0.2% 부합). 금리는 보합권(2년물 4.145%·10년물 4.551%), 유가는 소폭 하락($79.57), 달러지수는 100.53으로 강세, VIX는 16.73(+6.76%)로 올랐다.

특히 **SK하이닉스 ADR(SKHY)은 이틀 연속 폭락**하며 −13.69%($152.31)를 기록, 코스피200 야간선물도 −4.31%(1,049.15) 급락해 한국 증시의 추가 조정을 예고했다.

## 📰 시장 헤드라인 3선

**1. TSMC 자본지출 상향이 촉발한 반도체 셀오프 심화 — SOX −4.29%**
TSMC는 2분기 매출·순익이 예상을 웃돌았으나 연간 자본지출 전망을 600억~640억 달러로 상향했다. 호실적보다 "메모리 투자 과열 → 공급과잉" 우려가 부각되며 메모리·스토리지가 두 자릿수 급락했다(샌디스크 −12.63%, 시게이트 −10%). 마이크론(−5.65%)·SK하이닉스 ADR(−13.69%)도 동반 급락.

**2. 알파벳 −4.44% — '제미나이 3.5 Pro' 출시 지연 보도**
블룸버그는 알파벳이 최강 AI 모델 제미나이 3.5 Pro 공급 일정에서 뒤처지고 있다고 보도했다. AI 리더십 우려가 커지며 알파벳이 급락, 나스닥 하락을 키웠다.

**3. 순환매 — 헬스케어·경기방어·산업재로 자금 이동**
유나이티드헬스가 실적 호조·가이던스 상향에 +7% 급등했고, 애벗(+10.71%)·덱스콤(+7.25%)·JB헌트(+8.01%)·신타스(+7.24%) 등 방어·산업재가 강세를 보였다. 반도체·AI에서 이탈한 자금의 이동이 뚜렷했다.

## 🧭 섹션 3 · 구루 · 기관 코멘트

**스티븐 이네스(SPI) — "TSMC는 이겼지만, AI 트레이드는 고도를 더 잃었다"**
TSMC의 호실적에도 시장은 자본지출 급증을 공급과잉 신호로 받아들였고, AI 관련 트레이드의 되돌림이 이어지고 있다고 평가.

**HSBC — "SK하이닉스가 최선호주" (목표가 유지)**
메모리 업황이 정점에 근접했다는 우려는 과도하며, 강력한 AI 수요가 향후 메모리 업체 실적 성장을 뒷받침할 것이라고 진단(마이크론과 함께 상승여력 제시).

**TSMC(크리스토퍼 포켓 CFO)** — 올해 메모리 관련 매출 +75% 전망(파운드리 +25%보다 훨씬 높음). 메모리 쪽 투자가 집중되고 있음을 시사 → 역설적으로 공급과잉 우려를 자극.

**모틀리풀** — "메모리 슈퍼사이클은 아직 다리가 남았다": SK하이닉스는 HBM 리더로 엔비디아 주력 공급사이며, DRAM은 최소 2030년까지 공급 부족일 것으로 전망.

**바클레이즈** — SK하이닉스 ADR 목표가 $342.5 유지(현재가 대비 큰 상승여력). 다만 상장 초기 극심한 변동성(3거래일 +27%→−9%→−13.7%)으로 단기 방향성은 불안정.

*참고: 한국 규제당국이 SK하이닉스 ADR 변동성 완화를 위한 안정화 조치를 검토 중이라고 배런스가 보도.*
