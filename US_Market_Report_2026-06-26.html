## 🧭 시장 요약

**메모리 슈퍼사이클의 '양면'이 하루에 정면충돌한 장세였다.** 전일 장 마감 후 발표된 **마이크론(MU)의 어닝 서프라이즈**(조정 EPS $25.11 vs 예상 $20.78, 매출 $41.46B로 전년 동기 대비 약 4배)가 메모리·반도체 장비주를 폭등시키며 **SOX가 +3.59%** 치솟았다. 샌디스크(SNDK) +22%, 어플라이드머티어리얼즈(AMAT) +13%, 코닝(GLW) +11% 등 칩 체인이 일제히 급등했다.

그러나 지수는 거꾸로 움직였다. **메모리값 급등이 기기 원가로 전이**되면서 **애플(AAPL)이 맥북·아이패드 가격 인상을 발표하며 −6.1% 급락**, 마이크로소프트(MSFT, Xbox 가격 인상)도 −3.5% 빠졌다. 메가캡이 무너지자 **나스닥은 −0.46%로 2월 이후 첫 4거래일 연속 하락**을 기록했다. 반면 다우는 헬스케어·금융·산업재의 힘으로 **+0.14% 홀로 상승** — 기술주에서 비(非)기술주로의 로테이션이 뚜렷했다.

한편 5월 **PCE 물가가 4%대로 2023년 4월 이후 최고**를 찍으며 연준(케빈 워시 의장) 금리 인상 가능성을 살려뒀다. 다만 단기금리는 소폭 하락(2년물 4.12%·10년물 4.39%)했고, 전일 급락했던 유가는 ≈$71.5로 +1.6% 반등했다.

## 📰 시장 헤드라인 3선

**1. 마이크론 어닝 서프라이즈 → 칩·메모리·장비 폭등(SOX +3.59%)**
마이크론이 FY26 3분기 조정 EPS **$25.11**(컨센서스 $20.78 대폭 상회), 매출 **$41.46B**(전년 $9.3B의 약 4배)를 발표했다. HBM(고대역폭메모리) 매출이 분기 사상 처음 10억 달러를 돌파했고 **2026년 HBM 생산능력은 이미 완판**. "AI 메모리 슈퍼사이클"이 재확인되며 샌디스크(+22%)·AMAT(+13.4%)·테라다인(+10.4%)·KLA(+7.7%)·코닝(+10.8%)이 동반 급등했다.

**2. 애플 −6.1%·MS −3.5% — 메모리값 상승의 '역풍', 메가캡이 나스닥 끌어내려**
메모리 가격 급등이 디바이스 원가를 자극하자 **애플이 맥북·아이패드 가격 인상**을, **마이크로소프트가 Xbox 가격 인상**을 발표했다. 애플이 −6%대로 나스닥 하락을 주도했고 MS·아마존(−3.1%)·메타(−2.7%)·엔비디아(−1.6%)도 약세. **나스닥은 4거래일 연속 하락(2월 이후 처음)**. 같은 메모리 호재가 칩 메이커엔 호재, 기기 메이커엔 악재로 갈렸다.

**3. 5월 PCE 4%대 — 2023년 4월 이후 최고, 연준 인상 가능성 잔존**
연준이 선호하는 인플레이션 지표인 PCE 물가가 5월 전년비 4%를 넘기며 2023년 4월 이후 최고치를 기록했다. 소비지출은 견조. 7/29 FOMC를 앞두고 워시 체제의 추가 인상 카드가 테이블에 남았다는 평가다. 단, 채권시장 단기금리는 소폭 하락하며 '성장 둔화 vs 물가' 사이 균형을 반영했다.

## 1️⃣ 업종별 흐름

### 🔺 상승 업종

**① 반도체 메모리·장비 — 마이크론發 슈퍼사이클 재점화**
대표주: 샌디스크(SNDK) +21.97%, 마이크론(MU) +15.95%, 어플라이드머티어리얼즈(AMAT) +13.42%, 코닝(GLW) +10.78%, 테라다인(TER) +10.42%, KLA(KLAC) +7.66%, 인텔(INTC) +0.93%.
마이크론의 매출 4배·HBM 완판 소식에 메모리·후공정·장비가 일제히 급등. AI 데이터센터향 메모리 수요가 매크로 노이즈와 분리되며 강세.
*시장의 시선: "AI 자본지출의 진짜 수혜는 메모리·장비" — HBM 슈퍼사이클 신뢰 회복.*
*🇰🇷 한국 연관: **삼성전자·SK하이닉스**(HBM·D램 직접 수혜), 장비·후공정 **한미반도체·이오테크닉스·HPSP**.*

**② 헬스케어·생명과학 — 로테이션 수혜**
대표주: 바이오테크네(TECH) +20.08%, 그 외 다우 내 헬스케어가 지수를 떠받침.
기술주 차익실현 자금이 방어·실적 가시성 높은 헬스케어로 이동. 다우 상승의 한 축.
*시장의 시선: 고밸류 기술주 → 실적·마진 안정 섹터로의 자금 순환.*

**③ 금융·산업재 — 다우를 떠받친 가치주**
유가 안정·금리 소폭 하락 속 금융·산업재가 견조. 다우가 +0.14%로 홀로 오른 동력.
*🇰🇷 한국 연관: 금융주·산업재 가치주 재평가 흐름 참고.*

### 🔻 하락 업종

**① 메가캡·기기 메이커 — 메모리 원가 부담의 직격탄**
대표주: 애플(AAPL) −6.12%, 델(DELL) −5.67%, 마이크로소프트(MSFT) −3.46%, 아마존(AMZN) −3.10%, 메타(META) −2.65%, 엔비디아(NVDA) −1.64%.
메모리 가격 급등이 PC·기기 원가로 전이되며 애플·델 등 하드웨어주가 직격. 애플·MS의 가격 인상 발표가 수요 둔화 우려를 키웠다.
*시장의 시선: "메모리값이 오르면 칩은 웃고 기기는 운다" — 슈퍼사이클의 비용 전가 국면.*
*🇰🇷 한국 연관: 애플 공급망(LG이노텍 등)·고밸류 IT 동조 약세 주의.*

**② 소매·할인점 — 소비 둔화 경계**
대표주: TJX(TJX) −6.04%, 로스스토어스(ROST) −5.89%.
물가(PCE 4%)·금리 부담 속 소비 경계감에 할인 소매주가 약세.
*시장의 시선: 인플레 잔존 → 소비 여력 둔화 우려 재부각.*

**③ 크립토 연관·기타 고밸류**
대표주: 마이크로스트래티지(MSTR) −9.37%, MSCI(MSCI) −5.67%, 로켓랩(RKLB) −5.57%.
비트코인 약세에 크립토 프록시(MSTR) 급락, 고밸류 데이터·성장주도 차익실현.

> **요약 — 시장의 시선**: '메모리는 사고, 메모리를 쓰는 기기는 던진다'. **반도체 메모리·장비(매수) vs 메가캡 기기·소매(매도)**의 분리가 핵심. 한국 적용 시 **삼성전자·SK하이닉스·반도체 장비 우호 / 애플 공급망·고밸류 IT 경계**.

## 3️⃣ 마켓 구루·기관 코멘트

**증권사·기관 리포트 5선 (마이크론 목표가 상향 러시 포함)**
1. **BofA 증권**: 마이크론 목표가 **$1,500**(←$950 상향). HBM 수요·메모리 가격 상승 사이클이 구조적이라는 판단.
2. **니덤(Needham, Quinn Bolton)**: 마이크론 목표가 **$1,550**(←$500). 메모리 슈퍼사이클의 가장 공격적 강세론.
3. **번스타인(Bernstein·SocGen)**: 마이크론 목표가 **$1,300**(←$510). HBM 완판·가격 레버리지 반영.
4. **씨티(Citi)**: 마이크론 목표가 **$1,200**. 글로벌 메모리 공급부족이 가격을 떠받친다는 논리. → 한국 SK하이닉스·삼성전자 함의.
5. **바클레이즈(Barclays)**: "밸류에이션 부담에도 주식은 여전히 매력적" — 실적 모멘텀이 높은 밸류를 정당화한다는 시각.

**구루·매크로 코멘트**
- **Brent Schutte (노스웨스턴뮤추얼 CIO)**: "시장의 폭이 넓어지고 있다(market broadening) — AI 일변도에서 벗어난 분산투자가 유효." 기술주→비기술주 로테이션을 긍정적으로 해석.
- **로이터 분석**: "채권시장은 연준이 끝내 단행하지 않을 수도 있는 인상을 가격에 반영 중" — PCE 4%대에도 단기금리가 소폭 하락한 배경.
- 연준 의장 **케빈 워시(Kevin Warsh, 2026.5.22 취임)** 체제는 PCE 고착화 속 매파 기조 유지. 7/29 FOMC가 분기점.
- 시장 톤: '메모리 슈퍼사이클'이 칩주를 띄우는 동시에 기기 원가·소비를 압박하는 **이중 서사**가 부각.

## 4️⃣ 다음 거래일·일정 (관전 포인트)

- **로테이션 지속성**: 메모리·장비(매수) vs 메가캡 기기·소매(매도) 구도가 이어질지. 나스닥 4연속 하락의 추가 조정 여부.
